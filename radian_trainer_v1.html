<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>弧度法トレーナー</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
      --accent:#2563eb; --accent2:#1d4ed8; --ok:#16a34a; --ng:#dc2626;
      --line:#e5e7eb; --soft:#f8fafc;
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      line-height:1.7;
    }
    .wrap{max-width:780px;margin:0 auto;padding:22px 14px 46px}
    .card{
      background:var(--card); border:1px solid var(--line); border-radius:20px;
      padding:22px; box-shadow:0 10px 28px rgba(0,0,0,.07);
    }
    h1{margin:0 0 6px;font-size:1.55rem}
    .lead{color:var(--muted);font-size:.96rem;margin-bottom:16px}
    .top{
      display:flex;justify-content:space-between;gap:12px;align-items:center;
      color:var(--muted);font-size:.95rem;margin-top:12px;
    }
    .bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}
    .bar > div{height:100%;width:0%;background:var(--accent);transition:width .25s ease}
    .question{
      font-size:1.45rem;font-weight:800;margin:18px 0 18px;
      padding:16px;background:var(--soft);border-radius:14px;border:1px solid var(--line);
    }
    .choices{display:grid;gap:12px;margin:16px 0}
    .choice{
      width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:var(--text);
      border-radius:14px;padding:14px 16px;font-size:1.1rem;font-weight:700;cursor:pointer;
      transition:.12s ease;
    }
    .choice:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.10)}
    .choice:disabled{cursor:default;opacity:1}
    .choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}
    .choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}
    .feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}
    .feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}
    .feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
    .formula{
      margin-top:10px;padding:11px 12px;background:#fff;border:1px solid var(--line);
      border-radius:10px;font-family:"Times New Roman",serif;font-size:1.16rem;
    }
    .buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    button{
      border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;
      cursor:pointer;background:var(--accent);color:#fff;
    }
    button:hover{background:var(--accent2)}
    button.secondary{background:#e5e7eb;color:#111827}
    button.secondary:hover{background:#d1d5db}
    button:disabled{opacity:.5;cursor:not-allowed}
    .result{text-align:center;padding:24px 8px}
    .scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}
    .pass{color:var(--ok);font-weight:900}
    .fail{color:var(--ng);font-weight:900}
    .note{
      margin-top:16px;padding:12px 14px;border-left:5px solid #cbd5e1;background:#f8fafc;
      border-radius:10px;color:#475569;font-size:.95rem;
    }
    .mini{font-size:.92rem;color:var(--muted)}
    .settings{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    select{
      border:1px solid #cbd5e1;border-radius:10px;padding:8px 10px;background:white;font-size:1rem;
    }
    @media (max-width:520px){
      .card{padding:18px}
      .question{font-size:1.25rem}
      .choice{font-size:1rem}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>弧度法トレーナー</h1>
      <div class="lead">度（°）とラジアン（rad）の変換を練習する4択クイズです。20問ランダム出題、80%以上でクリア。</div>

      <div id="startScreen">
        <div class="note">
          まずは「180° = π rad」「360° = 2π rad」を体に入れる練習です。<br>
          問題は毎回ランダムに出ます。
        </div>
        <div class="settings">
          <label>出題数：
            <select id="numQuestions">
              <option value="10">10問</option>
              <option value="20" selected>20問</option>
              <option value="30">30問</option>
              <option value="50">50問</option>
            </select>
          </label>
        </div>
        <div class="buttons">
          <button id="startBtn">スタート</button>
        </div>
      </div>

      <div id="quizScreen" style="display:none;">
        <div class="top">
          <div id="count">1 / 20</div>
          <div id="score">正解 0</div>
        </div>
        <div class="bar"><div id="bar"></div></div>
        <div id="question" class="question"></div>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback"></div>
        <div class="buttons">
          <button id="nextBtn" disabled>次の問題</button>
          <button class="secondary" id="restartBtn">最初から</button>
        </div>
      </div>

      <div id="finishScreen" class="result" style="display:none;">
        <div class="mini">結果</div>
        <div id="finalScore" class="scorebig"></div>
        <div id="finalMessage"></div>
        <div class="buttons" style="justify-content:center;">
          <button id="againBtn">もう一度やる</button>
          <button class="secondary" id="reviewBtn">間違えた問題だけ復習</button>
        </div>
      </div>
    </div>
  </div>

<script>
const basePairs = [
  [0,"0"], [15,"π/12"], [30,"π/6"], [45,"π/4"], [60,"π/3"], [75,"5π/12"],
  [90,"π/2"], [105,"7π/12"], [120,"2π/3"], [135,"3π/4"], [150,"5π/6"],
  [165,"11π/12"], [180,"π"], [195,"13π/12"], [210,"7π/6"], [225,"5π/4"],
  [240,"4π/3"], [255,"17π/12"], [270,"3π/2"], [285,"19π/12"], [300,"5π/3"],
  [315,"7π/4"], [330,"11π/6"], [345,"23π/12"], [360,"2π"]
];

const degChoices = basePairs.map(p => `${p[0]}°`);
const radChoices = basePairs.map(p => `${p[1]} rad`);

let quiz = [];
let index = 0;
let score = 0;
let wrongList = [];
let total = 20;
let answered = false;

const $ = (id) => document.getElementById(id);

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function makeQuestions(){
  const qs = [];
  for(const [deg, rad] of basePairs){
    qs.push({
      type:"deg2rad",
      prompt:`${deg}° は何 rad か？`,
      answer:`${rad} rad`,
      deg, rad
    });
    qs.push({
      type:"rad2deg",
      prompt:`${rad} rad は何°か？`,
      answer:`${deg}°`,
      deg, rad
    });
  }
  return qs;
}

function makeChoices(q){
  const pool = q.type === "deg2rad" ? radChoices : degChoices;
  const answer = q.answer;
  let distractors = shuffle(pool.filter(x => x !== answer)).slice(0,3);
  return shuffle([answer, ...distractors]);
}

function start(useWrong=false){
  total = parseInt($("numQuestions").value, 10);
  const source = useWrong && wrongList.length ? wrongList : makeQuestions();
  quiz = shuffle(source).slice(0, Math.min(total, source.length)).map(q => ({...q, choices: makeChoices(q)}));
  index = 0;
  score = 0;
  wrongList = [];
  $("startScreen").style.display = "none";
  $("finishScreen").style.display = "none";
  $("quizScreen").style.display = "block";
  showQuestion();
}

function showQuestion(){
  answered = false;
  const q = quiz[index];
  $("count").textContent = `${index+1} / ${quiz.length}`;
  $("score").textContent = `正解 ${score}`;
  $("bar").style.width = `${(index/quiz.length)*100}%`;
  $("question").textContent = q.prompt;
  $("feedback").className = "feedback";
  $("feedback").style.display = "none";
  $("nextBtn").disabled = true;

  const box = $("choices");
  box.innerHTML = "";
  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `${["①","②","③","④"][i]}　${c}`;
    btn.addEventListener("click", () => check(c, btn));
    box.appendChild(btn);
  });
}

function explanation(q, ok){
  if(q.type === "deg2rad"){
    return `
      <strong>${ok ? "正解！" : "不正解"}</strong><br>
      正解：<strong>${q.answer}</strong>
      <div class="formula">
        ${q.deg}° × π/180 = ${q.rad} rad
      </div>
      <div class="note">ポイント：180° = π rad。度をradに直すときは、π/180をかけます。</div>
    `;
  } else {
    return `
      <strong>${ok ? "正解！" : "不正解"}</strong><br>
      正解：<strong>${q.answer}</strong>
      <div class="formula">
        ${q.rad} rad × 180/π = ${q.deg}°
      </div>
      <div class="note">ポイント：π rad = 180°。radを度に直すときは、180/πをかけます。</div>
    `;
  }
}

function check(selected, btn){
  if(answered) return;
  answered = true;
  const q = quiz[index];
  const ok = selected === q.answer;
  if(ok) score++;
  else wrongList.push(q);

  document.querySelectorAll(".choice").forEach(b => {
    b.disabled = true;
    if(b.textContent.includes(q.answer)) b.classList.add("correct");
  });
  if(!ok) btn.classList.add("wrong");

  $("feedback").className = "feedback " + (ok ? "ok" : "ng");
  $("feedback").innerHTML = explanation(q, ok);
  $("feedback").style.display = "block";
  $("score").textContent = `正解 ${score}`;
  $("nextBtn").disabled = false;
}

function next(){
  index++;
  if(index >= quiz.length){
    finish();
  } else {
    showQuestion();
  }
}

function finish(){
  $("quizScreen").style.display = "none";
  $("finishScreen").style.display = "block";
  const rate = Math.round(score / quiz.length * 100);
  $("finalScore").textContent = `${score} / ${quiz.length} 問正解（${rate}%）`;
  if(rate >= 80){
    $("finalMessage").innerHTML = `<div class="pass">クリア！いい感じです。</div>`;
  } else {
    $("finalMessage").innerHTML = `<div class="fail">もう一回やるとかなり定着します。</div>`;
  }
  $("reviewBtn").style.display = wrongList.length ? "inline-block" : "none";
}

$("startBtn").addEventListener("click", () => start(false));
$("nextBtn").addEventListener("click", next);
$("restartBtn").addEventListener("click", () => {
  $("quizScreen").style.display = "none";
  $("finishScreen").style.display = "none";
  $("startScreen").style.display = "block";
});
$("againBtn").addEventListener("click", () => {
  $("finishScreen").style.display = "none";
  $("startScreen").style.display = "block";
});
$("reviewBtn").addEventListener("click", () => {
  if(wrongList.length){
    const saved = [...wrongList];
    total = Math.min(saved.length, 20);
    quiz = shuffle(saved).map(q => ({...q, choices: makeChoices(q)}));
    index = 0;
    score = 0;
    wrongList = [];
    $("finishScreen").style.display = "none";
    $("quizScreen").style.display = "block";
    showQuestion();
  }
});
</script>
</body>
</html>
