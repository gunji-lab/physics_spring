<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>理想気体シミュレーター V0.5-2.0版</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; margin: 0; color: #222; background: white; }
  header { padding: 18px 24px 8px; }
  h1 { margin: 0 0 6px; font-size: 24px; }
  .note { color: #666; font-size: 14px; }
  main { display: grid; grid-template-columns: 1fr 330px; gap: 18px; padding: 12px 24px 24px; }
  canvas { width: 100%; height: 520px; border: 2px solid #333; border-radius: 8px; background: #fff; }
  .panel { background: #f7f7f7; border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
  .control { margin-bottom: 18px; }
  label { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 6px; }
  input[type="range"] { width: 100%; }
  .value { font-variant-numeric: tabular-nums; }
  .box { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-top: 12px; }
  .formula { font-size: 24px; text-align: center; margin: 8px 0; }
  .small { font-size: 13px; color: #666; line-height: 1.6; }
  button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #aaa; background: white; font-weight: 700; cursor: pointer; }
  button:hover { background: #eee; }
  .meter { height: 14px; background: #e6e6e6; border-radius: 999px; overflow: hidden; margin-top: 6px; }
  .bar { height: 100%; width: 30%; background: #222; }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } canvas { height: 420px; } }
</style>
</head>
<body>
<header>
  <h1>理想気体シミュレーター</h1>
  <div class="note">体積 V は 0.50〜2.00 の範囲で変化します。PV = nRT の関係を見せる講義用デモです。</div>
</header>

<main>
  <canvas id="gas" width="900" height="560"></canvas>

  <aside class="panel">
    <div class="control">
      <label>温度 T <span class="value" id="tVal"></span></label>
      <input id="temp" type="range" min="100" max="600" value="300" step="10">
    </div>

    <div class="control">
      <label>体積 V <span class="value" id="vVal"></span></label>
      <input id="volume" type="range" min="50" max="200" value="100" step="1">
    </div>

    <div class="control">
      <label>物質量 n <span class="value" id="nVal"></span></label>
      <input id="particles" type="range" min="50" max="200" value="100" step="5">
    </div>

    <button id="reset">粒子をリセット</button>

    <div class="box">
      <div class="formula">PV = nRT</div>
      <div>圧力 P（相対値）：<b id="pVal"></b></div>
      <div class="meter"><div id="pBar" class="bar"></div></div>
      <div style="margin-top:10px;">平均速度（相対値）：<b id="speedVal"></b></div>
    </div>

    <div class="box small">
      <b>設定</b><br>
      ・体積 V：0.50〜2.00<br>
      ・温度 T：100〜600 K<br>
      ・物質量 n：0.50〜2.00 相当<br><br>
      <b>講義での見せ方</b><br>
      ・Tを上げる → 粒子が速くなる → Pが上がる<br>
      ・Vを小さくする → 壁に当たりやすい → Pが上がる<br>
      ・nを増やす → 粒子が増える → Pが上がる<br><br>
      ※Pは関係を見せるための相対値です。
    </div>
  </aside>
</main>

<script>
(function () {
  const canvas = document.getElementById("gas");
  const ctx = canvas.getContext("2d");

  const temp = document.getElementById("temp");
  const volume = document.getElementById("volume");
  const particlesInput = document.getElementById("particles");
  const tVal = document.getElementById("tVal");
  const vVal = document.getElementById("vVal");
  const nVal = document.getElementById("nVal");
  const pVal = document.getElementById("pVal");
  const speedVal = document.getElementById("speedVal");
  const pBar = document.getElementById("pBar");
  const resetBtn = document.getElementById("reset");

  let particles = [];
  const margin = 45;
  const boxHeight = 410;
  const boxTop = 75;
  const radius = 4.5;

  function getT() {
    return Number(temp.value);
  }

  function getV() {
    return Number(volume.value) / 100; // 0.50〜2.00
  }

  function getNRelative() {
    return Number(particlesInput.value) / 100; // 0.50〜2.00
  }

  function getParticleCount() {
    // 画面上の粒子数。nの相対値に対応させる
    return Math.round(Number(particlesInput.value) * 0.8);
  }

  function getPressure() {
    // R=1 とした相対値。基準 T=300, n=1, V=1 で P=1
    return getNRelative() * (getT() / 300) / getV();
  }

  function getBox() {
    const V = getV(); // 0.5〜2.0
    const maxWidth = canvas.width - margin * 2;
    const baseWidth = maxWidth * 0.55; // V=1.0のときの幅
    const width = Math.min(maxWidth, Math.max(maxWidth * 0.25, baseWidth * V));
    const left = margin;
    return { left: left, top: boxTop, right: left + width, bottom: boxTop + boxHeight, width: width, height: boxHeight };
  }

  function targetSpeed() {
    return Math.sqrt(getT() / 300) * 2.15;
  }

  function makeParticle(box) {
    const angle = Math.random() * Math.PI * 2;
    const s = targetSpeed() * (0.65 + Math.random() * 0.7);
    return {
      x: box.left + radius + Math.random() * Math.max(1, (box.width - 2 * radius)),
      y: box.top + radius + Math.random() * Math.max(1, (box.height - 2 * radius)),
      vx: Math.cos(angle) * s,
      vy: Math.sin(angle) * s
    };
  }

  function initParticles() {
    particles = [];
    const box = getBox();
    const n = getParticleCount();
    for (let i = 0; i < n; i++) particles.push(makeParticle(box));
  }

  function adjustParticleCount() {
    const desired = getParticleCount();
    const box = getBox();
    while (particles.length < desired) particles.push(makeParticle(box));
    while (particles.length > desired) particles.pop();
  }

  function update() {
    adjustParticleCount();
    const box = getBox();
    const desiredS = targetSpeed();

    for (const p of particles) {
      const currentS = Math.hypot(p.vx, p.vy) || 1;
      const factor = 0.985 + 0.015 * (desiredS / currentS);
      p.vx *= factor;
      p.vy *= factor;

      p.x += p.vx;
      p.y += p.vy;

      if (p.x - radius < box.left) { p.x = box.left + radius; p.vx = Math.abs(p.vx); }
      if (p.x + radius > box.right) { p.x = box.right - radius; p.vx = -Math.abs(p.vx); }
      if (p.y - radius < box.top) { p.y = box.top + radius; p.vy = Math.abs(p.vy); }
      if (p.y + radius > box.bottom) { p.y = box.bottom - radius; p.vy = -Math.abs(p.vy); }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const box = getBox();

    ctx.lineWidth = 3;
    ctx.strokeStyle = "#222";
    ctx.strokeRect(box.left, box.top, box.width, box.height);

    ctx.setLineDash([6, 6]);
    ctx.strokeStyle = "#999";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(box.right, box.top);
    ctx.lineTo(box.right, box.bottom);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "#111";
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = "#222";
    ctx.font = "22px sans-serif";
    ctx.fillText("気体粒子", box.left, 42);
    ctx.font = "18px sans-serif";
    ctx.fillText("可動壁", box.right - 30, box.bottom + 32);

    const T = getT();
    const V = getV();
    const n = getNRelative();
    const P = getPressure();

    tVal.textContent = T + " K";
    vVal.textContent = V.toFixed(2);
    nVal.textContent = n.toFixed(2);
    pVal.textContent = P.toFixed(2);
    speedVal.textContent = targetSpeed().toFixed(2);

    const pct = Math.max(3, Math.min(100, P / 6 * 100));
    pBar.style.width = pct + "%";
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  resetBtn.addEventListener("click", initParticles);
  temp.addEventListener("input", draw);
  volume.addEventListener("input", function () {
    const box = getBox();
    for (const p of particles) {
      if (p.x > box.right - radius) p.x = box.right - radius;
    }
  });
  particlesInput.addEventListener("input", draw);

  initParticles();
  loop();
})();
</script>
</body>
</html>
