<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>バネ Stage3 バネの位置エネルギートレーナー v2</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:22px 14px 46px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}.lead{color:var(--muted);font-size:.96rem;margin-bottom:16px}.top{display:flex;justify-content:space-between;color:var(--muted);font-size:.95rem;margin-top:12px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}.bar>div{height:100%;width:0%;background:var(--accent);transition:width .25s ease}
.question{font-size:1.22rem;font-weight:800;margin:18px 0;padding:16px;background:var(--soft);border-radius:14px;border:1px solid var(--line)}.choices{display:grid;gap:12px;margin:16px 0}
.choice{width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:var(--text);border-radius:14px;padding:14px 16px;font-size:1.06rem;font-weight:700;cursor:pointer}
.choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}.choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}.choice:disabled{cursor:default;opacity:1}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid var(--line);border-radius:10px;font-family:"Times New Roman",serif;font-size:1.12rem;overflow-x:auto}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:var(--accent);color:#fff}button.secondary{background:#e5e7eb;color:#111827}button:disabled{opacity:.5;cursor:not-allowed}
.result{text-align:center;padding:24px 8px}.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}.pass{color:var(--ok);font-weight:900}.fail{color:var(--ng);font-weight:900}
.note{margin-top:16px;padding:12px 14px;border-left:5px solid #cbd5e1;background:#f8fafc;border-radius:10px;color:#475569;font-size:.95rem}.badge{display:inline-block;font-size:.85rem;padding:2px 8px;border-radius:99px;background:#dbeafe;color:#1e40af;margin-bottom:8px}
.figure{display:flex;justify-content:center}svg{max-width:300px;width:100%;height:auto}input{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}.status{font-size:.92rem;color:#6b7280;margin-top:10px}
@media(max-width:520px){.card{padding:18px}.question{font-size:1.08rem}.choice{font-size:1rem}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>バネ Stage3 バネの位置エネルギートレーナー</h1>
<div class="lead">バネの弾性エネルギー U = 1/2 kx² を練習する4択クイズです。10問ランダム出題、70%以上でクリア。</div>
<div id="startScreen">
<div class="note">このステージでは <b>バネの位置エネルギー U = 1/2 kx²</b> を練習します。<br>U を求める問題、U から x を求める問題、U から k を求める問題が出ます。<br>選択肢は、聞かれている量と同じ単位だけが表示されます。</div>
<div class="figure"><svg viewBox="0 0 300 160"><line x1="35" y1="80" x2="70" y2="80" stroke="#1f2937" stroke-width="6"/><polyline points="70,80 82,62 94,98 106,62 118,98 130,62 142,98 154,62 166,98 178,80" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="178" y="60" width="42" height="40" rx="6" fill="#e5e7eb" stroke="#1f2937" stroke-width="3"/><line x1="70" y1="125" x2="178" y2="125" stroke="#1f2937" stroke-width="2"/><path d="M70 125 l8 -5 l0 10 z" fill="#1f2937"/><path d="M178 125 l-8 -5 l0 10 z" fill="#1f2937"/><text x="118" y="145" font-size="17">x</text><text x="116" y="42" font-size="17" fill="#2563eb">k</text><text x="230" y="84" font-size="17" fill="#dc2626">U</text></svg></div>
<div class="note">学籍番号を入力してからスタートしてください。</div>
<input id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">
<div class="buttons"><button id="startBtn">スタート</button></div>
</div>
<div id="quizScreen" style="display:none"><div class="top"><div id="count"></div><div id="score"></div></div><div class="bar"><div id="bar"></div></div><div id="question" class="question"></div><div id="choices" class="choices"></div><div id="feedback" class="feedback"></div><div class="buttons"><button id="nextBtn" disabled>次の問題</button><button class="secondary" id="restartBtn">最初から</button></div></div>
<div id="finishScreen" class="result" style="display:none"><div>結果</div><div id="finalScore" class="scorebig"></div><div id="finalMessage"></div><div id="sendStatus" class="status"></div><div class="buttons" style="justify-content:center"><button id="againBtn">もう一度やる</button><button class="secondary" id="reviewBtn">間違えた問題だけ復習</button></div></div>
</div></div>
<script src="../common/trainer_common_v2.js"></script>
<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwBDYL4LmMQrNA0MFUAJ2gBtYumSQLoLKicRQnNoyhePgplh7q-CQ_kW3BjhCRnkDFDTQ/exec?v=3";
const STAGE_NAME="バネ Stage3 バネの位置エネルギー";
const energyProblems=[
{type:"U",ans:"2.0 [J]",question:"バネ定数 k = 100 [N/m] のバネを x = 0.20 [m] だけ縮めた。バネの弾性エネルギー U は何 [J] か。",calc:"U = 1/2 kx²<br>= 1/2 × 100 × 0.20²<br>= 2.0 [J]"},
{type:"U",ans:"4.0 [J]",question:"バネ定数 k = 200 [N/m] のバネを x = 0.20 [m] だけ縮めた。バネの弾性エネルギー U は何 [J] か。",calc:"U = 1/2 kx²<br>= 1/2 × 200 × 0.20²<br>= 4.0 [J]"},
{type:"U",ans:"4.5 [J]",question:"バネ定数 k = 100 [N/m] のバネを x = 0.30 [m] だけ縮めた。バネの弾性エネルギー U は何 [J] か。",calc:"U = 1/2 kx²<br>= 1/2 × 100 × 0.30²<br>= 4.5 [J]"},
{type:"U",ans:"9.0 [J]",question:"バネ定数 k = 200 [N/m] のバネを x = 0.30 [m] だけ縮めた。バネの弾性エネルギー U は何 [J] か。",calc:"U = 1/2 kx²<br>= 1/2 × 200 × 0.30²<br>= 9.0 [J]"},
{type:"U",ans:"8.0 [J]",question:"バネ定数 k = 100 [N/m] のバネを x = 0.40 [m] だけ縮めた。バネの弾性エネルギー U は何 [J] か。",calc:"U = 1/2 kx²<br>= 1/2 × 100 × 0.40²<br>= 8.0 [J]"},
{type:"U",ans:"16 [J]",question:"バネ定数 k = 200 [N/m] のバネを x = 0.40 [m] だけ縮めた。バネの弾性エネルギー U は何 [J] か。",calc:"U = 1/2 kx²<br>= 1/2 × 200 × 0.40²<br>= 16 [J]"}
];
const stretchProblems=[
{type:"x",ans:"0.20 [m]",question:"バネの弾性エネルギー U = 2.0 [J]、バネ定数 k = 100 [N/m] のとき、縮み x は何 [m] か。",calc:"U = 1/2 kx²<br>x = √(2U/k)<br>= √(2×2.0/100) = 0.20 [m]"},
{type:"x",ans:"0.20 [m]",question:"バネの弾性エネルギー U = 4.0 [J]、バネ定数 k = 200 [N/m] のとき、縮み x は何 [m] か。",calc:"U = 1/2 kx²<br>x = √(2U/k)<br>= √(2×4.0/200) = 0.20 [m]"},
{type:"x",ans:"0.30 [m]",question:"バネの弾性エネルギー U = 4.5 [J]、バネ定数 k = 100 [N/m] のとき、縮み x は何 [m] か。",calc:"U = 1/2 kx²<br>x = √(2U/k)<br>= √(2×4.5/100) = 0.30 [m]"},
{type:"x",ans:"0.40 [m]",question:"バネの弾性エネルギー U = 8.0 [J]、バネ定数 k = 100 [N/m] のとき、縮み x は何 [m] か。",calc:"U = 1/2 kx²<br>x = √(2U/k)<br>= √(2×8.0/100) = 0.40 [m]"}
];
const springConstantProblems=[
{type:"k",ans:"100 [N/m]",question:"バネの弾性エネルギー U = 2.0 [J]、縮み x = 0.20 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"U = 1/2 kx²<br>k = 2U/x²<br>= 2×2.0/0.20² = 100 [N/m]"},
{type:"k",ans:"200 [N/m]",question:"バネの弾性エネルギー U = 4.0 [J]、縮み x = 0.20 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"U = 1/2 kx²<br>k = 2U/x²<br>= 2×4.0/0.20² = 200 [N/m]"},
{type:"k",ans:"100 [N/m]",question:"バネの弾性エネルギー U = 4.5 [J]、縮み x = 0.30 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"U = 1/2 kx²<br>k = 2U/x²<br>= 2×4.5/0.30² = 100 [N/m]"},
{type:"k",ans:"200 [N/m]",question:"バネの弾性エネルギー U = 9.0 [J]、縮み x = 0.30 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"U = 1/2 kx²<br>k = 2U/x²<br>= 2×9.0/0.30² = 200 [N/m]"}
];
const energyAns=["1.0 [J]","2.0 [J]","4.0 [J]","4.5 [J]","8.0 [J]","9.0 [J]","16 [J]","20 [J]"];
const stretchAns=["0.10 [m]","0.20 [m]","0.30 [m]","0.40 [m]","0.50 [m]"];
const springConstantAns=["50 [N/m]","100 [N/m]","150 [N/m]","200 [N/m]","300 [N/m]","400 [N/m]"];
let quiz=[],index=0,score=0,wrongList=[],answered=false,resultSent=false;
const total=10,$=id=>document.getElementById(id);
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeChoices(q){let pool=q.type==="U"?energyAns:q.type==="x"?stretchAns:springConstantAns;return shuffle([q.ans,...shuffle(pool.filter(x=>x!==q.ans)).slice(0,3)]);}
function buildQuiz(){return [...shuffle(energyProblems).slice(0,5),...shuffle(stretchProblems).slice(0,3),...shuffle(springConstantProblems).slice(0,2)];}
function start(useWrong=false){const studentId=$("studentId").value.trim();if(!studentId){alert("学籍番号を入力してください。");$("studentId").focus();return;}let source=useWrong&&wrongList.length?wrongList:buildQuiz();quiz=shuffle(source).slice(0,total).map(q=>({...q,choices:makeChoices(q)}));index=0;score=0;wrongList=[];resultSent=false;
    TrainerLog.startSession();$(""startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion();}
function showQuestion(){answered=false;let q=quiz[index];$("count").textContent=`${index+1} / ${quiz.length}`;$("score").textContent=`正解 ${score}`;$("bar").style.width=`${index/quiz.length*100}%`;let badge=q.type==="U"?"U を求める":q.type==="x"?"x を求める":"k を求める";$("question").innerHTML=`<span class="badge">${badge}</span><br>${q.question}`;$("feedback").className="feedback";$("feedback").style.display="none";$("nextBtn").disabled=true;let box=$("choices");box.innerHTML="";q.choices.forEach((c,i)=>{let b=document.createElement("button");b.className="choice";b.dataset.answer=c;b.innerHTML=`${["①","②","③","④"][i]}　${c}`;b.onclick=()=>check(c,b);box.appendChild(b)});TrainerLog.startQuestion();}
function explanation(q,ok){return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong><div class="formula">${q.calc}</div><div class="note">ポイント：バネの位置エネルギーは U = 1/2 kx² です。x は2乗で効きます。</div>`;}
function check(selected,btn){if(answered)return;answered=true;let q=quiz[index],ok=selected===q.ans;if(!q.id) q.id=`SPR3_${q.type||"Q"}_${index+1}`;TrainerLog.recordQuestion(q,ok,{selected:selected,answer:q.ans,prompt:q.question||""});if(ok)score++;else wrongList.push(q);document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.dataset.answer===q.ans)b.classList.add("correct")});if(!ok)btn.classList.add("wrong");$("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML=explanation(q,ok);$("feedback").style.display="block";$("score").textContent=`正解 ${score}`;$("nextBtn").disabled=false;}
function next(){index++;index>=quiz.length?finish():showQuestion()}
function finish(){TrainerLog.finishSession();$("quizScreen").style.display="none";$("finishScreen").style.display="block";let rate=Math.round(score/quiz.length*100);$("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;$("finalMessage").innerHTML=rate>=70?`<div class="pass">クリア！バネの位置エネルギー、いい感じです。</div>`:`<div class="fail">もう一回やると、U = 1/2 kx² が定着します。</div>`;TrainerLog.showElapsedInFinalMessage();$("reviewBtn").style.display=wrongList.length?"inline-block":"none";sendResult(rate);}
function sendResult(rate){TrainerLog.sendResult({score:score,total:quiz.length});}
$("startBtn").onclick=()=>start(false);$("nextBtn").onclick=next;$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start(false);});$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("reviewBtn").onclick=()=>{if(wrongList.length){let saved=[...wrongList];quiz=shuffle(saved).slice(0,10).map(q=>({...q,choices:makeChoices(q)}));index=0;score=0;wrongList=[];resultSent=false;$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion();}};
</script>
</body>
</html>
