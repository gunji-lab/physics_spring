<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>バネ Stage5 記入式総合トレーナー</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:22px 14px 46px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}.lead{color:var(--muted);font-size:.96rem;margin-bottom:16px}.top{display:flex;justify-content:space-between;color:var(--muted);font-size:.95rem;margin-top:12px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}.bar>div{height:100%;width:0%;background:var(--accent);transition:width .25s ease}
.question{font-size:1.22rem;font-weight:800;margin:18px 0;padding:16px;background:var(--soft);border-radius:14px;border:1px solid var(--line)}
.answerBox{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0}
.answerBox input{flex:1;min-width:180px;padding:14px 16px;font-size:1.15rem;border:1px solid #cbd5e1;border-radius:12px}
.unit{font-weight:900;color:#475569;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid var(--line);border-radius:10px;font-family:"Times New Roman",serif;font-size:1.12rem;overflow-x:auto}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:var(--accent);color:#fff}button.secondary{background:#e5e7eb;color:#111827}button:disabled{opacity:.5;cursor:not-allowed}
.result{text-align:center;padding:24px 8px}.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}.pass{color:var(--ok);font-weight:900}.fail{color:var(--ng);font-weight:900}
.note{margin-top:16px;padding:12px 14px;border-left:5px solid #cbd5e1;background:#f8fafc;border-radius:10px;color:#475569;font-size:.95rem}.badge{display:inline-block;font-size:.85rem;padding:2px 8px;border-radius:99px;background:#dbeafe;color:#1e40af;margin-bottom:8px}
.figure{display:flex;justify-content:center}svg{max-width:330px;width:100%;height:auto}#studentId{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}.status{font-size:.92rem;color:#6b7280;margin-top:10px}
.frac{display:inline-block;vertical-align:middle;text-align:center;line-height:1}.frac span{display:block;padding:0 3px}.frac span:first-child{border-bottom:1px solid #000}
@media(max-width:520px){.card{padding:18px}.question{font-size:1.08rem}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>バネ Stage5 記入式総合トレーナー</h1>
<div class="lead">Stage1〜4の内容を、4択ではなく記入式で解く総合トレーナーです。10問ランダム出題、70%以上でクリア。</div>

<div id="startScreen">
<div class="note">
入力するのは <b>数値だけ</b> でOKです。単位は右側に表示されます。<br>
例：答えが 0.20 [m] のときは <b>0.20</b> または <b>0.2</b> と入力してください。<br>
使う式：<b>F = kx</b>、<b>mg = kx</b>、<b>U = <span class="frac"><span>1</span><span>2</span></span>kx<sup>2</sup></b>、<b><span class="frac"><span>1</span><span>2</span></span>kx<sup>2</sup> = <span class="frac"><span>1</span><span>2</span></span>mv<sup>2</sup></b>
</div>
<div class="figure">
<svg viewBox="0 0 330 160">
  <line x1="35" y1="80" x2="70" y2="80" stroke="#1f2937" stroke-width="6"/>
  <polyline points="70,80 82,62 94,98 106,62 118,98 130,62 142,98 154,62 166,98 178,80" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="178" y="60" width="42" height="40" rx="6" fill="#e5e7eb" stroke="#1f2937" stroke-width="3"/>
  <line x1="70" y1="125" x2="178" y2="125" stroke="#1f2937" stroke-width="2"/>
  <path d="M70 125 l8 -5 l0 10 z" fill="#1f2937"/><path d="M178 125 l-8 -5 l0 10 z" fill="#1f2937"/>
  <text x="118" y="145" font-size="17">x</text><text x="116" y="42" font-size="17" fill="#2563eb">k</text>
  <path d="M232 80 L300 80" stroke="#dc2626" stroke-width="5"/><path d="M300 80 l-12 -8 l0 16 z" fill="#dc2626"/><text x="252" y="62" font-size="17" fill="#dc2626">v</text>
</svg>
</div>
<div class="note">学籍番号を入力してからスタートしてください。</div>
<input id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">
<div class="buttons"><button id="startBtn">スタート</button></div>
</div>

<div id="quizScreen" style="display:none">
<div class="top"><div id="count"></div><div id="score"></div></div>
<div class="bar"><div id="bar"></div></div>
<div id="question" class="question"></div>
<div class="answerBox">
<input id="answerInput" type="text" inputmode="decimal" autocomplete="off" placeholder="数値を入力">
<div id="unit" class="unit"></div>
</div>
<div id="feedback" class="feedback"></div>
<div class="buttons"><button id="checkBtn">答え合わせ</button><button id="nextBtn" disabled>次の問題</button><button class="secondary" id="restartBtn">最初から</button></div>
</div>

<div id="finishScreen" class="result" style="display:none">
<div>結果</div><div id="finalScore" class="scorebig"></div><div id="finalMessage"></div><div id="sendStatus" class="status"></div>
<div class="buttons" style="justify-content:center"><button id="againBtn">もう一度やる</button><button class="secondary" id="reviewBtn">間違えた問題だけ復習</button><button class="secondary" id="categoryBtn">バネトップへ</button><button class="secondary" id="homeBtn">トップページへ</button></div>
</div>
</div></div>

<script src="../common/trainer_common_v2.js"></script>
<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwBDYL4LmMQrNA0MFUAJ2gBtYumSQLoLKicRQnNoyhePgplh7q-CQ_kW3BjhCRnkDFDTQ/exec?v=3";
const STAGE_NAME="バネ/Stage5/記入式";

const problems=[
{stage:"Stage1",type:"F",unit:"[N]",value:20,tol:0.01,question:"バネ定数 k = 100 [N/m]、伸び x = 0.20 [m] のとき、力 F は何 [N] か。",calc:"F = kx = 100 × 0.20 = 20 [N]"},
{stage:"Stage1",type:"F",unit:"[N]",value:40,tol:0.01,question:"バネ定数 k = 200 [N/m]、伸び x = 0.20 [m] のとき、力 F は何 [N] か。",calc:"F = kx = 200 × 0.20 = 40 [N]"},
{stage:"Stage1",type:"x",unit:"[m]",value:0.20,tol:0.001,question:"力 F = 40 [N]、バネ定数 k = 200 [N/m] のとき、伸び x は何 [m] か。",calc:"x = F/k = 40 / 200 = 0.20 [m]"},
{stage:"Stage1",type:"k",unit:"[N/m]",value:200,tol:0.01,question:"力 F = 40 [N]、伸び x = 0.20 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"k = F/x = 40 / 0.20 = 200 [N/m]"},

{stage:"Stage2",type:"x",unit:"[m]",value:0.20,tol:0.001,question:"質量 m = 2.0 [kg] の物体を、バネ定数 k = 98 [N/m] のバネにつるした。伸び x は何 [m] か。",calc:"mg = kx<br>x = mg/k = 2.0×9.8/98 = 0.20 [m]"},
{stage:"Stage2",type:"m",unit:"[kg]",value:2.0,tol:0.01,question:"バネ定数 k = 98 [N/m] のバネに物体をつるすと、伸び x = 0.20 [m] で静止した。物体の質量 m は何 [kg] か。",calc:"mg = kx<br>m = kx/g = 98×0.20/9.8 = 2.0 [kg]"},
{stage:"Stage2",type:"k",unit:"[N/m]",value:196,tol:0.01,question:"質量 m = 2.0 [kg] の物体をつるすと、バネの伸び x = 0.10 [m] で静止した。バネ定数 k は何 [N/m] か。",calc:"mg = kx<br>k = mg/x = 2.0×9.8/0.10 = 196 [N/m]"},

{stage:"Stage3",type:"U",unit:"[J]",value:2.0,tol:0.01,question:"バネ定数 k = 100 [N/m] のバネを x = 0.20 [m] だけ縮めた。バネの弾性エネルギー U は何 [J] か。",calc:"U = 1/2 kx²<br>= 1/2 × 100 × 0.20² = 2.0 [J]"},
{stage:"Stage3",type:"U",unit:"[J]",value:4.5,tol:0.01,question:"バネ定数 k = 100 [N/m] のバネを x = 0.30 [m] だけ縮めた。バネの弾性エネルギー U は何 [J] か。",calc:"U = 1/2 kx²<br>= 1/2 × 100 × 0.30² = 4.5 [J]"},
{stage:"Stage3",type:"x",unit:"[m]",value:0.20,tol:0.001,question:"バネの弾性エネルギー U = 2.0 [J]、バネ定数 k = 100 [N/m] のとき、縮み x は何 [m] か。",calc:"x = √(2U/k)<br>= √(2×2.0/100) = 0.20 [m]"},
{stage:"Stage3",type:"k",unit:"[N/m]",value:200,tol:0.01,question:"バネの弾性エネルギー U = 4.0 [J]、縮み x = 0.20 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"k = 2U/x²<br>= 2×4.0/0.20² = 200 [N/m]"},

{stage:"Stage4",type:"v",unit:"[m/s]",value:2.0,tol:0.01,question:"質量 m = 1.0 [kg] の小球を、バネ定数 k = 100 [N/m] のバネで x = 0.20 [m] だけ縮めて離した。自然長に戻った瞬間の速さ v は何 [m/s] か。",calc:"1/2 kx² = 1/2 mv²<br>100×0.20² = 1.0×v²<br>v = 2.0 [m/s]"},
{stage:"Stage4",type:"v",unit:"[m/s]",value:3.0,tol:0.01,question:"質量 m = 1.0 [kg] の小球を、バネ定数 k = 100 [N/m] のバネで x = 0.30 [m] だけ縮めて離した。自然長に戻った瞬間の速さ v は何 [m/s] か。",calc:"1/2 kx² = 1/2 mv²<br>100×0.30² = 1.0×v²<br>v = 3.0 [m/s]"},
{stage:"Stage4",type:"x",unit:"[m]",value:0.20,tol:0.001,question:"質量 m = 1.0 [kg]、バネ定数 k = 100 [N/m]、自然長に戻った瞬間の速さ v = 2.0 [m/s] のとき、最初の縮み x は何 [m] か。",calc:"x = v√(m/k)<br>= 2.0×√(1.0/100) = 0.20 [m]"},
{stage:"Stage4",type:"k",unit:"[N/m]",value:100,tol:0.01,question:"質量 m = 1.0 [kg]、最初の縮み x = 0.20 [m]、自然長に戻った瞬間の速さ v = 2.0 [m/s] のとき、バネ定数 k は何 [N/m] か。",calc:"k = mv²/x²<br>= 1.0×2.0²/0.20² = 100 [N/m]"}
];

let quiz=[],index=0,score=0,wrongList=[],answered=false,resultSent=false;
const total=10,$=id=>document.getElementById(id);

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function buildQuiz(){return shuffle(problems).slice(0,total)}
function normalize(s){return String(s).trim().replace(/[０-９．]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/,/g,"").replace(/[^\d.\-]/g,"");}

function start(useWrong=false){
 const studentId=$("studentId").value.trim();
 if(!studentId){alert("学籍番号を入力してください。");$("studentId").focus();return;}
 let source=useWrong&&wrongList.length?wrongList:buildQuiz();
 quiz=shuffle(source).slice(0,total);
 index=0;score=0;wrongList=[];resultSent=false;
 TrainerLog.startSession();
 TrainerLog.startSession();
 $("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion();
}

function showQuestion(){
 answered=false;let q=quiz[index];
 $("count").textContent=`${index+1} / ${quiz.length}`;
 $("score").textContent=`正解 ${score}`;
 $("bar").style.width=`${index/quiz.length*100}%`;
 $("question").innerHTML=`<span class="badge">${q.stage}・${q.type} を求める</span><br>${q.question}`;
 $("unit").textContent=q.unit;
 $("answerInput").value="";
 $("answerInput").disabled=false;
 TrainerLog.startQuestion();
 $("answerInput").focus();
 $("feedback").className="feedback";$("feedback").style.display="none";
 $("nextBtn").disabled=true;$("checkBtn").disabled=false;
}

function checkAnswer(){
 if(answered)return;
 let q=quiz[index];
 let raw=$("answerInput").value;
 let val=parseFloat(normalize(raw));
 if(Number.isNaN(val)){alert("数値を入力してください。");$("answerInput").focus();return;}
 answered=true;
 const ok=Math.abs(val-q.value)<=q.tol;
 if(!q.id) q.id = `${"SPR5"}_${q.type||"Q"}_${index+1}`;
 TrainerLog.recordQuestion(q, ok, {
   selected: raw,
   answer: q.value !== undefined ? String(q.value) : (q.answers ? q.answers[0] : ""),
   prompt: q.question || ""
 });
 if(ok)score++;else wrongList.push(q);
 $("answerInput").disabled=true;
 $("checkBtn").disabled=true;
 $("nextBtn").disabled=false;
 $("feedback").className="feedback "+(ok?"ok":"ng");
 $("feedback").innerHTML=`<strong>${ok?"正解！":"不正解"}</strong><br>あなたの答え：<strong>${raw} ${q.unit}</strong><br>正解：<strong>${q.value} ${q.unit}</strong><div class="formula">${q.calc}</div><div class="note">ポイント：単位は入力しなくてOK。数値だけを入れます。</div>`;
 $("feedback").style.display="block";
 $("score").textContent=`正解 ${score}`;
}

function next(){index++;index>=quiz.length?finish():showQuestion()}

function finish(){
 TrainerLog.finishSession();
 $("quizScreen").style.display="none";$("finishScreen").style.display="block";
 let rate=Math.round(score/quiz.length*100);
 $("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;
 $("finalMessage").innerHTML=rate>=70?`<div class="pass">クリア！記入式でもかなりいい感じです。</div>`:`<div class="fail">もう一回やると、式の使い分けが定着します。</div>`;
 $("finalMessage").innerHTML += `<div class="note">所要時間：<strong>${TrainerLog.formatElapsed(TrainerLog.getElapsed())}</strong></div>`;
 $("reviewBtn").style.display=wrongList.length?"inline-block":"none";
 sendResult(rate);
}

function sendResult(rate){
  TrainerLog.sendResult({
    score: score,
    total: quiz.length
  });
}

$("startBtn").onclick=()=>start(false);
$("checkBtn").onclick=checkAnswer;
$("nextBtn").onclick=next;
$("answerInput").addEventListener("keydown",e=>{if(e.key==="Enter"){answered?next():checkAnswer();}});
$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start(false);});
$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};
$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};
$("reviewBtn").onclick=()=>{if(wrongList.length){let saved=[...wrongList];quiz=shuffle(saved).slice(0,10);index=0;score=0;wrongList=[];resultSent=false;$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion();}};
$("categoryBtn").onclick=()=>{location.href="index.html"};
$("homeBtn").onclick=()=>{location.href="../index.html"};
</script>
</body>
</html>
