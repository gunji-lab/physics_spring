<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>バネ Stage1 フックの法則トレーナー v2</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--soft:#f8fafc}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:22px 14px 46px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}.lead{color:var(--muted);font-size:.96rem;margin-bottom:16px}
.top{display:flex;justify-content:space-between;gap:12px;align-items:center;color:var(--muted);font-size:.95rem;margin-top:12px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}.bar>div{height:100%;width:0%;background:var(--accent);transition:width .25s ease}
.question{font-size:1.22rem;font-weight:800;margin:18px 0;padding:16px;background:var(--soft);border-radius:14px;border:1px solid var(--line)}
.choices{display:grid;gap:12px;margin:16px 0}.choice{width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:var(--text);border-radius:14px;padding:14px 16px;font-size:1.06rem;font-weight:700;cursor:pointer}
.choice:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.10)}.choice:disabled{cursor:default;opacity:1}
.choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}.choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid var(--line);border-radius:10px;font-family:"Times New Roman",serif;font-size:1.12rem;overflow-x:auto}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:var(--accent);color:#fff}
button.secondary{background:#e5e7eb;color:#111827}button:disabled{opacity:.5;cursor:not-allowed}
.result{text-align:center;padding:24px 8px}.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}.pass{color:var(--ok);font-weight:900}.fail{color:var(--ng);font-weight:900}
.note{margin-top:16px;padding:12px 14px;border-left:5px solid #cbd5e1;background:#f8fafc;border-radius:10px;color:#475569;font-size:.95rem}.badge{display:inline-block;font-size:.85rem;padding:2px 8px;border-radius:99px;background:#dbeafe;color:#1e40af;margin-bottom:8px}
.figure{display:flex;justify-content:center}svg{max-width:280px;width:100%;height:auto}
input{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.status{font-size:.92rem;color:#6b7280;margin-top:10px}
@media(max-width:520px){.card{padding:18px}.question{font-size:1.08rem}.choice{font-size:1rem}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>バネ Stage1 フックの法則トレーナー</h1>
<div class="lead">バネ定数 k [N/m]、伸び x [m]、力 F [N] の関係を練習する4択クイズです。10問ランダム出題、70%以上でクリア。</div>

<div id="startScreen">
<div class="note">
このステージでは <b>フックの法則 F = kx</b> を練習します。<br>
F を求める問題、x を求める問題、k を求める問題が出ます。<br>
選択肢は、聞かれている量と同じ単位だけが表示されます。<br>
単位はすべて <b>[ ]</b> 付きで表示します。
</div>

<div class="figure">
<svg viewBox="0 0 260 150">
  <line x1="30" y1="75" x2="70" y2="75" stroke="#1f2937" stroke-width="6"/>
  <polyline points="70,75 80,55 90,95 100,55 110,95 120,55 130,95 140,55 150,95 160,55 170,95 180,75" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="180" y="55" width="38" height="40" rx="6" fill="#e5e7eb" stroke="#1f2937" stroke-width="3"/>
  <line x1="218" y1="75" x2="242" y2="75" stroke="#dc2626" stroke-width="5"/>
  <path d="M242 75 l-12 -8 l0 16 z" fill="#dc2626"/>
  <text x="114" y="35" font-size="17" fill="#2563eb">k</text>
  <text x="219" y="58" font-size="17" fill="#dc2626">F</text>
  <text x="108" y="132" font-size="17" fill="#1f2937">x</text>
  <line x1="70" y1="120" x2="180" y2="120" stroke="#1f2937" stroke-width="2"/>
  <path d="M70 120 l8 -5 l0 10 z" fill="#1f2937"/>
  <path d="M180 120 l-8 -5 l0 10 z" fill="#1f2937"/>
</svg>
</div>

<div class="note">学籍番号を入力してからスタートしてください。</div>
<input id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">

<div class="buttons"><button id="startBtn">スタート</button></div>
</div>

<div id="quizScreen" style="display:none">
<div class="top"><div id="count"></div><div id="score"></div></div>
<div class="bar"><div id="bar"></div></div>
<div id="question" class="question"></div>
<div id="choices" class="choices"></div>
<div id="feedback" class="feedback"></div>
<div class="buttons"><button id="nextBtn" disabled>次の問題</button><button class="secondary" id="restartBtn">最初から</button></div>
</div>

<div id="finishScreen" class="result" style="display:none">
<div>結果</div>
<div id="finalScore" class="scorebig"></div>
<div id="finalMessage"></div>
<div id="sendStatus" class="status"></div>
<div class="buttons" style="justify-content:center">
<button id="againBtn">もう一度やる</button>
<button class="secondary" id="reviewBtn">間違えた問題だけ復習</button>
</div>
</div>
</div></div>

<script src="../common/trainer_common_v2.js"></script>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwBDYL4LmMQrNA0MFUAJ2gBtYumSQLoLKicRQnNoyhePgplh7q-CQ_kW3BjhCRnkDFDTQ/exec?v=3";
const STAGE_NAME = "バネ Stage1 フックの法則";

const forceProblems=[
{type:"F",ans:"20 [N]",question:"バネ定数 k = 100 [N/m]、伸び x = 0.20 [m] のとき、力 F は何 [N] か。",calc:"F = kx = 100 × 0.20 = 20 [N]"},
{type:"F",ans:"40 [N]",question:"バネ定数 k = 200 [N/m]、伸び x = 0.20 [m] のとき、力 F は何 [N] か。",calc:"F = kx = 200 × 0.20 = 40 [N]"},
{type:"F",ans:"30 [N]",question:"バネ定数 k = 100 [N/m]、伸び x = 0.30 [m] のとき、力 F は何 [N] か。",calc:"F = kx = 100 × 0.30 = 30 [N]"},
{type:"F",ans:"100 [N]",question:"バネ定数 k = 200 [N/m]、伸び x = 0.50 [m] のとき、力 F は何 [N] か。",calc:"F = kx = 200 × 0.50 = 100 [N]"},
{type:"F",ans:"60 [N]",question:"バネ定数 k = 300 [N/m]、伸び x = 0.20 [m] のとき、力 F は何 [N] か。",calc:"F = kx = 300 × 0.20 = 60 [N]"},
{type:"F",ans:"50 [N]",question:"バネ定数 k = 100 [N/m]、伸び x = 0.50 [m] のとき、力 F は何 [N] か。",calc:"F = kx = 100 × 0.50 = 50 [N]"}
];

const stretchProblems=[
{type:"x",ans:"0.20 [m]",question:"力 F = 40 [N]、バネ定数 k = 200 [N/m] のとき、伸び x は何 [m] か。",calc:"x = F/k = 40 / 200 = 0.20 [m]"},
{type:"x",ans:"0.30 [m]",question:"力 F = 30 [N]、バネ定数 k = 100 [N/m] のとき、伸び x は何 [m] か。",calc:"x = F/k = 30 / 100 = 0.30 [m]"},
{type:"x",ans:"0.10 [m]",question:"力 F = 20 [N]、バネ定数 k = 200 [N/m] のとき、伸び x は何 [m] か。",calc:"x = F/k = 20 / 200 = 0.10 [m]"},
{type:"x",ans:"0.40 [m]",question:"力 F = 80 [N]、バネ定数 k = 200 [N/m] のとき、伸び x は何 [m] か。",calc:"x = F/k = 80 / 200 = 0.40 [m]"},
{type:"x",ans:"0.50 [m]",question:"力 F = 100 [N]、バネ定数 k = 200 [N/m] のとき、伸び x は何 [m] か。",calc:"x = F/k = 100 / 200 = 0.50 [m]"}
];

const springConstantProblems=[
{type:"k",ans:"100 [N/m]",question:"力 F = 20 [N]、伸び x = 0.20 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"k = F/x = 20 / 0.20 = 100 [N/m]"},
{type:"k",ans:"200 [N/m]",question:"力 F = 40 [N]、伸び x = 0.20 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"k = F/x = 40 / 0.20 = 200 [N/m]"},
{type:"k",ans:"300 [N/m]",question:"力 F = 60 [N]、伸び x = 0.20 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"k = F/x = 60 / 0.20 = 300 [N/m]"},
{type:"k",ans:"100 [N/m]",question:"力 F = 30 [N]、伸び x = 0.30 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"k = F/x = 30 / 0.30 = 100 [N/m]"},
{type:"k",ans:"200 [N/m]",question:"力 F = 100 [N]、伸び x = 0.50 [m] のとき、バネ定数 k は何 [N/m] か。",calc:"k = F/x = 100 / 0.50 = 200 [N/m]"}
];

const allAns=[
"10 [N]","20 [N]","30 [N]","40 [N]","50 [N]","60 [N]","80 [N]","100 [N]",
"0.10 [m]","0.20 [m]","0.30 [m]","0.40 [m]","0.50 [m]",
"50 [N/m]","100 [N/m]","200 [N/m]","300 [N/m]","400 [N/m]"
];


const forceAns=["10 [N]","20 [N]","30 [N]","40 [N]","50 [N]","60 [N]","80 [N]","100 [N]","120 [N]"];
const stretchAns=["0.10 [m]","0.20 [m]","0.30 [m]","0.40 [m]","0.50 [m]","0.60 [m]"];
const springConstantAns=["50 [N/m]","100 [N/m]","150 [N/m]","200 [N/m]","250 [N/m]","300 [N/m]","400 [N/m]"];


let quiz=[],index=0,score=0,wrongList=[],answered=false,resultSent=false;
const total=10,$=id=>document.getElementById(id);

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeChoices(q){
 let pool = q.type==="F" ? forceAns : q.type==="x" ? stretchAns : springConstantAns;
 return shuffle([q.ans,...shuffle(pool.filter(x=>x!==q.ans)).slice(0,3)]);
}
function buildQuiz(){
 const extraGoesToStretch = Math.random() < 0.5;
 const nF = 3;
 const nX = extraGoesToStretch ? 4 : 3;
 const nK = extraGoesToStretch ? 3 : 4;
 return [...shuffle(forceProblems).slice(0,nF),...shuffle(stretchProblems).slice(0,nX),...shuffle(springConstantProblems).slice(0,nK)];
}

function start(useWrong=false){
 const studentId=$("studentId").value.trim();
 if(!studentId){alert("学籍番号を入力してください。");$("studentId").focus();return;}
 let source=useWrong&&wrongList.length?wrongList:buildQuiz();
 quiz=shuffle(source).slice(0,total).map(q=>({...q,choices:makeChoices(q)}));
 index=0;score=0;wrongList=[];resultSent=false;
    TrainerLog.startSession();
  TrainerLog.startSession();
 $("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion();
}

function showQuestion(){
 answered=false;let q=quiz[index];
 $("count").textContent=`${index+1} / ${quiz.length}`;
 $("score").textContent=`正解 ${score}`;
 $("bar").style.width=`${index/quiz.length*100}%`;
 let badge=q.type==="F"?"F を求める":q.type==="x"?"x を求める":"k を求める";
 $("question").innerHTML=`<span class="badge">${badge}</span><br>${q.question}`;
 $("feedback").className="feedback";$("feedback").style.display="none";$("nextBtn").disabled=true;
 let box=$("choices");box.innerHTML="";
 q.choices.forEach((c,i)=>{let b=document.createElement("button");b.className="choice";b.dataset.answer=c;b.innerHTML=`${["①","②","③","④"][i]}　${c}`;b.onclick=()=>check(c,b);box.appendChild(b)});
}

function explanation(q,ok){
 return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong>
 <div class="formula">${q.calc}</div>
 <div class="note">ポイント：フックの法則は F = kx です。求めたい量に合わせて式を変形します。</div>`;
}

function check(selected,btn){
 if(answered)return;answered=true;let q=quiz[index],ok=selected===q.ans;
  if(!q.id) q.id = `${"SPR1"}_${q.type||q.mode||"Q"}_${index+1}`;
  TrainerLog.recordQuestion(q, ok, {
    selected: selected,
    answer: q.answer || q.ans,
    prompt: q.prompt || q.question || ""
  });
 if(ok)score++;else wrongList.push(q);
 document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.dataset.answer===q.ans)b.classList.add("correct")});
 if(!ok)btn.classList.add("wrong");
 $("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML=explanation(q,ok);$("feedback").style.display="block";$("score").textContent=`正解 ${score}`;$("nextBtn").disabled=false;
}

function next(){index++;index>=quiz.length?finish():showQuestion()}

function finish(){
  TrainerLog.finishSession();
 $("quizScreen").style.display="none";$("finishScreen").style.display="block";
 let rate=Math.round(score/quiz.length*100);
 $("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;
 $("finalMessage").innerHTML=rate>=70?`<div class="pass">クリア！フックの法則の基本はいい感じです。</div>`:`<div class="fail">もう一回やると、F = kx の使い方が定着します。</div>`;
  TrainerLog.showElapsedInFinalMessage();
 $("reviewBtn").style.display=wrongList.length?"inline-block":"none";
 sendResult(rate);
}

function sendResult(rate){
  TrainerLog.sendResult({
    score: score,
    total: quiz.length
  });
}

$("startBtn").onclick=()=>start(false);
$("nextBtn").onclick=next;
$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start(false);});
$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};
$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};
$("reviewBtn").onclick=()=>{if(wrongList.length){let saved=[...wrongList];quiz=shuffle(saved).slice(0,10).map(q=>({...q,choices:makeChoices(q)}));index=0;score=0;wrongList=[];resultSent=false;$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion();}};
</script>
</body>
</html>
