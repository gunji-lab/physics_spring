<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>円運動 大問対策 - 万有引力</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5c6672;
      --line: #d9dee6;
      --soft: #f5f7fa;
      --panel: #ffffff;
      --accent: #1d6f8f;
      --accent-dark: #15536a;
      --accent-soft: #dff3f7;
      --gold-soft: #fff1d0;
      --wrong: #b13b3b;
      --wrong-soft: #fde7e7;
      --right: #247a4b;
      --right-soft: #e4f6ec;
      --shadow: 0 14px 32px rgba(31, 41, 51, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef7f8 0, #f8fafb 320px, #f4f6f8 100%);
      line-height: 1.55;
    }

    button, input { font: inherit; }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }

    header {
      padding: 22px clamp(16px, 3vw, 40px) 16px;
      border-bottom: 1px solid rgba(31, 41, 51, 0.08);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
    }

    h1 { font-size: clamp(1.25rem, 2.8vw, 2rem); margin: 0; letter-spacing: 0; }

    .score {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      min-width: 78px;
      text-align: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 700;
    }

    main { width: min(1180px, 100%); margin: 0 auto; padding: clamp(16px, 3vw, 32px); }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 430px);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .start-card, .finish-card {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: clamp(20px, 4vw, 34px);
    }

    .lead { margin: 8px 0 18px; color: var(--muted); }

    .note, .hint-box {
      margin: 16px 0;
      padding: 13px 15px;
      border-left: 5px solid #cbd5e1;
      background: var(--soft);
      border-radius: 8px;
      color: #475569;
    }

    .hint-box {
      display: none;
      border-color: #d6a62f;
      background: var(--gold-soft);
      color: #59410e;
    }

    .hint-box.show { display: block; }
    .hint-box strong { color: #3d2a05; }

    .student-input {
      width: 100%;
      min-height: 48px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 1.05rem;
      margin-top: 8px;
    }

    .student-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 111, 143, 0.15);
    }

    .finish-card { text-align: center; }
    .score-big { font-size: clamp(2rem, 8vw, 3.2rem); margin: 10px 0; font-weight: 900; color: var(--accent-dark); }
    .pass { color: var(--right); font-weight: 900; }
    .fail { color: var(--wrong); font-weight: 900; }
    .send-status { min-height: 1.5em; color: var(--muted); font-size: 0.92rem; margin-top: 10px; }

    .problem { padding: clamp(18px, 3vw, 28px); }

    .topic-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      color: var(--accent-dark);
      background: var(--accent-soft);
      border: 1px solid #b9e1e9;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .question-title { margin: 0 0 10px; font-size: clamp(1.18rem, 2vw, 1.5rem); }
    .question-text { margin: 0 0 18px; color: var(--muted); }

    .givens {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin: 18px 0 20px;
    }

    .given {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      min-height: 74px;
    }

    .given span { display: block; color: var(--muted); font-size: 0.82rem; margin-bottom: 2px; }
    .given strong { font-size: 1.08rem; }

    .steps { display: grid; gap: 12px; }

    .step {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .step-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      background: #fbfcfd;
      border-bottom: 1px solid var(--line);
    }

    .step-head h2 { margin: 0; font-size: 1rem; }
    .state { font-size: 0.84rem; color: var(--muted); white-space: nowrap; }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .choice {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      padding: 12px 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .choice:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); }
    .choice:disabled { cursor: default; color: var(--muted); }

    .choice .mark {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      font-weight: 800;
      color: var(--muted);
      background: var(--soft);
    }

    .choice.correct { border-color: #88caa7; background: var(--right-soft); color: var(--ink); }
    .choice.correct .mark { background: var(--right); border-color: var(--right); color: #fff; }
    .choice.wrong { border-color: #eda1a1; background: var(--wrong-soft); color: var(--ink); }
    .choice.wrong .mark { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    .feedback {
      display: none;
      margin: 0 14px 14px;
      border-radius: 8px;
      padding: 12px 13px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
    }

    .feedback.show { display: block; }
    .feedback.right { border-color: #99d5b4; background: var(--right-soft); }
    .feedback.wrong { border-color: #f0b2b2; background: var(--wrong-soft); }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      min-height: 42px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn:disabled { opacity: 0.48; cursor: not-allowed; }

    .visual { position: sticky; top: 94px; overflow: hidden; }
    .visual-head { padding: 15px 16px 0; }
    .visual-head h2 { margin: 0; font-size: 1rem; }
    .diagram-wrap { padding: 10px 12px 0; }
    svg { width: 100%; height: auto; display: block; }

    .formula-box {
      margin: 0 16px 16px;
      border-top: 1px solid var(--line);
      padding-top: 13px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .formula-box strong { color: var(--ink); }
    .frac {
      display: inline-grid;
      grid-template-rows: auto auto;
      vertical-align: middle;
      text-align: center;
      line-height: 1.12;
      margin: 0 .12em;
      white-space: nowrap;
    }
    .frac-top { border-bottom: 1.5px solid currentColor; padding: 0 .2em .08em; }
    .frac-bottom { padding: .08em .2em 0; }
    .dim-label, .force-label { font-size: 13px; font-weight: 700; fill: #26323f; }
    .muted-label { font-size: 12px; fill: #64717f; }

    .orbiting {
      transform-origin: 200px 145px;
      animation: orbit 7s linear infinite;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      .visual { position: static; order: -1; }
    }

    @media (max-width: 640px) {
      header { position: static; }
      .header-inner, .topic-row { align-items: stretch; flex-direction: column; }
      .score { justify-content: flex-start; }
      .choices { grid-template-columns: 1fr; }
    }

    .step[hidden]{display:none}
    .answer-input-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:12px}
    .answer-input{width:min(240px,100%);padding:11px 12px;border:2px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
    .answer-input:focus{outline:none;border-color:var(--accent)}
    .unit-label{font-weight:800;color:var(--muted)}
    .main-answer{margin:18px 0;padding:16px;border:2px solid #b9d6e2;border-radius:14px;background:#f7fcfe}
    .main-answer h3{margin:0 0 6px;font-size:1.04rem}.main-answer .choices{margin-top:12px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-inner">
        <h1>円運動 大問対策 - 万有引力</h1>
        <div class="score" aria-live="polite">
          <span>大問</span><span class="pill" id="progressText">0 / 2</span>
          <span>正答</span><span class="pill" id="scoreText">0 / 0</span>
          <span>連続</span><span class="pill" id="streakText">0</span>
        </div>
      </div>
    </header>

    <main>
      <section class="screen active" id="startScreen">
        <div class="panel start-card">
          <p class="tag">万有引力と円運動</p>
          <h2 class="question-title">万有引力と人工衛星：万有引力が向心力になる問題</h2>
          <p class="lead">式と数字で解くトレーナーです。万有引力の公式、向心力との関係、人工衛星の速度や周期を、短い設問で順に確認します。</p>
          <label for="studentId">学籍番号</label>
          <input class="student-input" id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">
          <div class="controls">
            <button class="btn primary" id="startBtn" type="button">スタート</button>
          </div>
        </div>
      </section>

      <section class="screen" id="quizScreen">
        <div class="layout">
          <section class="panel problem" aria-labelledby="problemTitle">
            <div class="topic-row">
              <div>
                <p class="tag">万有引力と円運動</p>
                <h2 class="question-title" id="problemTitle">万有引力の公式</h2>
              </div>
              <button class="btn" id="resetQuestionBtn" type="button">この大問を練習し直す</button>
            </div>

            <p class="question-text" id="questionText"></p>
            <div class="givens" id="givens" aria-label="与えられた値"></div>
            <div class="steps" id="steps"></div>
            <div class="main-answer" id="mainAnswerArea" hidden></div>
            <div class="hint-box" id="hintBox" aria-live="polite"></div>

            <div class="controls">
              <button class="btn primary" id="revealStepBtn" type="button" hidden>次の設問へ</button>
              <button class="btn" id="hintBtn" type="button" hidden>ヒントを表示</button>
              <button class="btn" id="showSolutionBtn" type="button">解説を表示</button>
              <button class="btn primary" id="nextBtn" type="button" disabled>結果を見る</button>
            </div>
          </section>

          <aside class="panel visual" aria-labelledby="visualTitle">
            <div class="visual-head">
              <h2 id="visualTitle">図</h2>
            </div>
            <div class="diagram-wrap">
              <svg viewBox="0 0 400 300" role="img" aria-labelledby="svgTitle svgDesc">
                <title id="svgTitle">地球と人工衛星の模式図</title>
                <desc id="svgDesc">地球のまわりを人工衛星が円軌道で動く様子。</desc>
                <defs>
                  <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d6f8f"></path>
                  </marker>
                  <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#b13b3b"></path>
                  </marker>
                </defs>

                <circle cx="200" cy="145" r="104" fill="#f8fbfc" stroke="#cfd8df" stroke-width="3"></circle>
                <circle cx="200" cy="145" r="28" fill="#f4b942" stroke="#b27b16" stroke-width="4"></circle>
                <text x="200" y="151" text-anchor="middle" font-size="16" font-weight="900" fill="#513500">M</text>
                <text x="176" y="110" class="muted-label">地球</text>

                <line x1="200" y1="145" x2="304" y2="145" stroke="#1d6f8f" stroke-width="4" marker-end="url(#arrowBlue)"></line>
                <text x="249" y="134" class="dim-label">r</text>

                <path d="M 246 50 A 104 104 0 0 1 304 145" fill="none" stroke="#1d6f8f" stroke-width="4" marker-end="url(#arrowBlue)"></path>
                <text x="252" y="55" class="dim-label">衛星の軌道</text>

                <g class="orbiting">
                  <circle cx="304" cy="145" r="17" fill="#1d6f8f" stroke="#15536a" stroke-width="3"></circle>
                  <text x="304" y="150" text-anchor="middle" font-size="12" font-weight="900" fill="#fff">衛星</text>
                  <line x1="294" y1="145" x2="232" y2="145" stroke="#b13b3b" stroke-width="5" marker-end="url(#arrowRed)"></line>
                  <text x="241" y="132" class="force-label">万有引力</text>
                </g>
              </svg>
            </div>
            <div class="formula-box">
              <div><strong>地球表面</strong>　万有引力を重力 mg として見る</div>
              <div><strong>人工衛星</strong>　万有引力が円運動に必要な力になる</div>
              <div><strong>ゴール</strong>　軌道速度 v = √<span class="frac"><span class="frac-top">GM</span><span class="frac-bottom">r</span></span> と第一宇宙速度を導く</div>
            </div>
          </aside>
        </div>
      </section>

      <section class="screen" id="finishScreen">
        <div class="panel finish-card">
          <p class="tag">結果</p>
          <h2 class="question-title">終了</h2>
          <div class="score-big" id="finalScoreText"></div>
          <div id="finalMessage"></div>
          <div class="send-status" id="sendStatus"></div>
          <div class="controls" style="justify-content:center">
            <button class="btn primary" id="againBtn" type="button">もう一度やる</button>
            <button class="btn" id="categoryBtn" type="button">円運動一覧へ</button>
            <button class="btn" id="homeBtn" type="button">トップへ</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../common/trainer_common_v2.js"></script>
  <script src="../common/universal_gravitation_extra_bank_v1.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/a/macros/toyo.jp/s/AKfycbxKE8qHKfpyllw3LqmC1fKrDgdeUR2w2H7Q0l33YWFTY_krYKyqlWz3UueyOjQlr-D7GQ/exec?v=3";
    const STAGE_NAME = "円運動/大問/万有引力";
    window.TrainerLog=window.TrainerLog||{startSession(){},startQuestion(){},recordQuestion(){},finishSession(){},showElapsedInFinalMessage(){},sendResult(){}};

    const previousProblemBank = [
      {
        id:"moonVelocity",
        title:"大問1　月の速度を求める",
        statement:"月が地球のまわりを半径 r の円軌道で、周期 T で公転している。月の速さ v を求めよ。",
        mainPrompt:"月の速さ v に最も近いものを選びなさい。",
        mainChoices:["0.102 km/s","1.02 km/s","10.2 km/s","102 km/s"],
        mainAnswer:"1.02 km/s",
        mainExplain:"v = 2πr/T に値を代入すると、月の速さは約1.02 km/sです。",
        givens:[["軌道半径","r = 3.84×10⁸ m"],["公転周期","T = 2.36×10⁶ s"]],
        hint:"1周の道のりを、1周にかかる時間で割ります。",
        steps:[
          {id:"distance",title:"誘導(1)　月が1周する道のり",prompt:"半径 r の円を1周する道のりを選びなさい。",type:"choice",choices:["2πr","πr","r²","2r"],answer:"2πr",explain:"円周の長さは 2πr です。"},
          {id:"speedDef",title:"誘導(2)　速さの定義",prompt:"速さを求める基本式を選びなさい。",type:"choice",choices:["速さ = 道のり / 時間","速さ = 時間 / 道のり","速さ = 力 / 質量","速さ = 半径 × 時間"],answer:"速さ = 道のり / 時間",explain:"速さは、進んだ道のりをかかった時間で割ります。"},
          {id:"formula",title:"誘導(3)　月の速さを文字式で表す",prompt:"1周の道のりが 2πr、周期が T のとき、速さ v はどれですか。",type:"choice",choices:["v = 2πr/T","v = T/2πr","v = 2πT/r","v = rT"],answer:"v = 2πr/T",explain:"1周の道のり 2πr を周期 T で割るので、v = 2πr/T です。"},
          {id:"value",title:"誘導(4)　数値を代入する",prompt:"r = 3.84×10⁸ m、T = 2.36×10⁶ s を代入し、月の速さを km/s で答えなさい。",type:"number",answer:1.02,tolerance:0.03,unit:"km/s",explain:"v = 2πr/T ≒ 1.02×10³ m/s = 1.02 km/s です。"}
        ]
      },
      {
        id:"moonPeriod",
        title:"大問2　月の周期を求める",
        statement:"地球の質量を M、月の質量を m、軌道半径を r とする。万有引力から月の公転周期 T を求めよ。",
        mainPrompt:"月の公転周期 T を表す式を選びなさい。",
        mainChoices:["T = 2π√(r³/GM)","T = 2π√(GM/r³)","T = √(GMr)","T = 2πr/GM"],
        mainAnswer:"T = 2π√(r³/GM)",
        mainExplain:"万有引力を向心力と等しくおき、v = 2πr/T を代入すると T = 2π√(r³/GM) です。",
        givens:[["万有引力定数","G"],["地球の質量","M"],["月の質量","m"],["軌道半径","r"]],
        hint:"万有引力が月を円運動させる向心力になります。",
        steps:[
          {id:"gravity",title:"誘導(1)　月にはたらく万有引力",prompt:"地球が月を引く万有引力を選びなさい。",type:"choice",choices:["F = GMm/r²","F = GMm/r","F = GM/r²","F = GMr²/m"],answer:"F = GMm/r²",explain:"質量 M と m、中心間距離 r なので F = GMm/r² です。"},
          {id:"centripetal",title:"誘導(2)　円運動に必要な力",prompt:"速さ v で半径 r の円運動をする月に必要な向心力を選びなさい。",type:"choice",choices:["mv²/r","mvr","mv/r²","mr²/v"],answer:"mv²/r",explain:"円運動に必要な向心力の大きさは mv²/r です。"},
          {id:"equation",title:"誘導(3)　2つの力を結びつける",prompt:"万有引力が向心力になることを表す式を選びなさい。",type:"choice",choices:["GMm/r² = mv²/r","GMm/r = mv²/r","GM/r² = mv²/r","GMm/r² = mvr"],answer:"GMm/r² = mv²/r",explain:"月にはたらく万有引力そのものが向心力になります。"},
          {id:"substitute",title:"誘導(4)　周期 T を式に入れる",prompt:"v = 2πr/T を代入した式を選びなさい。",type:"choice",choices:["GMm/r² = m(2πr/T)²/r","GMm/r² = m(T/2πr)²/r","GMm/r = m(2πr/T)²/r","GM/r² = 2πr/T"],answer:"GMm/r² = m(2πr/T)²/r",explain:"向心力 mv²/r の v に 2πr/T を代入します。"},
          {id:"period",title:"誘導(5)　周期 T を求める",prompt:"式を整理した結果を選びなさい。",type:"choice",choices:["T = 2π√(r³/GM)","T = 2π√(GM/r³)","T = √(GMr)","T = 2πr/GM"],answer:"T = 2π√(r³/GM)",explain:"月の質量 m は消え、T² = 4π²r³/GM、したがって T = 2π√(r³/GM) です。"}
        ]
      },
      {

        ["1/81","1","81"],["1/6","1","6"]
      ];
      return fractions.reduce((html,parts)=>html.split(parts[0]).join(frac(parts[1],parts[2])),String(value));
    }

    function guidedHint(problem){
      const orbitalIds=["satelliteMass","orbitalVelocity","moonSpeed","nearEarthSatellite","kepler","higherOrbit","earthMass"];
      if(orbitalIds.includes(problem.id)){
        return '<strong>① 万有引力を書く</strong><br>F = '+frac("GMm","r²")+'<br><br>'+
          '<strong>② 向心力と結ぶ</strong><br>万有引力が円運動の中心向きの力なので、'+frac("GMm","r²")+' = '+frac("mv²","r")+'<br><br>'+
          '<strong>③ 求める量について整理する</strong><br>衛星の質量 m は消え、v² = '+frac("GM","r")+'、したがって v = √'+frac("GM","r")+' です。<br><br>'+formatMathHtml(problem.hint);
      }
      if(problem.id==="smallPlanetGravity"){
        return '<strong>① 表面では距離が半径 R</strong><br>F = '+frac("GMm","R²")+'<br><br><strong>② F = mg と比べる</strong><br>g = '+frac("GM","R²")+'<br><br><strong>③ 比をとる</strong><br>質量比を掛け、半径比の2乗で割ります。';
      }
      if(problem.id==="inverseSquare"){
        return '<strong>万有引力の公式</strong><br>F = '+frac("GMm","r²")+'<br><br>力は2物体の質量に比例し、距離 r の2乗に反比例します。';
      }
      if(problem.id==="moonAcceleration"){
        return '<strong>① 速さ</strong><br>v = '+frac("2πr","T")+'<br><br><strong>② 向心加速度</strong><br>a = '+frac("v²","r")+'<br><br>先に求めた速さを、向心加速度の式へ代入します。';
      }
      return formatMathHtml(problem.hint);
    }

    function showScreen(id){
      document.querySelectorAll(".screen").forEach(screen=>{
        screen.classList.toggle("active",screen.id===id);
      });
    }

    function renderGivens(problem){
      $("#givens").innerHTML=problem.givens.map(item=>
        '<div class="given"><span>'+item[0]+'</span><strong>'+formatMathHtml(item[1])+'</strong></div>'
      ).join("");
    }

    function renderMainAnswer(problem){
      mainAnswerArea.innerHTML='<h3>大問の答え</h3><div class="state">'+formatMathHtml(problem.mainPrompt)+'</div>'+
        '<div class="choices">'+shuffle(problem.mainChoices).map((choice,index)=>
          '<button class="choice main-choice" type="button" data-value="'+encodeURIComponent(choice)+'">'+
          '<span class="mark">'+String.fromCharCode(65+index)+'</span><span>'+formatMathHtml(choice)+'</span></button>'
        ).join("")+'</div><div class="feedback" data-main-feedback></div>';
    }

    function renderProblem(){
      currentProblem=quiz[problemIndex];
      currentSteps=currentProblem.steps;
      stepState=currentSteps.map(()=>({answered:false,correct:false}));
      revealedCount=0;
      mainAnswered=false;
      mainCorrect=false;
      $("#problemTitle").textContent=currentProblem.title;
      $("#questionText").innerHTML=formatMathHtml(currentProblem.statement);
      renderGivens(currentProblem);
      renderMainAnswer(currentProblem);
      mainAnswerArea.hidden=true;
      stepsEl.innerHTML="";
      currentSteps.forEach((step,index)=>{
        const section=document.createElement("section");
        section.className="step";
        section.dataset.step=index;
        section.hidden=false;
        let answerHtml="";
        if(step.type==="choice"){
          answerHtml='<div class="choices">'+shuffle(step.choices).map((choice,choiceIndex)=>
            '<button class="choice" type="button" data-choice="'+choiceIndex+'" data-value="'+encodeURIComponent(choice)+'">'+
            '<span class="mark">'+String.fromCharCode(65+choiceIndex)+'</span><span>'+formatMathHtml(choice)+'</span></button>'
          ).join("")+'</div>';
        }else{
          answerHtml='<div class="answer-input-row"><input class="answer-input" type="text" inputmode="decimal" autocomplete="off" placeholder="数値を入力">'+
            '<span class="unit-label">'+step.unit+'</span><button class="btn primary check-input" type="button">答える</button></div>';
        }
        const hintHtml=index===currentSteps.length-1?'<button class="btn step-hint" type="button">ヒントを表示</button><div class="hint-box step-hint-box"></div>':'';
        section.innerHTML='<div class="step-head"><div><h2>設問('+(index+1)+')</h2><div class="state">'+formatMathHtml(step.prompt)+'</div></div>'+
          '<span class="state" data-state>未解答</span></div>'+answerHtml+hintHtml+'<div class="feedback" data-feedback></div>';
        stepsEl.appendChild(section);
      });
      hintBox.classList.remove("show");
      hintBox.innerHTML="";
      hintBtn.disabled=true;
      hintBtn.textContent="ヒントを表示";
      revealedCount=currentSteps.length;
      revealStepBtn.disabled=true;
      revealStepBtn.textContent="この設問に答えてください";
      nextBtn.disabled=true;
      nextBtn.textContent=problemIndex+1>=quiz.length?"結果を見る":"次の大問";
      TrainerLog.startQuestion();
      updateScore();
    }

    function finishMain(correct,selected,revealed){
      if(mainAnswered)return;
      mainAnswered=true;
      mainCorrect=correct;
      recordFirstAttempt({id:"main",prompt:currentProblem.mainPrompt,answer:currentProblem.mainAnswer},-1,correct,selected);
      const buttons=mainAnswerArea.querySelectorAll(".main-choice");
      buttons.forEach(button=>{
        button.disabled=true;
        const value=decodeURIComponent(button.dataset.value);
        if((correct||revealed)&&value===currentProblem.mainAnswer)button.classList.add("correct");
        if(!correct&&!revealed&&value===selected)button.classList.add("wrong");
      });
      const feedback=mainAnswerArea.querySelector("[data-main-feedback]");
      if(correct||revealed){
        feedback.innerHTML=formatMathHtml('<strong>正解：'+currentProblem.mainAnswer+'</strong><br>'+currentProblem.mainExplain);
      }else{
        feedback.innerHTML='<strong>不正解です。</strong><br>「誘導を見る」で、式を1段階ずつ組み立ててみましょう。';
      }
      feedback.className="feedback show "+(correct?"right":"wrong");
      if(correct||(revealedCount===currentSteps.length&&stepState.every(item=>item.answered)))nextBtn.disabled=false;
      updateScore();
    }

    function answerMain(button){
      const selected=decodeURIComponent(button.dataset.value);
      finishMain(selected===currentProblem.mainAnswer,selected,false);
    }

    function revealNextStep(){
      if(revealedCount>=currentSteps.length)return;
      const section=stepsEl.querySelector('[data-step="'+revealedCount+'"]');
      section.hidden=false;
      revealedCount++;
      hintBtn.disabled=false;
      hintBox.classList.remove("show");
      hintBox.innerHTML="";
      TrainerLog.startQuestion();
      revealStepBtn.disabled=true;
      revealStepBtn.textContent=revealedCount>=currentSteps.length?"最後の設問です":"この設問に答えてください";
      section.scrollIntoView({behavior:"smooth",block:"nearest"});
    }

    function recordFirstAttempt(step,index,correct,selected){
      const key=currentProblem.id+"/"+step.id;
      if(attemptRecords[key])return false;
      attemptRecords[key]=true;
      score.total++;
      if(correct){score.correct++;score.streak++;}else{score.streak=0;}
      TrainerLog.recordQuestion({
        id:"UG_"+key,
        type:currentProblem.id,
        question:step.prompt,
        answer:String(step.answer)
      },correct,{selected:selected,prompt:step.prompt});
      return true;
    }

    function finishStep(index,correct,selected,revealed){
      if(stepState[index].answered)return;
      const step=currentSteps[index];
      const first=recordFirstAttempt(step,index,correct,selected);
      stepState[index]={answered:true,correct:correct};
      const section=stepsEl.querySelector('[data-step="'+index+'"]');
      section.querySelectorAll("button,input").forEach(el=>el.disabled=true);
      if(step.type==="choice"){
        section.querySelectorAll(".choice").forEach(button=>{
          const value=decodeURIComponent(button.dataset.value);
          if(value===step.answer)button.classList.add("correct");
          if(value===selected&&!correct&&!revealed)button.classList.add("wrong");
        });
      }
      const state=section.querySelector("[data-state]");
      state.textContent=correct?(first?"正解":"練習で正解"):(revealed?"解説を確認":"不正解");
      state.style.color=correct?"var(--right)":"var(--wrong)";
      const feedback=section.querySelector("[data-feedback]");
      feedback.innerHTML=correct
        ? formatMathHtml('<strong>正解：'+step.answer+(step.unit?" "+step.unit:"")+'</strong><br>'+step.explain)
        : formatMathHtml('<strong>正解：'+step.answer+(step.unit?" "+step.unit:"")+'</strong><br>'+step.explain)+'<hr><strong>使う公式と考え方</strong><br>'+guidedHint(currentProblem);
      feedback.className="feedback show "+(correct?"right":"wrong");
      hintBox.classList.remove("show");
      hintBox.innerHTML="";
      if(revealedCount<currentSteps.length){
        revealStepBtn.disabled=false;
        revealStepBtn.textContent="次の設問へ";
      }else if(stepState.every(item=>item.answered)){
        nextBtn.disabled=false;
        revealStepBtn.disabled=true;
        revealStepBtn.textContent="すべての設問に解答しました";
      }
      updateScore();
    }

    function answerChoice(index,button){
      const step=currentSteps[index];
      const selected=decodeURIComponent(button.dataset.value);
      finishStep(index,selected===step.answer,selected,false);
    }

    function answerNumber(index,section){
      const step=currentSteps[index];
      const input=section.querySelector(".answer-input");
      const raw=input.value.trim().replace("，", ".").replace(",", ".");
      if(!raw){alert("数値を入力してください。");input.focus();return;}
      const value=Number(raw);
      if(!Number.isFinite(value)){alert("数値で入力してください。");input.focus();return;}
      finishStep(index,Math.abs(value-step.answer)<=step.tolerance,raw,false);
    }

    function toggleHint(){
      if(!revealedCount)return;
      const index=revealedCount-1;
      if(stepState[index].answered)return;
      const show=!hintBox.classList.contains("show");
      if(show){
        hintBox.innerHTML='<strong>ヒント</strong><br>'+formatMathHtml(currentProblem.hint);
        hintBox.classList.add("show");
        hintBtn.textContent="ヒントを隠す";
      }else{
        hintBox.classList.remove("show");
        hintBtn.textContent="ヒントを表示";
      }
    }

    function showSolution(){
      while(revealedCount<currentSteps.length){
        const section=stepsEl.querySelector('[data-step="'+revealedCount+'"]');
        section.hidden=false;revealedCount++;
      }
      currentSteps.forEach((step,index)=>{
        if(!stepState[index].answered)finishStep(index,false,"解説表示",true);
      });
      nextBtn.disabled=false;
      revealStepBtn.disabled=true;
    }

    function resetCurrentProblem(){
      score.streak=0;
      renderProblem();
    }

    function startQuiz(){
      const studentId=$("#studentId").value.trim();
      if(!studentId){alert("学籍番号を入力してください。");$("#studentId").focus();return;}
      quiz=shuffle(problemBank).slice(0,2);
      problemIndex=0;
      score={correct:0,total:0,streak:0};
      attemptRecords={};
      TrainerLog.startSession();
      showScreen("quizScreen");
      renderProblem();
    }

    function updateScore(){
      progressText.textContent=(problemIndex+1)+" / "+quiz.length;
      scoreText.textContent=score.correct+" / "+score.total;
      streakText.textContent=String(score.streak);
    }

    function finishQuiz(){
      TrainerLog.finishSession();
      const rate=score.total?Math.round(score.correct/score.total*100):0;
      $("#finalScoreText").textContent=score.correct+" / "+score.total+"（"+rate+"%）";
      $("#finalMessage").innerHTML=rate>=70
        ? '<div class="pass">クリア！2つの大問を、誘導に沿って最後まで組み立てられました。</div>'
        : '<div class="fail">解説で式のつながりを確認し、もう一度挑戦しましょう。</div>';
      TrainerLog.showElapsedInFinalMessage();
      showScreen("finishScreen");
      TrainerLog.sendResult({score:score.correct,total:score.total});
    }

    stepsEl.addEventListener("click",event=>{
      const section=event.target.closest(".step");
      if(!section)return;
      const stepHint=event.target.closest(".step-hint");
      if(stepHint){
        const box=section.querySelector(".step-hint-box");
        const show=!box.classList.contains("show");
        box.innerHTML=show?'<strong>ヒント</strong><br>'+guidedHint(currentProblem):'';
        box.classList.toggle("show",show);
        stepHint.textContent=show?"ヒントを隠す":"ヒントを表示";
        return;
      }
      const index=Number(section.dataset.step);
      const choice=event.target.closest(".choice");
      if(choice){answerChoice(index,choice);return;}
      if(event.target.closest(".check-input"))answerNumber(index,section);
    });
    mainAnswerArea.addEventListener("click",event=>{
      const choice=event.target.closest(".main-choice");
      if(choice)answerMain(choice);
    });
    stepsEl.addEventListener("keydown",event=>{
      if(event.key==="Enter"&&event.target.classList.contains("answer-input")){
        const section=event.target.closest(".step");
        answerNumber(Number(section.dataset.step),section);
      }
    });
    revealStepBtn.addEventListener("click",revealNextStep);
    hintBtn.addEventListener("click",toggleHint);
    $("#showSolutionBtn").addEventListener("click",showSolution);
    $("#resetQuestionBtn").addEventListener("click",resetCurrentProblem);
    nextBtn.addEventListener("click",()=>{
      if(problemIndex+1>=quiz.length){finishQuiz();return;}
      problemIndex++;renderProblem();
    });
    $("#startBtn").addEventListener("click",startQuiz);
    $("#againBtn").addEventListener("click",()=>{
      showScreen("startScreen");
      progressText.textContent="0 / 2";scoreText.textContent="0 / 0";streakText.textContent="0";$("#sendStatus").textContent="";
    });
    $("#categoryBtn").addEventListener("click",()=>{location.href="index.html";});
    $("#homeBtn").addEventListener("click",()=>{location.href="../index.html";});
    $("#studentId").addEventListener("keydown",event=>{if(event.key==="Enter")startQuiz();});
    progressText.textContent="0 / 2";
  </script>
</body>
</html>
