<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stage5 向心加速度トレーナー</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--soft:#f8fafc}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:22px 14px 46px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}
.lead{color:var(--muted);font-size:.96rem;margin-bottom:16px}
.top{display:flex;justify-content:space-between;gap:12px;align-items:center;color:var(--muted);font-size:.95rem;margin-top:12px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}
.bar>div{height:100%;width:0%;background:var(--accent);transition:width .25s ease}
.question{font-size:1.25rem;font-weight:800;margin:18px 0;padding:16px;background:var(--soft);border-radius:14px;border:1px solid var(--line)}
.choices{display:grid;gap:12px;margin:16px 0}
.choice{width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:var(--text);border-radius:14px;padding:14px 16px;font-size:1.06rem;font-weight:700;cursor:pointer}
.choice:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.10)}
.choice:disabled{cursor:default;opacity:1}
.choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}
.choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}
.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}
.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid var(--line);border-radius:10px;font-family:"Times New Roman",serif;font-size:1.12rem;overflow-x:auto}
.compare{margin-top:10px;padding:10px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;color:#1e3a8a;font-weight:700}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:var(--accent);color:#fff}
button.secondary{background:#e5e7eb;color:#111827}
button:disabled{opacity:.5;cursor:not-allowed}
.result{text-align:center;padding:24px 8px}
.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}
.pass{color:var(--ok);font-weight:900}
.fail{color:var(--ng);font-weight:900}
.note{margin-top:16px;padding:12px 14px;border-left:5px solid #cbd5e1;background:#f8fafc;border-radius:10px;color:#475569;font-size:.95rem}
.badge{display:inline-block;font-size:.85rem;padding:2px 8px;border-radius:99px;background:#dbeafe;color:#1e40af;margin-bottom:8px}
.figure{display:flex;justify-content:center}
svg{max-width:260px;width:100%;height:auto}
input{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.status{font-size:.92rem;color:#6b7280;margin-top:10px}
@media(max-width:520px){.card{padding:18px}.question{font-size:1.1rem}.choice{font-size:1rem}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>Stage5 向心加速度トレーナー</h1>
<div class="lead">向心加速度 a = rω² を練習する4択クイズです。10問ランダム出題、70%以上でクリア。</div>

<div id="startScreen">
<div class="note">
このステージでは、円運動の <b>向心加速度</b> を求めます。<br>
<b>v = rω</b> に続いて、<b>a = rω²</b> を使います。<br>
</div>
<div class="figure">
<svg viewBox="0 0 220 160">
<circle cx="105" cy="88" r="58" fill="none" stroke="#cbd5e1" stroke-width="3"/>
<path d="M105 88 L163 88" stroke="#1f2937" stroke-width="4"/>
<path d="M163 88 Q160 56 134 40" fill="none" stroke="#2563eb" stroke-width="6"/>
<path d="M134 40 l15 -2 l-8 13" fill="none" stroke="#2563eb" stroke-width="5"/>
<path d="M163 88 L108 88" stroke="#dc2626" stroke-width="5"/>
<path d="M108 88 l12 -7 l0 14" fill="none" stroke="#dc2626" stroke-width="5"/>
<text x="132" y="105" font-size="16">r</text>
<text x="145" y="53" font-size="16" fill="#2563eb">v</text>
<text x="118" y="76" font-size="16" fill="#dc2626">a</text>
<text x="92" y="78" font-size="16">ω</text>
</svg>
</div>

<div class="note">学籍番号を入力してからスタートしてください。</div>
<input id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">

<div class="buttons"><button id="startBtn">スタート</button></div>
</div>

<div id="quizScreen" style="display:none">
<div class="top"><div id="count"></div><div id="score"></div></div>
<div class="bar"><div id="bar"></div></div>
<div id="question" class="question"></div>
<div id="choices" class="choices"></div>
<div id="feedback" class="feedback"></div>
<div class="buttons"><button id="nextBtn" disabled>次の問題</button><button class="secondary" id="restartBtn">最初から</button></div>
</div>

<div id="finishScreen" class="result" style="display:none">
<div>結果</div>
<div id="finalScore" class="scorebig"></div>
<div id="finalMessage"></div>
<div id="sendStatus" class="status"></div>
<div class="buttons" style="justify-content:center">
<button id="againBtn">もう一度やる</button>
<button class="secondary" id="reviewBtn">間違えた問題だけ復習</button>
</div>
</div>
</div></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwBDYL4LmMQrNA0MFUAJ2gBtYumSQLoLKicRQnNoyhePgplh7q-CQ_kW3BjhCRnkDFDTQ/exec?v=3";
const STAGE_NAME = "Stage5 向心加速度トレーナー";

const calcProblems=[
{type:"calc",r:"2",omega:"3",ans:"18 [m/s²]",calc:"2 × 3² = 18",question:"半径 r = 2 [m]、角速度 ω = 3 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"4",omega:"2",ans:"16 [m/s²]",calc:"4 × 2² = 16",question:"半径 r = 4 [m]、角速度 ω = 2 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"3",omega:"2",ans:"12 [m/s²]",calc:"3 × 2² = 12",question:"半径 r = 3 [m]、角速度 ω = 2 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"5",omega:"2",ans:"20 [m/s²]",calc:"5 × 2² = 20",question:"半径 r = 5 [m]、角速度 ω = 2 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"1",omega:"4",ans:"16 [m/s²]",calc:"1 × 4² = 16",question:"半径 r = 1 [m]、角速度 ω = 4 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"6",omega:"1",ans:"6 [m/s²]",calc:"6 × 1² = 6",question:"半径 r = 6 [m]、角速度 ω = 1 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"1",omega:"π",ans:"π² [m/s²]",calc:"1 × π² = π²",question:"半径 r = 1 [m]、角速度 ω = π [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"2",omega:"π",ans:"2π² [m/s²]",calc:"2 × π² = 2π²",question:"半径 r = 2 [m]、角速度 ω = π [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"4",omega:"π/2",ans:"π² [m/s²]",calc:"4 × (π/2)² = π²",question:"半径 r = 4 [m]、角速度 ω = π/2 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"8",omega:"π/2",ans:"2π² [m/s²]",calc:"8 × (π/2)² = 2π²",question:"半径 r = 8 [m]、角速度 ω = π/2 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"3",omega:"π",ans:"3π² [m/s²]",calc:"3 × π² = 3π²",question:"半径 r = 3 [m]、角速度 ω = π [rad/s] のとき、向心加速度 a は何 [m/s²] か。"},
{type:"calc",r:"9",omega:"π/3",ans:"π² [m/s²]",calc:"9 × (π/3)² = π²",question:"半径 r = 9 [m]、角速度 ω = π/3 [rad/s] のとき、向心加速度 a は何 [m/s²] か。"}
];

const relationProblems=[
{type:"rel",ans:"4倍",question:"半径 r が一定のとき、角速度 ω が2倍になると、向心加速度 a は何倍になるか。",calc:"a = rω² なので、ωが2倍 → aは2² = 4倍"},
{type:"rel",ans:"9倍",question:"半径 r が一定のとき、角速度 ω が3倍になると、向心加速度 a は何倍になるか。",calc:"a = rω² なので、ωが3倍 → aは3² = 9倍"},
{type:"rel",ans:"1/4倍",question:"半径 r が一定のとき、角速度 ω が1/2倍になると、向心加速度 a は何倍になるか。",calc:"a = rω² なので、ωが1/2倍 → aは(1/2)² = 1/4倍"},
{type:"rel",ans:"2倍",question:"角速度 ω が一定のとき、半径 r が2倍になると、向心加速度 a は何倍になるか。",calc:"a = rω² なので、rが2倍 → aは2倍"},
{type:"rel",ans:"1/2倍",question:"角速度 ω が一定のとき、半径 r が1/2倍になると、向心加速度 a は何倍になるか。",calc:"a = rω² なので、rが1/2倍 → aは1/2倍"}
];

const allAns=["6 [m/s²]","12 [m/s²]","16 [m/s²]","18 [m/s²]","20 [m/s²]","π² [m/s²]","2π² [m/s²]","3π² [m/s²]","4倍","9倍","1/4倍","2倍","1/2倍"];

const accelAns=["6 [m/s²]","12 [m/s²]","16 [m/s²]","18 [m/s²]","20 [m/s²]","π² [m/s²]","2π² [m/s²]","3π² [m/s²]"];
const relationAns=["2倍","3倍","4倍","9倍","1/2倍","1/4倍"];

let quiz=[],index=0,score=0,wrongList=[],answered=false,resultSent=false;
const total=10,$=id=>document.getElementById(id);

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeChoices(q){
 let pool = q.type==="calc" ? accelAns : relationAns;
 return shuffle([q.ans,...shuffle(pool.filter(x=>x!==q.ans)).slice(0,3)]);
}
function buildQuiz(){return [...shuffle(calcProblems).slice(0,8),...shuffle(relationProblems).slice(0,2)]}

function start(useWrong=false){
 const studentId=$("studentId").value.trim();
 if(!studentId){alert("学籍番号を入力してください。");$("studentId").focus();return;}
 let source=useWrong&&wrongList.length?wrongList:buildQuiz();
 quiz=shuffle(source).slice(0,total).map(q=>({...q,choices:makeChoices(q)}));
 index=0;score=0;wrongList=[];resultSent=false;
 $("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion();
}

function showQuestion(){
 answered=false;let q=quiz[index];
 $("count").textContent=`${index+1} / ${quiz.length}`;
 $("score").textContent=`正解 ${score}`;
 $("bar").style.width=`${index/quiz.length*100}%`;
 let badge=q.type==="calc"?"a = rω² の計算":"比例関係";
 $("question").innerHTML=`<span class="badge">${badge}</span><br>${q.question}`;
 $("feedback").className="feedback";$("feedback").style.display="none";$("nextBtn").disabled=true;
 let box=$("choices");box.innerHTML="";
 q.choices.forEach((c,i)=>{let b=document.createElement("button");b.className="choice";b.dataset.answer=c;b.innerHTML=`${["①","②","③","④"][i]}　${c}`;b.onclick=()=>check(c,b);box.appendChild(b)});
}

function explanation(q,ok){
 if(q.type==="calc"){
  return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong>
  <div class="formula">a = rω²<br>= ${q.calc} [m/s²]</div>
  <div class="note">ポイント：v = rω に続いて、向心加速度は a = rω² で求められます。</div>`;
 }
 return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong>
 <div class="formula">${q.calc}</div>
 <div class="note">ポイント：a = rω² なので、ωの変化は2乗で効きます。</div>`;
}

function check(selected,btn){
 if(answered)return;answered=true;let q=quiz[index],ok=selected===q.ans;
 if(ok)score++;else wrongList.push(q);
 document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.dataset.answer===q.ans)b.classList.add("correct")});
 if(!ok)btn.classList.add("wrong");
 $("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML=explanation(q,ok);$("feedback").style.display="block";$("score").textContent=`正解 ${score}`;$("nextBtn").disabled=false;
}

function next(){index++;index>=quiz.length?finish():showQuestion()}

function finish(){
 $("quizScreen").style.display="none";$("finishScreen").style.display="block";
 let rate=Math.round(score/quiz.length*100);
 $("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;
 $("finalMessage").innerHTML=rate>=70?`<div class="pass">クリア！向心加速度の基本はいい感じです。</div>`:`<div class="fail">もう一回やると、a = rω² が定着します。</div>`;
 $("reviewBtn").style.display=wrongList.length?"inline-block":"none";
 sendResult(rate);
}

function sendResult(rate){
 if(resultSent)return;
 resultSent=true;
 const studentId=$("studentId").value.trim();
 $("sendStatus").textContent="結果を送信中...";
 fetch(GAS_URL,{
  method:"POST",
  mode:"no-cors",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({studentId:studentId,stage:STAGE_NAME,score:score,total:quiz.length,rate:rate+"%"})
 }).then(()=>{$("sendStatus").textContent="結果を送信しました。";})
   .catch(()=>{$("sendStatus").textContent="結果送信に失敗しました。ネットワークを確認してください。";});
}

$("startBtn").onclick=()=>start(false);
$("nextBtn").onclick=next;
$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start(false);});
$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};
$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};
$("reviewBtn").onclick=()=>{if(wrongList.length){let saved=[...wrongList];quiz=shuffle(saved).slice(0,10).map(q=>({...q,choices:makeChoices(q)}));index=0;score=0;wrongList=[];resultSent=false;$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion();}};
</script>
</body>
</html>
