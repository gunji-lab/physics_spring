<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>円運動 Stage3 角速度と速さトレーナー</title>
<style>
body{margin:0;background:#f6f7fb;color:#1f2937;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:22px 14px 46px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}.lead{color:#6b7280}
.top{display:flex;justify-content:space-between;color:#6b7280;margin-top:12px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}.bar>div{height:100%;width:0;background:#2563eb}
.question{font-size:1.25rem;font-weight:800;margin:18px 0;padding:16px;background:#f8fafc;border-radius:14px;border:1px solid #e5e7eb}
.choices{display:grid;gap:12px;margin:16px 0}
.choice{width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:#1f2937;border-radius:14px;padding:14px 16px;font-size:1.06rem;font-weight:700;cursor:pointer}
.choice.selected{border-color:#2563eb;background:#eff6ff;box-shadow:0 0 0 3px rgba(37,99,235,.16)}
.choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}.choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;font-family:"Times New Roman",serif;font-size:1.12rem;overflow-x:auto}
.compare{margin-top:10px;padding:10px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;color:#1e3a8a;font-weight:700}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}#restartBtn{flex-basis:100%}button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:#2563eb;color:white}button.secondary{background:#e5e7eb;color:#111827}button:disabled{opacity:.5;cursor:not-allowed}
.result{text-align:center;padding:24px 8px}.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}.pass{color:#16a34a;font-weight:900}.fail{color:#dc2626;font-weight:900}
.note{margin-top:16px;padding:12px 14px;border-left:5px solid #cbd5e1;background:#f8fafc;border-radius:10px;color:#475569}.badge{display:inline-block;font-size:.85rem;padding:2px 8px;border-radius:99px;background:#dbeafe;color:#1e40af;margin-bottom:8px}
.figure{display:flex;justify-content:center}svg{max-width:260px;width:100%;height:auto}
input{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.status{font-size:.92rem;color:#6b7280;margin-top:10px}
@media(max-width:520px){.card{padding:18px}.question{font-size:1.1rem}.choice{font-size:1rem}}
</style></head>
<body>
<div class="wrap"><div class="card">
<h1>Stage3 角速度と速さトレーナー</h1>
<div class="lead">角速度から円運動の速さを求める4択クイズです。10問ランダム出題、70%以上でクリア。</div>

<div id="startScreen">
<div class="note">
このステージでは <b>v = rω</b> を練習します。<br>
単位はすべて [ ] 付きで表示します。答えも <b>π [m/s]</b> の形で選びます。
</div>
<div class="figure">
<svg viewBox="0 0 220 160">
<circle cx="105" cy="88" r="58" fill="none" stroke="#cbd5e1" stroke-width="3"/>
<path d="M105 88 L163 88" stroke="#1f2937" stroke-width="4"/>
<path d="M163 88 Q160 56 134 40" fill="none" stroke="#2563eb" stroke-width="6"/>
<path d="M134 40 l15 -2 l-8 13" fill="none" stroke="#2563eb" stroke-width="5"/>
<text x="132" y="105" font-size="16">r</text>
<text x="145" y="53" font-size="16" fill="#2563eb">v</text>
<text x="94" y="78" font-size="16">ω</text>
</svg>
</div>
<div class="note">学籍番号を入力してからスタートしてください。</div>
<input id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">
<div class="buttons"><button id="startBtn">スタート</button></div>
</div>

<div id="quizScreen" style="display:none">
<div class="top"><div id="count"></div><div id="score"></div></div>
<div class="bar"><div id="bar"></div></div>
<div id="question" class="question"></div>
<div id="choices" class="choices"></div>
<div id="feedback" class="feedback"></div>
<div class="buttons"><button id="answerBtn" disabled>答える</button><button id="nextBtn" disabled>次の問題</button><button class="secondary" id="restartBtn">最初から</button></div>
</div>

<div id="finishScreen" class="result" style="display:none">
<div>結果</div><div id="finalScore" class="scorebig"></div><div id="finalMessage"></div><div id="sendStatus" class="status"></div>
<div class="buttons" style="justify-content:center"><button id="againBtn">もう一度やる</button><button class="secondary" id="reviewBtn">間違えた問題だけ復習</button><button class="secondary" id="categoryBtn">カテゴリトップへ</button><button class="secondary" id="homeBtn">トップページへ</button></div>
</div>
</div></div>

<script src="../common/trainer_common_v2.js"></script>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwBDYL4LmMQrNA0MFUAJ2gBtYumSQLoLKicRQnNoyhePgplh7q-CQ_kW3BjhCRnkDFDTQ/exec?v=3";
const STAGE_NAME = "円運動/Stage3/角速度と速さ";

const radProblems=[
{mode:"rad",r:2,omega:"3 [rad/s]",omegaRad:"3 [rad/s]",ans:"6 [m/s]",calc:"2 × 3 = 6"},
{mode:"rad",r:4,omega:"2 [rad/s]",omegaRad:"2 [rad/s]",ans:"8 [m/s]",calc:"4 × 2 = 8"},
{mode:"rad",r:3,omega:"4 [rad/s]",omegaRad:"4 [rad/s]",ans:"12 [m/s]",calc:"3 × 4 = 12"},
{mode:"rad",r:5,omega:"2 [rad/s]",omegaRad:"2 [rad/s]",ans:"10 [m/s]",calc:"5 × 2 = 10"},
{mode:"rad",r:2,omega:"π [rad/s]",omegaRad:"π [rad/s]",ans:"2π [m/s]",calc:"2 × π = 2π"},
{mode:"rad",r:4,omega:"π/2 [rad/s]",omegaRad:"π/2 [rad/s]",ans:"2π [m/s]",calc:"4 × π/2 = 2π"},
{mode:"rad",r:3,omega:"π [rad/s]",omegaRad:"π [rad/s]",ans:"3π [m/s]",calc:"3 × π = 3π"},
{mode:"rad",r:6,omega:"π/3 [rad/s]",omegaRad:"π/3 [rad/s]",ans:"2π [m/s]",calc:"6 × π/3 = 2π"},
{mode:"rad",r:2,omega:"2π [rad/s]",omegaRad:"2π [rad/s]",ans:"4π [m/s]",calc:"2 × 2π = 4π"},
{mode:"rad",r:1,omega:"2π [rad/s]",omegaRad:"2π [rad/s]",ans:"2π [m/s]",calc:"1 × 2π = 2π"},
{mode:"rad",r:8,omega:"π/4 [rad/s]",omegaRad:"π/4 [rad/s]",ans:"2π [m/s]",calc:"8 × π/4 = 2π"},
{mode:"rad",r:10,omega:"π/5 [rad/s]",omegaRad:"π/5 [rad/s]",ans:"2π [m/s]",calc:"10 × π/5 = 2π"}
];
const degProblems=[
{mode:"deg",r:2,omega:"180 [°/s]",deg:180,omegaRad:"π [rad/s]",ans:"2π [m/s]",calc:"2 × π = 2π"},
{mode:"deg",r:4,omega:"90 [°/s]",deg:90,omegaRad:"π/2 [rad/s]",ans:"2π [m/s]",calc:"4 × π/2 = 2π"},
{mode:"deg",r:3,omega:"60 [°/s]",deg:60,omegaRad:"π/3 [rad/s]",ans:"π [m/s]",calc:"3 × π/3 = π"},
{mode:"deg",r:6,omega:"30 [°/s]",deg:30,omegaRad:"π/6 [rad/s]",ans:"π [m/s]",calc:"6 × π/6 = π"},
{mode:"deg",r:2,omega:"90 [°/s]",deg:90,omegaRad:"π/2 [rad/s]",ans:"π [m/s]",calc:"2 × π/2 = π"},
{mode:"deg",r:4,omega:"45 [°/s]",deg:45,omegaRad:"π/4 [rad/s]",ans:"π [m/s]",calc:"4 × π/4 = π"}
];
const revProblems=[
{mode:"rev",r:2,rev:"1周/秒",omegaRad:"2π [rad/s]",ans:"4π [m/s]",calc:"2 × 2π = 4π"},
{mode:"rev",r:1,rev:"1周/秒",omegaRad:"2π [rad/s]",ans:"2π [m/s]",calc:"1 × 2π = 2π"},
{mode:"rev",r:3,rev:"1周/秒",omegaRad:"2π [rad/s]",ans:"6π [m/s]",calc:"3 × 2π = 6π"},
{mode:"rev",r:2,rev:"1/2周/秒",omegaRad:"π [rad/s]",ans:"2π [m/s]",calc:"2 × π = 2π"},
{mode:"rev",r:4,rev:"1/2周/秒",omegaRad:"π [rad/s]",ans:"4π [m/s]",calc:"4 × π = 4π"},
{mode:"rev",r:1,rev:"2周/秒",omegaRad:"4π [rad/s]",ans:"4π [m/s]",calc:"1 × 4π = 4π"}
];

const allAns=["π [m/s]","2π [m/s]","3π [m/s]","4π [m/s]","6π [m/s]","6 [m/s]","8 [m/s]","10 [m/s]","12 [m/s]"];
let quiz=[],index=0,score=0,wrongList=[],answered=false,resultSent=false,selectedAnswer="",selectedButton=null;const total=10,$=id=>document.getElementById(id);
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeChoices(q){return shuffle([q.ans,...shuffle(allAns.filter(x=>x!==q.ans)).slice(0,3)])}
function buildQuiz(){return [...shuffle(radProblems).slice(0,6),...shuffle(degProblems).slice(0,2),...shuffle(revProblems).slice(0,2)]}
function start(useWrong=false){
 const studentId=$("studentId").value.trim();
 if(!studentId){alert("学籍番号を入力してください。");$("studentId").focus();return;}
 let source=useWrong&&wrongList.length?wrongList:buildQuiz();
 quiz=shuffle(source).slice(0,total).map(q=>({...q,choices:makeChoices(q)}));
 index=0;score=0;wrongList=[];resultSent=false;
    TrainerLog.startSession();
 $("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion()
}
function showQuestion(){answered=false;selectedAnswer="";selectedButton=null;let q=quiz[index];$("count").textContent=`${index+1} / ${quiz.length}`;$("score").textContent=`正解 ${score}`;$("bar").style.width=`${index/quiz.length*100}%`;
let badge=q.mode==="rad"?"[rad/s]から計算":q.mode==="deg"?"[°/s]から計算":"周回数から計算";
let body="";
if(q.mode==="rev"){body=`半径 r = ${q.r} [m] の円運動で、物体は ${q.rev} で回転している。<br>速さ v は何 [m/s]か。`;}
else{body=`半径 r = ${q.r} [m]、角速度 ω = ${q.omega} のとき、速さ v は何 [m/s]か。`;}
$("question").innerHTML=`<span class="badge">${badge}</span><br>${body}`;
$("feedback").className="feedback";$("feedback").style.display="none";$("answerBtn").disabled=true;$("nextBtn").disabled=true;let box=$("choices");box.innerHTML="";
q.choices.forEach((c,i)=>{let b=document.createElement("button");b.className="choice";b.dataset.answer=c;b.innerHTML=`${["①","②","③","④"][i]}　${c}`;b.onclick=()=>selectChoice(c,b);box.appendChild(b)});TrainerLog.startQuestion();}
function selectChoice(selected,btn){if(answered)return;selectedAnswer=selected;selectedButton=btn;document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"));btn.classList.add("selected");$("answerBtn").disabled=false;}

function explanation(q,ok){
 if(q.mode==="rad"){return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong><div class="formula">v = rω<br>= ${q.calc} [m/s]</div><div class="note">ポイント：ω が [rad/s] で表されているとき、v = rω で速さを求められます。</div>`}
 if(q.mode==="deg"){return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong><div class="formula">角速度を [rad/s] に直す：<br>${q.omega} = ${q.omegaRad}</div><div class="formula">v = rω<br>= ${q.calc} [m/s]</div><div class="compare">[°/s] のままではなく、[rad/s] に直すと v = rω が使えます。</div>`}
 return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong><div class="formula">${q.rev} → ω = ${q.omegaRad}</div><div class="formula">v = rω<br>= ${q.calc} [m/s]</div><div class="compare">1周 = 2π [rad] なので、周回数から角速度を考えられます。</div>`;
}
function check(){if(answered)return;if(!selectedAnswer)return;answered=true;let q=quiz[index],ok=selectedAnswer===q.ans;
if(!q.id){q.id=`CM3_${q.mode}_${index+1}`;}
TrainerLog.recordQuestion(q,ok,{
selected:selectedAnswer,
answer:q.ans,
prompt:$("question").innerText
});
if(ok)score++;else wrongList.push(q);document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.dataset.answer===q.ans)b.classList.add("correct")});if(!ok&&selectedButton)selectedButton.classList.add("wrong");$("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML=explanation(q,ok);$("feedback").style.display="block";$("score").textContent=`正解 ${score}`;$("answerBtn").disabled=true;$("nextBtn").disabled=false}
function next(){index++;index>=quiz.length?finish():showQuestion()}
function finish(){
  TrainerLog.finishSession();
 $("quizScreen").style.display="none";$("finishScreen").style.display="block";
 let rate=Math.round(score/quiz.length*100);
 $("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;
 $("finalMessage").innerHTML=rate>=70?`<div class="pass">クリア！v = rω の基本はいい感じです。</div>`:`<div class="fail">もう一回やると、角速度から速さへの変換が定着します。</div>`;
  TrainerLog.showElapsedInFinalMessage();
 $("reviewBtn").style.display=wrongList.length?"inline-block":"none";
 sendResult(rate);
}
function sendResult(rate){
  TrainerLog.sendResult({
    score: score,
    total: quiz.length
  });
}
$("startBtn").onclick=()=>start(false);$("answerBtn").onclick=check;$("nextBtn").onclick=next;$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start(false);});$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("reviewBtn").onclick=()=>{if(wrongList.length){let saved=[...wrongList];quiz=shuffle(saved).slice(0,10).map(q=>({...q,choices:makeChoices(q)}));index=0;score=0;wrongList=[];resultSent=false;$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion()}};
$("categoryBtn").onclick=()=>{location.href="index.html"};
$("homeBtn").onclick=()=>{location.href="../index.html"};
</script></body></html>
