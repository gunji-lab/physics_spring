<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>バネ Stage1 弧度法トレーナー</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--accent:#2563eb;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--soft:#f8fafc}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
.wrap{max-width:780px;margin:0 auto;padding:22px 14px 46px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}
.lead{color:var(--muted);font-size:.96rem;margin-bottom:16px}
.top{display:flex;justify-content:space-between;gap:12px;align-items:center;color:var(--muted);font-size:.95rem;margin-top:12px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}
.bar>div{height:100%;width:0%;background:var(--accent);transition:width .25s ease}
.question{font-size:1.45rem;font-weight:800;margin:18px 0;padding:16px;background:var(--soft);border-radius:14px;border:1px solid var(--line)}
.choices{display:grid;gap:12px;margin:16px 0}
.choice{width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:var(--text);border-radius:14px;padding:14px 16px;font-size:1.1rem;font-weight:700;cursor:pointer}
.choice:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.10)}
.choice:disabled{cursor:default;opacity:1}
.choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}
.choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}
.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}
.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid var(--line);border-radius:10px;font-family:"Times New Roman",serif;font-size:1.16rem;overflow-x:auto}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:var(--accent);color:#fff}
button.secondary{background:#e5e7eb;color:#111827}
button:disabled{opacity:.5;cursor:not-allowed}
.result{text-align:center;padding:24px 8px}
.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}
.pass{color:var(--ok);font-weight:900}
.fail{color:var(--ng);font-weight:900}
.note{margin-top:16px;padding:12px 14px;border-left:5px solid #cbd5e1;background:#f8fafc;border-radius:10px;color:#475569;font-size:.95rem}
.mini{font-size:.92rem;color:var(--muted)}
.table{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.cell{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 10px;font-weight:700}
input{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.status{font-size:.92rem;color:#6b7280;margin-top:10px}
@media(max-width:520px){.card{padding:18px}.question{font-size:1.25rem}.choice{font-size:1rem}.table{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>Stage1 弧度法トレーナー v2</h1>
<div class="lead">度数法 [°] と弧度法 [rad] の変換を練習する4択クイズです。10問ランダム出題、70%以上でクリア。</div>

<div id="startScreen">
<div class="note">
まずは基本角だけで練習します。<br>
<strong>180 [°] = π [rad]</strong>、<strong>360 [°] = 2π [rad]</strong> を覚えよう。
<div class="table">
  <div class="cell">30 [°] = π/6 [rad]</div>
  <div class="cell">45 [°] = π/4 [rad]</div>
  <div class="cell">60 [°] = π/3 [rad]</div>
  <div class="cell">90 [°] = π/2 [rad]</div>
</div>
</div>

<div class="note">学籍番号を入力してからスタートしてください。</div>
<input id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">

<div class="buttons"><button id="startBtn">スタート</button></div>
</div>

<div id="quizScreen" style="display:none;">
<div class="top"><div id="count">1 / 10</div><div id="score">正解 0</div></div>
<div class="bar"><div id="bar"></div></div>
<div id="question" class="question"></div>
<div id="choices" class="choices"></div>
<div id="feedback" class="feedback"></div>
<div class="buttons"><button id="nextBtn" disabled>次の問題</button><button class="secondary" id="restartBtn">最初から</button></div>
</div>

<div id="finishScreen" class="result" style="display:none;">
<div class="mini">結果</div>
<div id="finalScore" class="scorebig"></div>
<div id="finalMessage"></div>
<div id="sendStatus" class="status"></div>
<div class="buttons" style="justify-content:center;">
<button id="againBtn">もう一度やる</button>
<button class="secondary" id="reviewBtn">間違えた問題だけ復習</button>
</div>
</div>
</div></div>

<script src="../common/trainer_common_v2.js"></script>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwBDYL4LmMQrNA0MFUAJ2gBtYumSQLoLKicRQnNoyhePgplh7q-CQ_kW3BjhCRnkDFDTQ/exec?v=3";
const STAGE_NAME = "Stage1 弧度法トレーナー v2";

const basePairs=[
  [30,"π/6"],[45,"π/4"],[60,"π/3"],[90,"π/2"],[120,"2π/3"],
  [135,"3π/4"],[150,"5π/6"],[180,"π"],[270,"3π/2"],[360,"2π"]
];

const degChoices=basePairs.map(p=>`${p[0]} [°]`);
const radChoices=basePairs.map(p=>`${p[1]} [rad]`);

let quiz=[],index=0,score=0,wrongList=[],answered=false,resultSent=false;
const total=10,$=id=>document.getElementById(id);

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function makeQuestions(){
  const qs=[];
  let n=1;
  for(const [deg,rad] of basePairs){
    qs.push({
      id:`CM1_Q${String(n).padStart(2,"0")}`,
      type:"deg2rad",
      prompt:`${deg} [°] は何 [rad] か？`,
      answer:`${rad} [rad]`,
      deg,
      rad
    });
    n++;
    qs.push({
      id:`CM1_Q${String(n).padStart(2,"0")}`,
      type:"rad2deg",
      prompt:`${rad} [rad] は何 [°] か？`,
      answer:`${deg} [°]`,
      deg,
      rad
    });
    n++;
  }
  return qs;
}

function makeChoices(q){
  const pool=q.type==="deg2rad"?radChoices:degChoices;
  return shuffle([q.answer,...shuffle(pool.filter(x=>x!==q.answer)).slice(0,3)]);
}

function start(useWrong=false){
  const studentId=$("studentId").value.trim();
  if(!studentId){
    alert("学籍番号を入力してください。");
    $("studentId").focus();
    return;
  }
  const source=useWrong&&wrongList.length?wrongList:makeQuestions();
  quiz=shuffle(source).slice(0,Math.min(total,source.length)).map(q=>({...q,choices:makeChoices(q)}));
  index=0;score=0;wrongList=[];resultSent=false;
  TrainerLog.startSession();
  $("startScreen").style.display="none";
  $("finishScreen").style.display="none";
  $("quizScreen").style.display="block";
  showQuestion();
}

function showQuestion(){
  answered=false;
  const q=quiz[index];
  $("count").textContent=`${index+1} / ${quiz.length}`;
  $("score").textContent=`正解 ${score}`;
  $("bar").style.width=`${index/quiz.length*100}%`;
  $("question").textContent=q.prompt;
  $("feedback").className="feedback";
  $("feedback").style.display="none";
  $("nextBtn").disabled=true;
  const box=$("choices");
  box.innerHTML="";
  q.choices.forEach((c,i)=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.dataset.answer=c;
    btn.innerHTML=`${["①","②","③","④"][i]}　${c}`;
    btn.addEventListener("click",()=>check(c,btn));
    box.appendChild(btn);
  });
  TrainerLog.startQuestion();
}

function explanation(q,ok){
  if(q.type==="deg2rad"){
    return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.answer}</strong>
    <div class="formula">${q.deg} [°] × π/180 = ${q.rad} [rad]</div>
    <div class="note">ポイント：度を [rad] に直すときは、π/180 をかけます。</div>`;
  }
  return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.answer}</strong>
  <div class="formula">${q.rad} [rad] × 180/π = ${q.deg} [°]</div>
  <div class="note">ポイント：[rad] を度に直すときは、180/π をかけます。</div>`;
}

function check(selected,btn){
  if(answered)return;
  answered=true;
  const q=quiz[index],ok=selected===q.answer;
  TrainerLog.recordQuestion(q, ok, {
    selected: selected,
    answer: q.answer,
    prompt: q.prompt
  });
  if(ok)score++;else wrongList.push(q);
  document.querySelectorAll(".choice").forEach(b=>{
    b.disabled=true;
    if(b.dataset.answer===q.answer)b.classList.add("correct");
  });
  if(!ok)btn.classList.add("wrong");
  $("feedback").className="feedback "+(ok?"ok":"ng");
  $("feedback").innerHTML=explanation(q,ok);
  $("feedback").style.display="block";
  $("score").textContent=`正解 ${score}`;
  $("nextBtn").disabled=false;
}

function next(){
  index++;
  index>=quiz.length?finish():showQuestion();
}

function finish(){
  $("quizScreen").style.display="none";
  $("finishScreen").style.display="block";
  TrainerLog.finishSession();
  const rate=Math.round(score/quiz.length*100);
  $("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;
  $("finalMessage").innerHTML=rate>=70?`<div class="pass">クリア！基本はかなりいい感じです。</div>`:`<div class="fail">もう一回やるとかなり定着します。</div>`;
  TrainerLog.showElapsedInFinalMessage();
  $("reviewBtn").style.display=wrongList.length?"inline-block":"none";
  sendResult(rate);
}

function sendResult(rate){
  TrainerLog.sendResult({
    score: score,
    total: quiz.length
  });
}

$("startBtn").addEventListener("click",()=>start(false));
$("nextBtn").addEventListener("click",next);
$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start(false);});

$("restartBtn").addEventListener("click",()=>{
  $("quizScreen").style.display="none";
  $("finishScreen").style.display="none";
  $("startScreen").style.display="block";
});

$("againBtn").addEventListener("click",()=>{
  $("finishScreen").style.display="none";
  $("startScreen").style.display="block";
});

$("reviewBtn").addEventListener("click",()=>{
  if(wrongList.length){
    const saved=[...wrongList];
    quiz=shuffle(saved).slice(0,Math.min(10,saved.length)).map(q=>({...q,choices:makeChoices(q)}));
    index=0;score=0;wrongList=[];resultSent=false;
    $("finishScreen").style.display="none";
    $("quizScreen").style.display="block";
    showQuestion();
  }
});
</script>
</body>
</html>
