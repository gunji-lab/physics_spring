<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stage2 弧長トレーナー 基本角版</title>
<style>
body{margin:0;background:#f6f7fb;color:#1f2937;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:22px 14px 46px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}.lead{color:#6b7280}
.top{display:flex;justify-content:space-between;color:#6b7280;margin-top:12px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}.bar>div{height:100%;width:0;background:#2563eb}
.question{font-size:1.28rem;font-weight:800;margin:18px 0;padding:16px;background:#f8fafc;border-radius:14px;border:1px solid #e5e7eb}
.choices{display:grid;gap:12px;margin:16px 0}
.choice{width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:#1f2937;border-radius:14px;padding:14px 16px;font-size:1.06rem;font-weight:700;cursor:pointer}
.choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}.choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;font-family:"Times New Roman",serif;font-size:1.12rem;overflow-x:auto}
.compare{margin-top:10px;padding:10px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;color:#1e3a8a;font-weight:700}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:#2563eb;color:white}
button.secondary{background:#e5e7eb;color:#111827}button:disabled{opacity:.5;cursor:not-allowed}
.result{text-align:center;padding:24px 8px}.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}.pass{color:#16a34a;font-weight:900}.fail{color:#dc2626;font-weight:900}
.note{margin-top:16px;padding:12px 14px;border-left:5px solid #cbd5e1;background:#f8fafc;border-radius:10px;color:#475569}.badge{display:inline-block;font-size:.85rem;padding:2px 8px;border-radius:99px;background:#dbeafe;color:#1e40af;margin-bottom:8px}
.figure{display:flex;justify-content:center}svg{max-width:260px;width:100%;height:auto}
input{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.status{font-size:.92rem;color:#6b7280;margin-top:10px}
@media(max-width:520px){.card{padding:18px}.question{font-size:1.12rem}.choice{font-size:1rem}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>Stage2 弧長トレーナー 基本角版</h1>
<div class="lead">弧の長さを求める4択クイズです。10問中、弧度法8問・度数法2問が出題されます。</div>

<div id="startScreen">
  <div class="note">
    このステージでは <b>弧の長さ</b> を練習します。<br>
    中心角 θ が <b>[rad]</b> のとき、<b>s = rθ</b> が使えます。<br>
    度数法の問題では、<b>度数法での解き方</b> と <b>ラジアンでの解き方</b> の両方を表示します。
  </div>

  <div class="figure">
    <svg viewBox="0 0 220 160">
      <circle cx="105" cy="90" r="60" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="5 5"/>
      <path d="M105 90 L165 90" stroke="#1f2937" stroke-width="4"/>
      <path d="M105 90 L135 38" stroke="#1f2937" stroke-width="4"/>
      <path d="M165 90 A60 60 0 0 0 135 38" fill="none" stroke="#2563eb" stroke-width="6"/>
      <text x="132" y="105" font-size="16">r</text>
      <text x="150" y="60" font-size="16" fill="#2563eb">s</text>
      <text x="118" y="78" font-size="16">θ</text>
    </svg>
  </div>

  <div class="note">学籍番号を入力してからスタートしてください。</div>
  <input id="studentId" placeholder="学籍番号" inputmode="numeric" autocomplete="off">

  <div class="buttons">
    <button id="startBtn">スタート</button>
  </div>
</div>

<div id="quizScreen" style="display:none">
  <div class="top"><div id="count"></div><div id="score"></div></div>
  <div class="bar"><div id="bar"></div></div>
  <div id="question" class="question"></div>
  <div id="choices" class="choices"></div>
  <div id="feedback" class="feedback"></div>
  <div class="buttons">
    <button id="nextBtn" disabled>次の問題</button>
    <button class="secondary" id="restartBtn">最初から</button>
  </div>
</div>

<div id="finishScreen" class="result" style="display:none">
  <div>結果</div>
  <div id="finalScore" class="scorebig"></div>
  <div id="finalMessage"></div>
  <div id="sendStatus" class="status"></div>
  <div class="buttons" style="justify-content:center">
    <button id="againBtn">もう一度やる</button>
    <button class="secondary" id="reviewBtn">間違えた問題だけ復習</button>
  </div>
</div>

</div></div>

<script>
const GAS_URL = "https://script.google.com/a/macros/toyo.jp/s/AKfycbzFBA_utC8PIRUvHXGdXzIbj6OSEv0y4Ai_sVTnmcjq_ZHvqtZSOz2r4J_yfcLTmXmdHA/exec";
const STAGE_NAME = "Stage2 弧長トレーナー";

const radProblems=[
{mode:"rad",r:1,theta:"π [rad]",deg:180,rad:"π",mult:"π",ans:"π [m]"},
{mode:"rad",r:2,theta:"π [rad]",deg:180,rad:"π",mult:"2π",ans:"2π [m]"},
{mode:"rad",r:4,theta:"π/2 [rad]",deg:90,rad:"π/2",mult:"2π",ans:"2π [m]"},
{mode:"rad",r:3,theta:"π/3 [rad]",deg:60,rad:"π/3",mult:"π",ans:"π [m]"},
{mode:"rad",r:2,theta:"π/4 [rad]",deg:45,rad:"π/4",mult:"π/2",ans:"π/2 [m]"},
{mode:"rad",r:6,theta:"π/6 [rad]",deg:30,rad:"π/6",mult:"π",ans:"π [m]"},
{mode:"rad",r:3,theta:"π/2 [rad]",deg:90,rad:"π/2",mult:"3π/2",ans:"3π/2 [m]"},
{mode:"rad",r:2,theta:"2π [rad]",deg:360,rad:"2π",mult:"4π",ans:"4π [m]"},
{mode:"rad",r:6,theta:"π/3 [rad]",deg:60,rad:"π/3",mult:"2π",ans:"2π [m]"},
{mode:"rad",r:8,theta:"π/4 [rad]",deg:45,rad:"π/4",mult:"2π",ans:"2π [m]"},
{mode:"rad",r:12,theta:"π/6 [rad]",deg:30,rad:"π/6",mult:"2π",ans:"2π [m]"},
{mode:"rad",r:1,theta:"2π [rad]",deg:360,rad:"2π",mult:"2π",ans:"2π [m]"}
];

const degProblems=[
{mode:"deg",r:6,theta:"30 [°]",deg:30,rad:"π/6",mult:"π",ans:"π [m]"},
{mode:"deg",r:4,theta:"90 [°]",deg:90,rad:"π/2",mult:"2π",ans:"2π [m]"},
{mode:"deg",r:3,theta:"60 [°]",deg:60,rad:"π/3",mult:"π",ans:"π [m]"},
{mode:"deg",r:2,theta:"180 [°]",deg:180,rad:"π",mult:"2π",ans:"2π [m]"},
{mode:"deg",r:2,theta:"45 [°]",deg:45,rad:"π/4",mult:"π/2",ans:"π/2 [m]"},
{mode:"deg",r:1,theta:"360 [°]",deg:360,rad:"2π",mult:"2π",ans:"2π [m]"}
];

const allAns=["π [m]","2π [m]","3π [m]","4π [m]","π/2 [m]","3π/2 [m]","2π/3 [m]","π/3 [m]","6π [m]"];
let quiz=[],index=0,score=0,wrongList=[],answered=false,resultSent=false;
const total=10,$=id=>document.getElementById(id);

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeChoices(q){return shuffle([q.ans,...shuffle(allAns.filter(x=>x!==q.ans)).slice(0,3)])}
function buildQuiz(){return [...shuffle(radProblems).slice(0,8),...shuffle(degProblems).slice(0,2)]}

function start(useWrong=false){
  const studentId = $("studentId").value.trim();
  if(!studentId){
    alert("学籍番号を入力してください。");
    $("studentId").focus();
    return;
  }

  let source=useWrong&&wrongList.length?wrongList:buildQuiz();
  quiz=shuffle(source).slice(0,total).map(q=>({...q,choices:makeChoices(q)}));
  index=0;score=0;wrongList=[];resultSent=false;
  $("startScreen").style.display="none";
  $("finishScreen").style.display="none";
  $("quizScreen").style.display="block";
  showQuestion();
}

function showQuestion(){
  answered=false;let q=quiz[index];
  $("count").textContent=`${index+1} / ${quiz.length}`;
  $("score").textContent=`正解 ${score}`;
  $("bar").style.width=`${index/quiz.length*100}%`;
  $("question").innerHTML=`<span class="badge">${q.mode==="deg"?"度数法から計算":"弧度法から計算"}</span><br>半径 r = ${q.r} [m]、中心角 θ = ${q.theta} のとき、弧の長さ s は何 [m]か。`;
  $("feedback").className="feedback";$("feedback").style.display="none";$("nextBtn").disabled=true;
  let box=$("choices");box.innerHTML="";
  q.choices.forEach((c,i)=>{let b=document.createElement("button");b.className="choice";b.innerHTML=`${["①","②","③","④"][i]}　${c}`;b.onclick=()=>check(c,b);box.appendChild(b)});
}

function explanation(q,ok){
  if(q.mode==="deg"){
    return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong>
    <div class="formula">【度数法】<br>s = 2πr × θ/360<br>= 2π × ${q.r} × ${q.deg}/360<br>= ${q.mult} [m]</div>
    <div class="formula">【ラジアン】<br>${q.deg} [°] = ${q.rad} [rad]<br>s = rθ = ${q.r} × ${q.rad}<br>= ${q.mult} [m]</div>
    <div class="compare">同じ答え。ラジアンを使うと s = rθ で短く計算できます。</div>`;
  }
  return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong>
  <div class="formula">s = rθ<br>= ${q.r} × ${q.rad}<br>= ${q.mult} [m]</div>
  <div class="note">中心角が [rad] で表されているとき、弧の長さは s = rθ で求められます。</div>`;
}

function check(selected,btn){
  if(answered)return;answered=true;let q=quiz[index],ok=selected===q.ans;
  if(ok)score++;else wrongList.push(q);
  document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.textContent.includes(q.ans))b.classList.add("correct")});
  if(!ok)btn.classList.add("wrong");
  $("feedback").className="feedback "+(ok?"ok":"ng");
  $("feedback").innerHTML=explanation(q,ok);
  $("feedback").style.display="block";
  $("score").textContent=`正解 ${score}`;
  $("nextBtn").disabled=false;
}

function next(){index++;index>=quiz.length?finish():showQuestion()}

function finish(){
  $("quizScreen").style.display="none";
  $("finishScreen").style.display="block";
  let rate=Math.round(score/quiz.length*100);
  $("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;
  $("finalMessage").innerHTML=rate>=70?`<div class="pass">クリア！弧長の基本はいい感じです。</div>`:`<div class="fail">もう一回やると、ラジアンの便利さが定着します。</div>`;
  $("reviewBtn").style.display=wrongList.length?"inline-block":"none";
  sendResult(rate);
}

function sendResult(rate){
  if(resultSent) return;
  resultSent = true;
  const studentId = $("studentId").value.trim();
  $("sendStatus").textContent = "結果を送信中...";

  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      studentId: studentId,
      stage: STAGE_NAME,
      score: score,
      total: quiz.length,
      rate: rate + "%"
    })
  })
  .then(()=>{ $("sendStatus").textContent = "結果を送信しました。"; })
  .catch(()=>{ $("sendStatus").textContent = "結果送信に失敗しました。ネットワークを確認してください。"; });
}

$("startBtn").onclick=()=>start(false);
$("nextBtn").onclick=next;
$("studentId").addEventListener("keydown", e=>{ if(e.key==="Enter") start(false); });

$("restartBtn").onclick=()=>{
  $("quizScreen").style.display="none";
  $("finishScreen").style.display="none";
  $("startScreen").style.display="block";
};

$("againBtn").onclick=()=>{
  $("finishScreen").style.display="none";
  $("startScreen").style.display="block";
};

$("reviewBtn").onclick=()=>{
  if(wrongList.length){
    let saved=[...wrongList];
    quiz=shuffle(saved).slice(0,10).map(q=>({...q,choices:makeChoices(q)}));
    index=0;score=0;wrongList=[];resultSent=false;
    $("finishScreen").style.display="none";
    $("quizScreen").style.display="block";
    showQuestion();
  }
};
</script>
</body></html>
