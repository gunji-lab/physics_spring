let quiz=[],index=0,score=0,wrongList=[],answered=false,selectedAnswer="",selectedButton=null;const total=10,$=id=>document.getElementById(id);
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function buildQuiz(){const stages=["Stage 1","Stage 2","Stage 3","Stage 4","Stage 5"];return shuffle(stages.flatMap(stage=>shuffle(comprehensiveProblems.filter(q=>q.stage===stage)).slice(0,2)))}
function normalizeNumber(value){return String(value).trim().replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/．/g,".").replace(/[−ー―]/g,"-").replace(/,/g,"").replace(/\s/g,"").replace(/\[[^\]]*\]/g,"").replace(/℃|kg|J|K/g,"")}
function isCorrect(raw,q){const match=normalizeNumber(raw).match(/[-+]?(?:\d+\.?\d*|\.\d+)/);if(!match)return false;const value=Number(match[0]);return Number.isFinite(value)&&Math.abs(value-Number(q.answer))<1e-9}
function escapeHtml(value){return String(value).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}
function start(source=null){if(!$("studentId").value.trim()){alert("学籍番号を入力してください。");$("studentId").focus();return}quiz=source?shuffle(source).slice(0,total):buildQuiz();index=0;score=0;wrongList=[];TrainerLog.startSession();$("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion()}
function showQuestion(){answered=false;const q=quiz[index];$("count").textContent=`${index+1} / ${quiz.length}`;$("score").textContent=`正解 ${score}`;$("bar").style.width=`${index/quiz.length*100}%`;$("question").innerHTML=`<span class="badge">${q.stage}・${q.type} を求める</span><br>${q.question}`;$("unit").textContent=q.unit;$("answerInput").value="";$("answerInput").disabled=false;$("feedback").className="feedback";$("feedback").style.display="none";$("checkBtn").disabled=false;$("nextBtn").disabled=true;TrainerLog.startQuestion();$("answerInput").focus()}
function checkAnswer(){if(answered)return;const q=quiz[index],raw=$("answerInput").value;if(!raw.trim()){alert("答えを入力してください。");$("answerInput").focus();return}answered=true;const ok=isCorrect(raw,q);TrainerLog.recordQuestion(q,ok,{selected:raw,answer:String(q.answer),prompt:q.question});if(ok)score++;else wrongList.push(q);$("answerInput").disabled=true;$("checkBtn").disabled=true;$("nextBtn").disabled=false;$("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML=`<strong>${ok?"正解！":"不正解"}</strong><br>あなたの答え：<strong>${escapeHtml(raw)}</strong><br>正解：<strong>${q.answer} ${q.unit}</strong><div class="formula">${q.calc}</div><div class="note">ポイント：式を立ててから、最後に単位と数値を確認しましょう。</div>`;$("feedback").style.display="block";$("score").textContent=`正解 ${score}`}
function next(){index++;index>=quiz.length?finish():showQuestion()}
function finish(){TrainerLog.finishSession();$("quizScreen").style.display="none";$("finishScreen").style.display="block";const rate=Math.round(score/quiz.length*100);$("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;$("finalMessage").innerHTML=rate>=70?'<div class="pass">クリア！記述式でも熱の基本が身についています。</div>':'<div class="fail">Stageごとの式を整理して、もう一度挑戦しましょう。</div>';TrainerLog.showElapsedInFinalMessage();$("reviewBtn").style.display=wrongList.length?"inline-block":"none";TrainerLog.sendResult({score,total:quiz.length})}
$("startBtn").onclick=()=>start();$("checkBtn").onclick=checkAnswer;$("nextBtn").onclick=next;$("answerInput").addEventListener("keydown",e=>{if(e.key==="Enter"){answered?next():checkAnswer()}});$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start()});$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("reviewBtn").onclick=()=>{if(wrongList.length)start([...wrongList])};$("categoryBtn").onclick=()=>{location.href="index.html"};$("homeBtn").onclick=()=>{location.href="../index.html"};
