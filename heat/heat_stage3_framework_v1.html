<h1>熱 Stage3 物質ごとの熱量トレーナー</h1>
<div class="lead">物質ごとの比熱を使う熱量計算と、温度変化から比熱の大小を考えるクイズです。10問ランダム出題、70%以上でクリア。</div>
<div id="startScreen">

const materialAnswerPool=["470 [J]","705 [J]","768 [J]","896 [J]","960 [J]","1120 [J]","1152 [J]","1353 [J]","1410 [J]","1804 [J]","1930 [J]","2688 [J]","4180 [J]","4510 [J]","5200 [J]","5790 [J]","5850 [J]","6500 [J]","8000 [J]","9000 [J]","12540 [J]"];
const comparisonProblems=[
 {id:"HEAT3_CMP_01",type:"compare",material:"比較",ans:"鉄",choices:["鉄","銅","どちらも等しい"],question:"同じ質量の鉄と銅に、同じ熱量を加えた。鉄の温度は10 [K]、銅の温度は12 [K]上昇した。比熱が大きいのはどちらか。",calc:"同じm、同じQでは c = Q/(mΔT)。温度変化が小さい鉄の方が、比熱が大きい。"},
 {id:"HEAT3_CMP_02",type:"compare",material:"比較",ans:"水",choices:["アルミニウム","水","どちらも等しい"],question:"同じ質量のアルミニウムと水に、同じ熱量を加えた。アルミニウムは18 [K]、水は4 [K]上昇した。比熱が大きいのはどちらか。",calc:"温度変化が小さい水の方が、比熱が大きい。"},

let quiz=[],index=0,score=0,wrongList=[],answered=false,selectedAnswer="",selectedButton=null;const total=10,$=id=>document.getElementById(id);
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeChoices(q){if(q.choices)return shuffle(q.choices);return shuffle([q.ans,...shuffle(materialAnswerPool.filter(x=>x!==q.ans)).slice(0,3)])}
function buildQuiz(){return shuffle([...shuffle(materialProblems).slice(0,8),...shuffle(comparisonProblems).slice(0,2)])}
function start(source=null){if(!$("studentId").value.trim()){alert("学籍番号を入力してください。");$("studentId").focus();return}quiz=shuffle(source||buildQuiz()).slice(0,total).map(q=>({...q,choices:makeChoices(q)}));index=0;score=0;wrongList=[];TrainerLog.startSession();$("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion()}
function showQuestion(){answered=false;selectedAnswer="";selectedButton=null;const q=quiz[index];$("count").textContent=`${index+1} / ${quiz.length}`;$("score").textContent=`正解 ${score}`;$("bar").style.width=`${index/quiz.length*100}%`;const badge=q.type==="compare"?(q.question.includes("温度変化が大きい")?"温度変化を比較する":"比熱を比較する"):`${q.material}・Q を求める`;$("question").innerHTML=`<span class="badge">${badge}</span><br>${q.question}`;$("feedback").className="feedback";$("feedback").style.display="none";$("answerBtn").disabled=true;$("nextBtn").disabled=true;const box=$("choices");box.innerHTML="";q.choices.forEach((c,i)=>{const b=document.createElement("button");b.className="choice";b.dataset.answer=c;b.textContent=`${["①","②","③","④"][i]}　${c}`;b.onclick=()=>selectChoice(c,b);box.appendChild(b)});TrainerLog.startQuestion()}
function selectChoice(value,button){if(answered)return;selectedAnswer=value;selectedButton=button;document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"));button.classList.add("selected");$("answerBtn").disabled=false}
function check(){if(answered||!selectedAnswer)return;answered=true;const q=quiz[index],ok=selectedAnswer===q.ans;TrainerLog.recordQuestion(q,ok,{selected:selectedAnswer,answer:q.ans,prompt:q.question});if(ok)score++;else wrongList.push(q);document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.dataset.answer===q.ans)b.classList.add("correct")});if(!ok&&selectedButton)selectedButton.classList.add("wrong");const point=q.type==="compare"?"同じ質量・同じ熱量では、比熱cと温度変化ΔTは反比例します。":"質量は g、比熱は J/(g·K) にそろえて Q = mcΔT に代入します。";$("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML=`<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong><div class="formula">${q.calc}</div><div class="note">ポイント：${point}</div>`;$("feedback").style.display="block";$("score").textContent=`正解 ${score}`;$("answerBtn").disabled=true;$("nextBtn").disabled=false}
function next(){index++;index>=quiz.length?finish():showQuestion()}
function finish(){TrainerLog.finishSession();$("quizScreen").style.display="none";$("finishScreen").style.display="block";const rate=Math.round(score/quiz.length*100);$("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;$("finalMessage").innerHTML=rate>=70?'<div class="pass">クリア！物質ごとの比熱を使って熱量を計算できています。</div>':'<div class="fail">もう一回やると、Q = mcΔT の使い方が定着します。</div>';TrainerLog.showElapsedInFinalMessage();$("reviewBtn").style.display=wrongList.length?"inline-block":"none";TrainerLog.sendResult({score,total:quiz.length})}
$("startBtn").onclick=()=>start();$("answerBtn").onclick=check;$("nextBtn").onclick=next;$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start()});$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("reviewBtn").onclick=()=>{if(wrongList.length)start([...wrongList])};$("categoryBtn").onclick=()=>{location.href="index.html"};$("homeBtn").onclick=()=>{location.href="../index.html"};
</script></body></html>
