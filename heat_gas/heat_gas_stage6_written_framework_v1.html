<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>熱と気体 Stage6 総合記述式トレーナー</title><link rel="stylesheet" href="heat_gas_stage_template.css"><style>.answer-row{display:flex;gap:10px;align-items:center;margin:14px 0}.answer-row input{margin-top:0}.unit-label{color:#6b7280;font-weight:800;white-space:nowrap}.feedback{display:block}.feedback:empty{display:none}</style></head>
<body><div class="wrap"><div class="card">
<h1 id="title">熱と気体 Stage6 総合記述式トレーナー</h1><div id="lead" class="lead">Stage1〜5の問題から10問をランダムに出題します。選択肢なしで、答えを記述してください。</div>
<div id="startScreen"><div class="note">Stage1〜5で出題された問題がそのまま出ます。単位は付けても付けなくてもかまいません。数値は小数表記・指数表記のどちらでも入力できます。</div><div class="note">学籍番号を入力してからスタートしてください。</div><input id="studentId" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号"><div class="buttons"><button id="startBtn">スタート</button></div></div>
<div id="quizScreen" style="display:none"><div class="top"><div id="count"></div><div id="score"></div></div><div class="bar"><div id="bar"></div></div><div id="question" class="question"></div><div class="answer-row"><input id="answerInput" type="text" autocomplete="off" spellcheck="false" placeholder="答えを入力"><span id="unitLabel" class="unit-label"></span></div><div id="feedback" class="feedback"></div><div class="buttons"><button id="answerBtn" disabled>答える</button><button id="nextBtn" disabled>次の問題</button><span class="button-break"></span><button class="secondary" id="restartBtn">最初から</button></div></div>
<div id="finishScreen" class="result" style="display:none"><div>結果</div><div id="finalScore" class="scorebig"></div><div id="finalMessage"></div><div id="sendStatus" class="status"></div><div class="buttons" style="justify-content:center"><button id="againBtn">もう一度やる</button><button class="secondary" id="reviewBtn">間違えた問題だけ復習</button><button class="secondary" id="categoryBtn">カテゴリトップへ</button><button class="secondary" id="homeBtn">トップページへ</button></div></div>
</div></div>
<script src="../common/trainer_common_v2.js"></script>
<script src="question_banks.js"></script>
<script>
const GAS_URL="https://script.google.com/a/macros/toyo.jp/s/AKfycbxKE8qHKfpyllw3LqmC1fKrDgdeUR2w2H7Q0l33YWFTY_krYKyqlWz3UueyOjQlr-D7GQ/exec?v=3";
const STAGE_NAME="熱と気体/Stage6/総合記述式";
const TOTAL=10, PASS=70;
window.TrainerLog=window.TrainerLog||{startSession(){},startQuestion(){},recordQuestion(){},finishSession(){},showElapsedInFinalMessage(){},sendResult(){}};
const $=id=>document.getElementById(id);
const stageOrder=["stage1","stage2","stage3","stage4","stage5"];
const problems=stageOrder.flatMap(stageKey=>{
  const bank=(window.HEAT_GAS_BANKS||{})[stageKey]||{};
  return (bank.problems||[]).map(q=>({
    ...q,
    id:q.id||("HEAT_GAS6_"+stageKey+"_"+q.type),
    stage:bank.stageLabel||stageKey,
    badge:(bank.badges&&bank.badges[q.type])||"計算",
    point:q.point||bank.point||"式を選び、単位をそろえて計算します。"
  }));
});
let quiz=[],index=0,score=0,wrongList=[],answered=false;
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function escapeHTML(value){return String(value??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}
function displayMath(value){return escapeHTML(value).replace(/\^(-?\d+(?:\.\d+)?)/g,"<sup>$1</sup>")}
function splitAnswer(ans){const m=String(ans).match(/^(.+?)\s*\[([^\]]+)\]\s*$/);return m?{value:m[1],unit:m[2]}:{value:String(ans),unit:""}}
function normalizeNumber(value){return String(value||"").trim().replace(/[，、]/g,".").replace(/\s+/g,"").replace(/×10\^([+-]?\d+)/gi,"e$1").replace(/x10\^([+-]?\d+)/gi,"e$1").replace(/\*10\^([+-]?\d+)/gi,"e$1").replace(/×10([+-]?\d+)/gi,"e$1").replace(/\[.*?\]/g,"").replace(/[a-zA-Z\/・^()]+$/g,"")}
function toNumber(value){const n=Number(normalizeNumber(value));return Number.isFinite(n)?n:NaN}
function isCorrect(input,ans){const target=splitAnswer(ans).value;const a=toNumber(input),b=toNumber(target);if(Number.isFinite(a)&&Number.isFinite(b)){const scale=Math.max(1,Math.abs(b));return Math.abs(a-b)/scale<0.011}return normalizeNumber(input)===normalizeNumber(target)}
function start(source=null){if(!$("studentId").value.trim()){alert("学籍番号を入力してください。");$("studentId").focus();return}quiz=shuffle(source||problems).slice(0,TOTAL);index=0;score=0;wrongList=[];TrainerLog.startSession();$("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion()}
function showQuestion(){answered=false;const q=quiz[index],parts=splitAnswer(q.ans);$("count").textContent=(index+1)+" / "+quiz.length;$("score").textContent="正解 "+score;$("bar").style.width=(index/quiz.length*100)+"%";$("question").innerHTML='<span class="badge">'+displayMath(q.stage)+'｜'+displayMath(q.badge)+'</span><br>'+displayMath(q.question);$("unitLabel").textContent=parts.unit?"["+parts.unit+"]":"";$("answerInput").value="";$("answerInput").disabled=false;$("feedback").className="feedback";$("feedback").innerHTML="";$("answerBtn").disabled=true;$("nextBtn").disabled=true;TrainerLog.startQuestion();setTimeout(()=>$("answerInput").focus(),50)}
function check(){if(answered)return;const q=quiz[index],input=$("answerInput").value;answered=true;const ok=isCorrect(input,q.ans);TrainerLog.recordQuestion(q,ok,{selected:input,answer:q.ans,prompt:q.question});if(ok)score++;else wrongList.push(q);$("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML='<strong>'+(ok?'正解！':'不正解')+'</strong><br>正解：<strong>'+displayMath(q.ans)+'</strong><div class="formula">'+displayMath(q.calc||'')+'</div><div class="note">ポイント：'+displayMath(q.point||'')+'</div>';$("answerInput").disabled=true;$("answerBtn").disabled=true;$("nextBtn").disabled=false;$("score").textContent="正解 "+score}
function next(){index++;index>=quiz.length?finish():showQuestion()}
function finish(){TrainerLog.finishSession();$("quizScreen").style.display="none";$("finishScreen").style.display="block";const rate=Math.round(score/quiz.length*100);$("finalScore").textContent=score+" / "+quiz.length+" 問正解（"+rate+"%）";$("finalMessage").innerHTML=rate>=PASS?'<div class="pass">クリア！熱と気体の基本問題を記述で解けています。</div>':'<div class="fail">もう一回やると、式の選択と計算が定着します。</div>';TrainerLog.showElapsedInFinalMessage();$("reviewBtn").style.display=wrongList.length?"inline-block":"none";TrainerLog.sendResult({score,total:quiz.length})}
$("startBtn").onclick=()=>start();$("answerBtn").onclick=check;$("nextBtn").onclick=next;$("answerInput").addEventListener("input",()=>{$("answerBtn").disabled=!$("answerInput").value.trim()});$("answerInput").addEventListener("keydown",e=>{if(e.key==="Enter"&&!$("answerBtn").disabled)check()});$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start()});$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("reviewBtn").onclick=()=>{if(wrongList.length)start([...wrongList])};$("categoryBtn").onclick=()=>{location.href="index.html"};$("homeBtn").onclick=()=>{location.href="../index.html"};
</script></body></html>
