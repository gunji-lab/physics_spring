<script>
window.TrainerLog=window.TrainerLog||{startSession(){},startQuestion(){},recordQuestion(){},finishSession(){},showElapsedInFinalMessage(){},sendResult(){}};
const TOTAL=10, PASS=70, problems=window.HEAT_GAS_STAGE6_PROBLEMS;
const $=id=>document.getElementById(id);let quiz=[],index=0,score=0,wrongList=[],answered=false;
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function escapeHTML(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function displayMath(value){return escapeHTML(value).replace(/\^(-?\d+(?:\.\d+)?)/g,'<sup>$1</sup>')}
function unitOf(ans){const m=String(ans).match(/\[([^\]]+)\]$/);return m?'['+m[1]+']':''}
function normalizeNumberText(value){return String(value||'').trim().replace(/[，,]/g,'').replace(/×10\^/g,'e').replace(/×10/g,'e').replace(/\s+/g,'')}
function numericPart(value){const s=normalizeNumberText(value).replace(/\[[^\]]+\]/g,'').replace(/[a-zA-Zぁ-んァ-ン一-龥/・^²³()]+$/g,'');const n=Number(s);return Number.isFinite(n)?n:null}
function correct(q,value){const expected=String(q.ans);const raw=String(value||'').trim();if(!raw)return false;const exact=normalizeNumberText(raw).replace(/\[[^\]]+\]/g,'')===normalizeNumberText(expected).replace(/\[[^\]]+\]/g,'');if(exact)return true;const a=numericPart(raw),b=numericPart(expected);if(a==null||b==null)return false;return Math.abs(a-b)<=Math.max(1e-9,Math.abs(b)*0.005)}
function buildQuiz(source=null){return shuffle(source||problems).slice(0,TOTAL)}
function start(source=null){if(!$('studentId').value.trim()){alert('学籍番号を入力してください。');$('studentId').focus();return;}quiz=buildQuiz(source);index=0;score=0;wrongList=[];TrainerLog.startSession();$('startScreen').style.display='none';$('finishScreen').style.display='none';$('quizScreen').style.display='block';showQuestion()}
function showQuestion(){answered=false;const q=quiz[index];$('count').textContent=(index+1)+' / '+quiz.length;$('score').textContent='正解 '+score;$('bar').style.width=(index/quiz.length*100)+'%';$('question').innerHTML='<span class="badge">'+displayMath(q.stage)+'｜'+displayMath(q.badge)+'</span><br>'+displayMath(q.question);$('answerInput').value='';$('answerInput').disabled=false;$('unitLabel').innerHTML=displayMath(unitOf(q.ans));$('feedback').className='feedback';$('feedback').innerHTML='';$('answerBtn').disabled=true;$('nextBtn').disabled=true;$('answerInput').focus();TrainerLog.startQuestion()}
function check(){if(answered)return;const q=quiz[index],value=$('answerInput').value,ok=correct(q,value);answered=true;TrainerLog.recordQuestion(q,ok,{selected:value,answer:q.ans,prompt:q.question});if(ok)score++;else wrongList.push(q);$('answerInput').disabled=true;$('feedback').className='feedback '+(ok?'ok':'ng');$('feedback').innerHTML='<strong>'+(ok?'正解！':'不正解')+'</strong><br>正解：<strong>'+displayMath(q.ans)+'</strong><div class="formula">'+displayMath(q.calc)+'</div><div class="note">ポイント：'+displayMath(q.point)+'</div>';$('score').textContent='正解 '+score;$('answerBtn').disabled=true;$('nextBtn').disabled=false}
function next(){index++;index>=quiz.length?finish():showQuestion()}
function finish(){TrainerLog.finishSession();$('quizScreen').style.display='none';$('finishScreen').style.display='block';const rate=Math.round(score/quiz.length*100);$('finalScore').textContent=score+' / '+quiz.length+' 問正解（'+rate+'%）';$('finalMessage').innerHTML=rate>=PASS?'<div class="pass">クリア！熱と気体の基本問題を記述で解けています。</div>':'<div class="fail">もう一回やると、式の選択と計算が定着します。</div>';TrainerLog.showElapsedInFinalMessage();$('reviewBtn').style.display=wrongList.length?'inline-block':'none';TrainerLog.sendResult({score,total:quiz.length})}
$('startBtn').onclick=()=>start();$('answerBtn').onclick=check;$('nextBtn').onclick=next;$('answerInput').addEventListener('input',()=>{$('answerBtn').disabled=answered||!$('answerInput').value.trim()});$('answerInput').addEventListener('keydown',e=>{if(e.key==='Enter'){if(!answered&&!$('answerBtn').disabled)check();else if(answered&&!$('nextBtn').disabled)next()}});$('studentId').addEventListener('keydown',e=>{if(e.key==='Enter')start()});$('restartBtn').onclick=()=>{$('quizScreen').style.display='none';$('finishScreen').style.display='none';$('startScreen').style.display='block'};$('againBtn').onclick=()=>{$('finishScreen').style.display='none';$('startScreen').style.display='block'};$('reviewBtn').onclick=()=>{if(wrongList.length)start([...wrongList])};$('categoryBtn').onclick=()=>{location.href='index.html'};$('homeBtn').onclick=()=>{location.href='../index.html'};
