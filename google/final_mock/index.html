<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>期末試験の模試</title>
  <link rel="stylesheet" href="../../common/final_mock_exam_v1.css">
</head>
<body>
  <div class="wrap">
    <section class="panel start" id="startScreen">
      <span class="tag">30点満点</span>
      <h1>期末試験の模試</h1>
      <p class="lead">小問5問と大問3設問を、すべて記入式で解きます。小問は各3点、大問は各設問5点です。</p>
      <div class="guide">短時間で何回も挑戦できる形式です。問題は開始時にランダムで選ばれます。</div>
      <div class="guide">大学Googleアカウントで確認済みです。</div>
      <input class="student" id="studentId" type="hidden" autocomplete="off">
      <div class="controls"><button class="btn primary" id="startBtn">模試を始める</button><a class="btn secondary" href="../index.html">トップへ戻る</a></div>
    </section>
    <main class="panel hidden" id="examScreen">
      <div class="exam-head"><div><span class="tag">期末試験対策</span><h1>期末試験の模試</h1></div><div class="score-pill" id="scorePill">30点満点</div></div>
      <section class="section"><h2>小問｜5問 × 3点</h2><div id="basicQuestions"></div></section>
      <section class="section">
        <div class="section-head">
          <h2>大問｜3設問 × 5点</h2>
          <button class="btn secondary small" id="changeBigBtn" type="button">別の問題にする</button>
        </div>
        <div id="bigQuestions"></div>
      </section>
      <div class="controls"><button class="btn primary" id="submitBtn">答案を提出して採点</button></div>
      <section class="result hidden" id="result"><div class="score-big" id="scoreValue"></div><p>各設問の正誤を上で確認できます。</p><div id="sendStatus" class="guide"></div><div class="controls result-controls"><button class="btn secondary" id="reviewWrongBtn" type="button">間違えた問題をやり直す</button><button class="btn secondary" id="againBtn">別の問題で挑戦</button></div></section>
      <div class="controls"><a class="btn secondary" href="../index.html">トップページに戻る</a></div>
    </main>
  </div>
  <script>const GAS_URL="https://script.google.com/a/macros/toyo.jp/s/AKfycbxKE8qHKfpyllw3LqmC1fKrDgdeUR2w2H7Q0l33YWFTY_krYKyqlWz3UueyOjQlr-D7GQ/exec?v=3";const STAGE_NAME="期末試験/模試";</script>
  <script src="../common/trainer_common_v2.js"></script>
  <script src="../circular_motion/question_banks.js"></script>
  <script src="../spring/question_banks.js"></script>
  <script src="../heat/question_banks.js"></script>
  <script src="../mechanical_energy/question_banks.js"></script>
  <script src="../../heat_gas/question_banks.js"></script>
  <script src="../../common/final_mock_stage_basic_bank_v1.js"></script>
  <script src="../../common/final_mock_big_bank_v1.js"></script>
  <script src="../../common/final_mock_exam_v1.js"></script>
</body>
</html>
