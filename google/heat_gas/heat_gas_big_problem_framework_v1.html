  <style>
    :root{color-scheme:light;--ink:#1f2933;--muted:#5c6672;--line:#d9dee6;--soft:#f5f7fa;--panel:#fff;--accent:#0f766e;--accent-dark:#115e59;--accent-soft:#ccfbf1;--gold-soft:#fff1d0;--wrong:#b13b3b;--wrong-soft:#fde7e7;--right:#247a4b;--right-soft:#e4f6ec;--shadow:0 14px 32px rgba(31,41,51,.11)}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:linear-gradient(180deg,#eefaf7 0,#f8fafb 320px,#f4f6f8 100%);line-height:1.6}button,input{font:inherit}.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr}
    header{padding:22px clamp(16px,3vw,40px) 16px;border-bottom:1px solid rgba(31,41,51,.08);background:rgba(255,255,255,.74);backdrop-filter:blur(12px);position:sticky;top:0;z-index:5}.header-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:1180px;margin:0 auto}h1{font-size:clamp(1.25rem,2.8vw,2rem);margin:0}.score{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;color:var(--muted);font-size:.95rem}.pill{min-width:78px;text-align:center;padding:7px 10px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-weight:800}
    main{width:min(1180px,100%);margin:0 auto;padding:clamp(16px,3vw,32px)}.layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,410px);gap:18px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}.screen{display:none}.screen.active{display:block}.start-card,.finish-card{width:min(760px,100%);margin:0 auto;padding:clamp(20px,4vw,34px)}.lead{margin:8px 0 18px;color:var(--muted)}
    .note,.hint-box{margin:16px 0;padding:13px 15px;border-left:5px solid #cbd5e1;background:var(--soft);border-radius:8px;color:#475569}.hint-box{display:none;border-color:#d6a62f;background:var(--gold-soft);color:#59410e}.hint-box.show{display:block}.student-input{width:100%;min-height:48px;border:1px solid #cbd5e1;border-radius:8px;padding:12px 14px;font-size:1.05rem;margin-top:8px}.student-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.15)}
    .finish-card{text-align:center}.score-big{font-size:clamp(2rem,8vw,3.2rem);margin:10px 0;font-weight:900;color:var(--accent-dark)}.pass{color:var(--right);font-weight:900}.fail{color:var(--wrong);font-weight:900}.send-status{min-height:1.5em;color:var(--muted);font-size:.92rem;margin-top:10px}.problem{padding:clamp(18px,3vw,28px)}.topic-row{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:14px}.tag{display:inline-flex;align-items:center;color:var(--accent-dark);background:var(--accent-soft);border:1px solid #99f6e4;border-radius:999px;padding:5px 10px;font-size:.88rem;font-weight:800;white-space:nowrap}.question-title{margin:0 0 10px;font-size:clamp(1.18rem,2vw,1.5rem)}
    .question-text{margin:0 0 20px;color:var(--ink);font-size:clamp(1.08rem,1.8vw,1.24rem);font-weight:750;line-height:1.85;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:16px 17px}.steps{display:grid;gap:12px}.step{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}.step-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;background:#fbfcfd;border-bottom:1px solid var(--line)}.step-prompt{color:var(--ink);font-size:clamp(1.02rem,1.7vw,1.15rem);font-weight:750;line-height:1.7}.state{font-size:.84rem;color:var(--muted);white-space:nowrap}.choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:14px}.choice{min-height:58px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);cursor:pointer;text-align:left;padding:12px 13px;display:flex;align-items:center;gap:10px}.choice:hover:not(:disabled){border-color:var(--accent);transform:translateY(-1px)}.choice:disabled{cursor:default;color:var(--muted)}.choice.selected{border-color:var(--accent);background:#f0fdfa;box-shadow:0 0 0 3px rgba(15,118,110,.13)}.choice .mark{width:26px;height:26px;flex:0 0 26px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);font-weight:900;color:var(--muted);background:var(--soft)}.choice.correct{border-color:#88caa7;background:var(--right-soft);color:var(--ink)}.choice.correct .mark{background:var(--right);border-color:var(--right);color:#fff}.choice.wrong{border-color:#eda1a1;background:var(--wrong-soft);color:var(--ink)}.choice.wrong .mark{background:var(--wrong);border-color:var(--wrong);color:#fff}
    .feedback{display:none;margin:0 14px 14px;border-radius:8px;padding:12px 13px;border:1px solid var(--line);background:var(--soft);color:var(--ink)}.feedback.show{display:block}.feedback.right{border-color:#99d5b4;background:var(--right-soft)}.feedback.wrong{border-color:#f0b2b2;background:var(--wrong-soft)}.controls{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);min-height:42px;padding:9px 14px;cursor:pointer;font-weight:800}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn:disabled{opacity:.48;cursor:not-allowed}
    .visual{position:sticky;top:94px;overflow:hidden}.visual-head{padding:15px 16px 0}.visual-head h2{margin:0;font-size:1rem}.diagram-wrap{padding:10px 12px 0}svg{width:100%;height:auto;display:block}.formula-box{margin:0 16px 16px;border-top:1px solid var(--line);padding-top:13px;display:grid;gap:8px;color:var(--muted);font-size:.95rem}.formula-box strong{color:var(--ink)}.frac{display:inline-grid;grid-template-rows:auto auto;vertical-align:middle;text-align:center;line-height:1.12;margin:0 .12em;white-space:nowrap}.frac-top{border-bottom:1.5px solid currentColor;padding:0 .2em .08em}.frac-bottom{padding:.08em .2em 0}
    @media(max-width:920px){.layout{grid-template-columns:1fr}.visual{position:static;order:-1}}@media(max-width:640px){header{position:static}.header-inner,.topic-row{align-items:stretch;flex-direction:column}.score{justify-content:flex-start}.choices{grid-template-columns:1fr}}

<body>
<div class="app">
  <header><div class="header-inner"><h1>熱と気体 大問対策</h1><div class="score" aria-live="polite"><span>大問</span><span class="pill" id="progressText">0 / 2</span><span>正答</span><span class="pill" id="scoreText">0 / 0</span><span>連続</span><span class="pill" id="streakText">0</span></div></div></header>
  <main>
    <section class="screen active" id="startScreen"><div class="panel start-card"><p class="tag">熱と気体</p><h2 class="question-title">気体の状態変化を大問形式で確認する問題</h2><p class="lead">9問の問題バンクから2題をランダム出題します。絶対温度、シャルルの法則、ボイル・シャルルの法則、状態方程式、熱力学第一法則を扱います。</p><div class="note">温度は絶対温度 [K] に直して計算します。このトレーナーでは <strong>K = ℃ + 273</strong> とします。</div><label for="studentId">学籍番号</label><input class="student-input" id="studentId" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号"><div class="controls"><button class="btn primary" id="startBtn" type="button">スタート</button></div></div></section>
    <section class="screen" id="quizScreen"><div class="layout"><section class="panel problem" aria-labelledby="problemTitle"><div class="topic-row"><div><p class="tag">熱と気体</p><h2 class="question-title" id="problemTitle">問題</h2></div><button class="btn" id="resetQuestionBtn" type="button">この問題をやり直す</button></div><p class="question-text" id="questionText"></p><div class="steps" id="steps"></div><div class="hint-box" id="hintBox" aria-live="polite"></div><div class="controls"><button class="btn" id="hintBtn" type="button">ヒントを表示</button><button class="btn" id="showSolutionBtn" type="button">解説を表示</button><button class="btn primary" id="nextBtn" type="button" disabled>次の問題</button></div></section>
      <aside class="panel visual" aria-labelledby="visualTitle"><div class="visual-head"><h2 id="visualTitle">図</h2></div><div class="diagram-wrap"><svg viewBox="0 0 400 280" role="img" aria-label="ピストン付き容器の模式図"><rect x="70" y="95" width="220" height="95" rx="12" fill="#ecfeff" stroke="#0f766e" stroke-width="4"></rect><rect x="248" y="82" width="28" height="121" rx="6" fill="#99f6e4" stroke="#0f766e" stroke-width="4"></rect><line x1="276" y1="142" x2="338" y2="142" stroke="#0f766e" stroke-width="8" stroke-linecap="round"></line><text x="146" y="148" text-anchor="middle" font-size="22" font-weight="900" fill="#115e59">気体</text><path d="M115 218 C145 196,170 240,201 216 S257 212,280 226" fill="none" stroke="#f97316" stroke-width="5"></path><text x="150" y="246" font-size="15" font-weight="800" fill="#9a3412">加熱・圧縮・状態変化</text></svg></div><div class="formula-box"><div><strong>温度</strong>　℃をKに直して使う</div><div><strong>状態変化</strong>　pV/T の関係を見る</div><div><strong>仕事と内部エネルギー</strong>　熱の出入りがなければ ΔU = W</div></div></aside>
    </div></section>
    <section class="screen" id="finishScreen"><div class="panel finish-card"><p class="tag">結果</p><h2 class="question-title">終了</h2><div class="score-big" id="finalScoreText"></div><div id="finalMessage"></div><div class="send-status" id="sendStatus"></div><div class="controls" style="justify-content:center"><button class="btn primary" id="againBtn" type="button">もう一度やる</button><button class="btn" id="categoryBtn" type="button">大問対策一覧へ</button><button class="btn" id="homeBtn" type="button">トップへ</button></div></div></section>
  </main>
</div>
<script src="../common/trainer_common_v2.js"></script>
<script>
const GAS_URL="https://script.google.com/a/macros/toyo.jp/s/AKfycbxKE8qHKfpyllw3LqmC1fKrDgdeUR2w2H7Q0l33YWFTY_krYKyqlWz3UueyOjQlr-D7GQ/exec?v=3";
const STAGE_NAME="熱と気体/大問/状態変化";
const TOTAL_QUESTIONS=2;
window.TrainerLog=window.TrainerLog||{startSession(){},startQuestion(){},recordQuestion(){},finishSession(){},showElapsedInFinalMessage(){},sendResult(){}};
const problemBank=[
  makeP1("HG_BIG_P1_01",27,87,"2.0×10^-3","1.0×10^5","300 [K]、360 [K]","2.4×10^-3 [m^3]","4.0×10^-4 [m^3]"),
  makeP1("HG_BIG_P1_02",47,127,"3.0×10^-3","1.2×10^5","320 [K]、400 [K]","3.75×10^-3 [m^3]","7.5×10^-4 [m^3]"),
  makeP1("HG_BIG_P1_03",-23,27,"4.0×10^-3","0.90×10^5","250 [K]、300 [K]","4.8×10^-3 [m^3]","8.0×10^-4 [m^3]"),
  makeP2("HG_BIG_P2_01",27,"2.0×10^-3","1.0×10^5","0.25","2.5×10^4 [N]","1.0×10^-3","2.2×10^5","57 [℃]","40 [J]","40 [J] 増加"),
  makeP2("HG_BIG_P2_02",27,"3.0×10^-3","1.0×10^5","0.20","2.0×10^4 [N]","2.0×10^-3","1.8×10^5","87 [℃]","60 [J]","60 [J] 増加"),
  makeP2("HG_BIG_P2_03",47,"2.5×10^-3","1.2×10^5","0.10","1.2×10^4 [N]","1.5×10^-3","2.25×10^5","87 [℃]","80 [J]","80 [J] 増加"),
  makeP3("HG_BIG_P3_01",27,"2.0×10^-3","1.0×10^5",177,"3.0×10^-3","300 [K]","0.080 [mol]","1.0×10^5 [Pa]"),
  makeP3("HG_BIG_P3_02",27,"3.0×10^-3","1.0×10^5",127,"4.0×10^-3","300 [K]","0.12 [mol]","1.0×10^5 [Pa]"),
  makeP3("HG_BIG_P3_03",47,"4.0×10^-3","1.0×10^5",127,"5.0×10^-3","320 [K]","0.15 [mol]","1.0×10^5 [Pa]")
];
function makeP1(id,t1,t2,v1,p,tempAns,v2,dv){return{id,title:"定圧変化",statement:`円筒容器になめらかに動くピストンを取り付け、一定量の気体を封入した。最初、気体の温度は ${t1} [℃]、体積は ${v1} [m^3]、圧力は ${p} [Pa] であった。その後、圧力を一定に保ったまま、気体を ${t2} [℃] まで温めた。`,hint:"圧力一定なので、体積は絶対温度に比例します。℃をKに直してから V1/T1 = V2/T2 を使います。",steps:[choice("temp","温度をそれぞれ絶対温度 [K] で表せ。",tempAns,tempChoices(tempAns),"℃に273を足して絶対温度に直します。"),choice("volume","温めた後の体積を求めよ。",v2,volChoices(v2),`圧力一定なので V2 = V1T2/T1 です。`),choice("delta","体積の増加量 ΔV を求めよ。",dv,volChoices(dv),`体積の増加量は、温めた後の体積から最初の体積を引いて求めます。`)]}}
function makeP2(id,t1,v1,p1,area,force,v2,p2,temp2,work,du){return{id,title:"圧縮と内部エネルギー",statement:`円筒容器になめらかに動くピストンを取り付け、一定量の気体を封入した。最初、気体の温度は ${t1} [℃]、体積は ${v1} [m^3]、圧力は ${p1} [Pa] であった。`,hint:"力は 圧力×面積 です。状態変化では pV/T の値が一定です。熱の出入りがなければ、外部がした仕事の分だけ内部エネルギーが増加します。",steps:[choice("force",`ピストンの断面積を ${area} [m^2] とすると、気体がピストンを押している力は何 [N] か。`,force,forceChoices(force),`力は 圧力×面積 で求めます。`),choice("temp",`ピストンを押したところ、はじめの状態から体積が ${v2} [m^3]、圧力が ${p2} [Pa] に変化した。温度は何 [℃] になっているか。`,temp2,["27 [℃]","47 [℃]","57 [℃]","87 [℃]","127 [℃]"].filter((v,i,a)=>a.indexOf(v)===i),`pV/T が一定なので T2 = p2V2T1/(p1V1) です。最後にKから℃へ戻します。`),choice("energy",`この圧縮では、外部が気体に ${work} の仕事をした。熱の出入りはないものとすると、気体の内部エネルギーは何 [J] 変化したか。`,du,[du,"40 [J] 減少","60 [J] 増加","80 [J] 増加","変化しない"].filter((v,i,a)=>a.indexOf(v)===i),`熱の出入りがないので、外部がした仕事の分だけ内部エネルギーが増加します。`)]}}
function makeP3(id,t1,v1,p1,t2,v2,tempAns,nAns,pAns){return{id,title:"状態方程式",statement:`ある容器に一定量の気体が入っている。気体の温度は ${t1} [℃]、体積は ${v1} [m^3]、圧力は ${p1} [Pa] である。気体定数を R = 8.3 [J/(mol・K)] とする。その後、温度を ${t2} [℃] まで上げ、体積を ${v2} [m^3] にした。`,hint:"まず℃をKに直します。物質量は pV = nRT から求めます。状態変化後の圧力は pV/T が一定であることから求められます。",steps:[choice("temp",`温度 ${t1} [℃] を絶対温度 [K] で表せ。`,tempAns,tempChoices(tempAns),"℃に273を足して絶対温度に直します。"),choice("amount","この気体の物質量を求めよ。",nAns,["0.080 [mol]","0.12 [mol]","0.15 [mol]","0.24 [mol]"],"状態方程式 pV = nRT を n について解きます。"),choice("pressure",`温度を ${t2} [℃] まで上げ、体積を ${v2} [m^3] にした。このときの圧力を求めよ。`,pAns,pressureChoices(pAns),"一定量の気体なので pV/T が一定です。")]}}
function choice(id,prompt,answer,choices,explain){return{id,prompt,answer,choices:shuffle([answer,...choices.filter(c=>c!==answer)]).slice(0,4),explain}}
function tempChoices(a){return [a,"273 [K]、333 [K]","300 [K]、450 [K]","320 [K]、400 [K]","250 [K]、300 [K]"]}
function volChoices(a){return [a,"2.0×10^-3 [m^3]","3.0×10^-3 [m^3]","4.0×10^-4 [m^3]","8.0×10^-4 [m^3]","7.5×10^-4 [m^3]"]}
function forceChoices(a){return [a,"2.5×10^5 [N]","1.0×10^5 [N]","4.0×10^4 [N]","1.2×10^4 [N]"]}
function pressureChoices(a){return [a,"0.80×10^5 [Pa]","1.2×10^5 [Pa]","1.5×10^5 [Pa]"]}
const $=s=>document.querySelector(s);const stepsEl=$("#steps"),progressText=$("#progressText"),scoreText=$("#scoreText"),streakText=$("#streakText"),nextBtn=$("#nextBtn"),hintBtn=$("#hintBtn"),hintBox=$("#hintBox");let quiz=[],problemIndex=0,currentProblem=null,currentSteps=[],stepState=[],score={correct:0,total:0,streak:0},resultSent=false;
function shuffle(items){const copy=items.slice();for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function escapeHTML(v){return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}
function frac(t,b){return `<span class="frac"><span class="frac-top">${t}</span><span class="frac-bottom">${b}</span></span>`}
function displayMath(v){return escapeHTML(v).replace(/×10\^(-?\d+)/g,(_,n)=>`×10<sup>${n}</sup>`).replace(/m\^3/g,"m<sup>3</sup>").replace(/m\^2/g,"m<sup>2</sup>").replace(/m2/g,"m<sup>2</sup>").replace(/m3/g,"m<sup>3</sup>").replace(/Δ/g,"&Delta;").replace(/V1\/T1/g,`${frac("V1","T1")}`).replace(/V2\/T2/g,`${frac("V2","T2")}`).replace(/pV\/T/g,`${frac("pV","T")}`).replace(/p2V2T1\/\(p1V1\)/g,`${frac("p2V2T1","p1V1")}`)}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.toggle("active",s.id===id))}
function renderProblem(){currentProblem=quiz[problemIndex];currentSteps=currentProblem.steps;stepState=currentSteps.map(()=>({answered:false,correct:false}));$("#problemTitle").textContent="問題";$("#questionText").innerHTML=displayMath(currentProblem.statement);stepsEl.innerHTML="";currentSteps.forEach((step,index)=>{const section=document.createElement("section");section.className="step";section.dataset.step=index;section.innerHTML=`<div class="step-head"><div><div class="step-prompt">${displayMath(step.prompt)}</div></div><span class="state" data-state>未解答</span></div><div class="choices">${shuffle(step.choices).map((c,i)=>`<button class="choice" type="button" data-value="${encodeURIComponent(c)}"><span class="mark">${String.fromCharCode(65+i)}</span><span>${displayMath(c)}</span></button>`).join("")}</div><div class="feedback" data-feedback></div>`;stepsEl.appendChild(section)});hintBox.classList.remove("show");hintBox.innerHTML="";hintBtn.textContent="ヒントを表示";nextBtn.disabled=true;nextBtn.textContent=problemIndex+1>=quiz.length?"結果を見る":"次の問題";TrainerLog.startQuestion();updateScore()}
function finishStep(index,button,revealed=false){if(stepState[index].answered)return;const step=currentSteps[index],selected=revealed?"解説表示":decodeURIComponent(button.dataset.value),ok=!revealed&&selected===step.answer;stepState[index]={answered:true,correct:ok};score.total++;if(ok){score.correct++;score.streak++}else score.streak=0;TrainerLog.recordQuestion({id:`${currentProblem.id}_${step.id}`,type:currentProblem.id,question:step.prompt,answer:step.answer},ok,{selected,answer:step.answer,prompt:step.prompt});const section=stepsEl.querySelector(`[data-step="${index}"]`);section.querySelectorAll(".choice").forEach(b=>{b.disabled=true;const v=decodeURIComponent(b.dataset.value);if(v===step.answer)b.classList.add("correct");if(!ok&&!revealed&&v===selected)b.classList.add("wrong")});const state=section.querySelector("[data-state]");state.textContent=ok?"正解":revealed?"解説を確認":"不正解";state.style.color=ok?"var(--right)":"var(--wrong)";const feedback=section.querySelector("[data-feedback]");feedback.innerHTML=`<strong>正解：${displayMath(step.answer)}</strong><br>${displayMath(step.explain)}`;feedback.className=`feedback show ${ok?"right":"wrong"}`;if(stepState.every(s=>s.answered))nextBtn.disabled=false;updateScore()}
function updateScore(){progressText.textContent=`${Math.min(problemIndex+1,quiz.length)} / ${quiz.length}`;scoreText.textContent=`${score.correct} / ${score.total}`;streakText.textContent=String(score.streak)}
function toggleHint(){if(!currentProblem)return;const show=!hintBox.classList.contains("show");hintBox.innerHTML=show?`<strong>ヒント</strong><br>${displayMath(currentProblem.hint)}`:"";hintBox.classList.toggle("show",show);hintBtn.textContent=show?"ヒントを隠す":"ヒントを表示"}
function showSolution(){currentSteps.forEach((step,index)=>{if(!stepState[index].answered){const section=stepsEl.querySelector(`[data-step="${index}"]`);const correct=Array.from(section.querySelectorAll(".choice")).find(b=>decodeURIComponent(b.dataset.value)===step.answer);finishStep(index,correct,true)}});nextBtn.disabled=false}
function resetCurrentProblem(){const answered=stepState.filter(s=>s.answered).length,correct=stepState.filter(s=>s.correct).length;score.total=Math.max(0,score.total-answered);score.correct=Math.max(0,score.correct-correct);score.streak=0;renderProblem()}
function startQuiz(){const studentId=$("#studentId").value.trim();if(!studentId){alert("学籍番号を入力してください。");$("#studentId").focus();return}quiz=shuffle(problemBank).slice(0,TOTAL_QUESTIONS);problemIndex=0;score={correct:0,total:0,streak:0};resultSent=false;TrainerLog.startSession();showScreen("quizScreen");renderProblem()}
function finishQuiz(){TrainerLog.finishSession();const rate=score.total?Math.round(score.correct/score.total*100):0;$("#finalScoreText").textContent=`${score.correct} / ${score.total}（${rate}%）`;$("#finalMessage").innerHTML=rate>=70?`<div class="pass">クリア！熱と気体の状態変化を整理できています。</div>`:`<div class="fail">温度をKに直すところから、もう一度確認しましょう。</div>`;TrainerLog.showElapsedInFinalMessage();showScreen("finishScreen");if(!resultSent){resultSent=true;TrainerLog.sendResult({score:score.correct,total:score.total})}}
stepsEl.addEventListener("click",e=>{const choice=e.target.closest(".choice");if(!choice)return;finishStep(Number(choice.closest(".step").dataset.step),choice,false)});hintBtn.addEventListener("click",toggleHint);$("#showSolutionBtn").addEventListener("click",showSolution);$("#resetQuestionBtn").addEventListener("click",resetCurrentProblem);nextBtn.addEventListener("click",()=>{if(problemIndex+1>=quiz.length){finishQuiz();return}problemIndex++;renderProblem()});$("#startBtn").addEventListener("click",startQuiz);$("#againBtn").addEventListener("click",()=>{showScreen("startScreen");progressText.textContent=`0 / ${TOTAL_QUESTIONS}`;scoreText.textContent="0 / 0";streakText.textContent="0";$("#sendStatus").textContent=""});$("#categoryBtn").addEventListener("click",()=>{location.href="../comprehensive/index.html"});$("#homeBtn").addEventListener("click",()=>{location.href="../index.html"});$("#studentId").addEventListener("keydown",e=>{if(e.key==="Enter")startQuiz()});progressText.textContent=`0 / ${TOTAL_QUESTIONS}`;
</script>
</body>
</html>
