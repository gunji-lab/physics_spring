const STAGE_NAME="熱と気体/Stage1/ボイルの法則";
window.HEAT_GAS_STAGE_CONFIG={
title:"熱と気体 Stage1 ボイルの法則トレーナー",lead:"温度一定の気体で pV = 一定 を使う4択クイズです。10問ランダム出題、70%以上でクリア。",
intro:"温度を一定に保つと、気体の圧力 p と体積 V の積は一定です。<br><b>p1V1 = p2V2</b> を使い、求める量に合わせて式を変形します。",
idPrefix:"HEAT_GAS1",total:10,groups:[{type:"p",count:7},{type:"V",count:3}],badges:{p:"圧力を求める",V:"体積を求める"},point:"温度一定では p と V は反比例します。体積が小さくなると圧力は大きくなります。",

{type:"V",ans:"0.25 [m^3]",question:"圧力 1.0×10^5 [Pa]、体積 0.50 [m^3] の気体を、温度一定で圧力 2.0×10^5 [Pa] にした。体積は何 [m^3] か。",calc:"V2 = (1.0×10^5 × 0.50) / (2.0×10^5) = 0.25 [m^3]"}
