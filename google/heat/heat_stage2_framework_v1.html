<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>熱 Stage2 熱容量トレーナー</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--accent:#ea580c;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}.wrap{max-width:820px;margin:0 auto;padding:22px 14px 46px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}.lead{color:var(--muted);font-size:.96rem;margin-bottom:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;color:var(--muted);font-size:.95rem;margin-top:12px}.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}.bar>div{height:100%;width:0;background:var(--accent);transition:width .25s ease}
.question{font-size:1.22rem;font-weight:800;margin:18px 0;padding:16px;background:var(--soft);border-radius:14px;border:1px solid var(--line)}.choices{display:grid;gap:12px;margin:16px 0}.choice{width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:var(--text);border-radius:14px;padding:14px 16px;font-size:1.06rem;font-weight:700;cursor:pointer}.choice:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(234,88,12,.10)}.choice.selected{border-color:var(--accent);background:#fff7ed;box-shadow:0 0 0 3px rgba(234,88,12,.16)}.choice:disabled{cursor:default;opacity:1}.choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}.choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid var(--line);border-radius:10px;font-family:"Times New Roman",serif;font-size:1.12rem;overflow-x:auto}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.button-break{flex-basis:100%;height:0}button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:var(--accent);color:#fff}button.secondary{background:#e5e7eb;color:#111827}button:disabled{opacity:.5;cursor:not-allowed}.result{text-align:center;padding:24px 8px}.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}.pass{color:var(--ok);font-weight:900}.fail{color:var(--ng);font-weight:900}
.note{margin-top:16px;padding:12px 14px;border-left:5px solid #fdba74;background:#fff7ed;border-radius:10px;color:#475569;font-size:.95rem}.badge{display:inline-block;font-size:.85rem;padding:2px 8px;border-radius:99px;background:#ffedd5;color:#9a3412;margin-bottom:8px}.figure{display:flex;justify-content:center;margin:10px 0}svg{max-width:330px;width:100%;height:auto}input{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}input:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px rgba(234,88,12,.15)}.status{font-size:.92rem;color:#6b7280;margin-top:10px}@media(max-width:520px){.card{padding:18px}.question{font-size:1.08rem}.choice{font-size:1rem}}
</style>
</head>
<body><div class="wrap"><div class="card">
<h1>熱 Stage2 熱容量トレーナー</h1>
<div class="lead">熱量 Q、熱容量 C、温度変化 ΔT の関係を練習する4択クイズです。10問ランダム出題、70%以上でクリア。</div>
<div id="startScreen">
 <div class="note">熱容量 <b>C [J/K]</b> は、物体の温度を <b>1 K（1 ℃）上げるのに必要な熱量</b>です。<br><b>Q = CΔT</b> を使って、熱量・熱容量・温度変化を求めます。温度変化は <b>ΔT = 加熱後の温度 − 加熱前の温度</b> です。</div>
 <div class="figure"><svg viewBox="0 0 330 175" role="img" aria-label="物体を加熱すると温度が上がる図"><defs><linearGradient id="heat" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#ef4444"/></linearGradient></defs><rect x="100" y="42" width="130" height="78" rx="14" fill="#ffedd5" stroke="#9a3412" stroke-width="3"/><text x="165" y="75" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">熱容量 C</text><text x="165" y="102" text-anchor="middle" font-size="17" fill="#7c2d12">温度変化 ΔT</text><path d="M165 164 C135 137 150 124 165 111 C180 129 196 142 165 164Z" fill="url(#heat)"/><line x1="35" y1="80" x2="90" y2="80" stroke="#ea580c" stroke-width="5"/><path d="M90 80l-14-9v18z" fill="#ea580c"/><text x="55" y="64" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">Q</text><text x="165" y="25" text-anchor="middle" font-size="21" font-weight="800" fill="#1f2937">Q = CΔT</text></svg></div>
 <div class="note">大学Googleアカウントで確認済みです。</div><input id="studentId" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号"><div class="buttons"><button id="startBtn">スタート</button></div>
</div>
<div id="quizScreen" style="display:none"><div class="top"><div id="count"></div><div id="score"></div></div><div class="bar"><div id="bar"></div></div><div id="question" class="question"></div><div id="choices" class="choices"></div><div id="feedback" class="feedback"></div><div class="buttons"><button id="answerBtn" disabled>答える</button><button id="nextBtn" disabled>次の問題</button><span class="button-break"></span><button class="secondary" id="restartBtn">最初から</button></div></div>
<div id="finishScreen" class="result" style="display:none"><div>結果</div><div id="finalScore" class="scorebig"></div><div id="finalMessage"></div><div id="sendStatus" class="status"></div><div class="buttons" style="justify-content:center"><button id="againBtn">もう一度やる</button><button class="secondary" id="reviewBtn">間違えた問題だけ復習</button><button class="secondary" id="categoryBtn">カテゴリトップへ</button><button class="secondary" id="homeBtn">トップページへ</button></div></div>
</div></div>
<script src="../common/trainer_common_v2.js"></script>
<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwBDYL4LmMQrNA0MFUAJ2gBtYumSQLoLKicRQnNoyhePgplh7q-CQ_kW3BjhCRnkDFDTQ/exec?v=3";
const STAGE_NAME="熱/Stage2/熱容量";
window.TrainerLog=window.TrainerLog||{startSession(){},startQuestion(){},recordQuestion(){},finishSession(){},showElapsedInFinalMessage(){},sendResult(){}};
const heatProblems=[
 {type:"Q",ans:"400 [J]",question:"熱容量 C = 100 [J/K] の物体の温度を 4 [K] 上げるのに必要な熱量 Q はいくらか。",calc:"Q = CΔT = 100 × 4 = 400 [J]"},
 {type:"Q",ans:"1000 [J]",question:"熱容量 C = 200 [J/K] の物体の温度を 5 [K] 上げるのに必要な熱量 Q はいくらか。",calc:"Q = CΔT = 200 × 5 = 1000 [J]"},
 {type:"Q",ans:"3000 [J]",question:"熱容量 C = 300 [J/K] の物体を 20 [℃] から 30 [℃] まで加熱した。加えた熱量 Q はいくらか。",calc:"ΔT = 30 − 20 = 10 [K]<br>Q = CΔT = 300 × 10 = 3000 [J]"},
 {type:"Q",ans:"5000 [J]",question:"熱容量 C = 250 [J/K] の物体を 15 [℃] から 35 [℃] まで加熱した。加えた熱量 Q はいくらか。",calc:"ΔT = 35 − 15 = 20 [K]<br>Q = CΔT = 250 × 20 = 5000 [J]"},
 {type:"Q",ans:"6000 [J]",question:"熱容量 C = 400 [J/K] の物体の温度を 15 [K] 上げた。加えた熱量 Q はいくらか。",calc:"Q = CΔT = 400 × 15 = 6000 [J]"},
 {type:"C",ans:"100 [J/K]",question:"ある物体に 500 [J] の熱を加えると、温度が 5 [K] 上がった。この物体の熱容量 C はいくらか。",calc:"C = Q/ΔT = 500 / 5 = 100 [J/K]"},
 {type:"C",ans:"200 [J/K]",question:"ある物体に 2000 [J] の熱を加えると、温度が 10 [K] 上がった。この物体の熱容量 C はいくらか。",calc:"C = Q/ΔT = 2000 / 10 = 200 [J/K]"},
 {type:"C",ans:"300 [J/K]",question:"ある物体に 4500 [J] の熱を加えると、温度が 15 [K] 上がった。この物体の熱容量 C はいくらか。",calc:"C = Q/ΔT = 4500 / 15 = 300 [J/K]"},
 {type:"C",ans:"400 [J/K]",question:"ある物体に 8000 [J] の熱を加えると、温度が 20 [℃] から 40 [℃] になった。この物体の熱容量 C はいくらか。",calc:"ΔT = 40 − 20 = 20 [K]<br>C = Q/ΔT = 8000 / 20 = 400 [J/K]"},
 {type:"C",ans:"500 [J/K]",question:"ある物体に 5000 [J] の熱を加えると、温度が 10 [℃] から 20 [℃] になった。この物体の熱容量 C はいくらか。",calc:"ΔT = 20 − 10 = 10 [K]<br>C = Q/ΔT = 5000 / 10 = 500 [J/K]"},
 {type:"dT",ans:"5 [K]",question:"熱容量 C = 200 [J/K] の物体に 1000 [J] の熱を加えた。温度変化 ΔT はいくらか。",calc:"ΔT = Q/C = 1000 / 200 = 5 [K]"},
 {type:"dT",ans:"10 [K]",question:"熱容量 C = 300 [J/K] の物体に 3000 [J] の熱を加えた。温度変化 ΔT はいくらか。",calc:"ΔT = Q/C = 3000 / 300 = 10 [K]"},
 {type:"dT",ans:"15 [K]",question:"熱容量 C = 400 [J/K] の物体に 6000 [J] の熱を加えた。温度変化 ΔT はいくらか。",calc:"ΔT = Q/C = 6000 / 400 = 15 [K]"},
 {type:"dT",ans:"20 [K]",question:"熱容量 C = 250 [J/K] の物体に 5000 [J] の熱を加えた。温度変化 ΔT はいくらか。",calc:"ΔT = Q/C = 5000 / 250 = 20 [K]"}
];
const answerPools={Q:["200 [J]","400 [J]","500 [J]","800 [J]","1000 [J]","2000 [J]","3000 [J]","4000 [J]","5000 [J]","6000 [J]","8000 [J]"],C:["50 [J/K]","100 [J/K]","150 [J/K]","200 [J/K]","250 [J/K]","300 [J/K]","400 [J/K]","500 [J/K]"],dT:["2 [K]","4 [K]","5 [K]","8 [K]","10 [K]","15 [K]","20 [K]","25 [K]"]};
let quiz=[],index=0,score=0,wrongList=[],answered=false,selectedAnswer="",selectedButton=null;const total=10,$=id=>document.getElementById(id);
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeChoices(q){return shuffle([q.ans,...shuffle(answerPools[q.type].filter(x=>x!==q.ans)).slice(0,3)])}
function buildQuiz(){const qs=heatProblems.filter(q=>q.type==="Q"),cs=heatProblems.filter(q=>q.type==="C"),ts=heatProblems.filter(q=>q.type==="dT");return [...shuffle(qs).slice(0,4),...shuffle(cs).slice(0,3),...shuffle(ts).slice(0,3)]}
function start(source=null){if(!$("studentId").value.trim()){alert("学籍番号を入力してください。");$("studentId").focus();return}quiz=shuffle(source||buildQuiz()).slice(0,total).map(q=>({...q,choices:makeChoices(q)}));index=0;score=0;wrongList=[];TrainerLog.startSession();$("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion()}
function showQuestion(){answered=false;selectedAnswer="";selectedButton=null;const q=quiz[index];$("count").textContent=`${index+1} / ${quiz.length}`;$("score").textContent=`正解 ${score}`;$("bar").style.width=`${index/quiz.length*100}%`;const badges={Q:"Q を求める",C:"C を求める",dT:"ΔT を求める"};$("question").innerHTML=`<span class="badge">${badges[q.type]}</span><br>${q.question}`;$("feedback").className="feedback";$("feedback").style.display="none";$("answerBtn").disabled=true;$("nextBtn").disabled=true;const box=$("choices");box.innerHTML="";q.choices.forEach((c,i)=>{const b=document.createElement("button");b.className="choice";b.dataset.answer=c;b.textContent=`${["①","②","③","④"][i]}　${c}`;b.onclick=()=>selectChoice(c,b);box.appendChild(b)});TrainerLog.startQuestion()}
function selectChoice(value,button){if(answered)return;selectedAnswer=value;selectedButton=button;document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"));button.classList.add("selected");$("answerBtn").disabled=false}
function check(){if(answered||!selectedAnswer)return;answered=true;const q=quiz[index],ok=selectedAnswer===q.ans;if(!q.id)q.id=`HEAT2_${q.type}_${index+1}`;TrainerLog.recordQuestion(q,ok,{selected:selectedAnswer,answer:q.ans,prompt:q.question});if(ok)score++;else wrongList.push(q);document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.dataset.answer===q.ans)b.classList.add("correct")});if(!ok&&selectedButton)selectedButton.classList.add("wrong");$("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML=`<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong><div class="formula">${q.calc}</div><div class="note">ポイント：まず ΔT = 加熱後 − 加熱前 を確認し、Q = CΔT を求める量に合わせて変形します。</div>`;$("feedback").style.display="block";$("score").textContent=`正解 ${score}`;$("answerBtn").disabled=true;$("nextBtn").disabled=false}
function next(){index++;index>=quiz.length?finish():showQuestion()}
function finish(){TrainerLog.finishSession();$("quizScreen").style.display="none";$("finishScreen").style.display="block";const rate=Math.round(score/quiz.length*100);$("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;$("finalMessage").innerHTML=rate>=70?'<div class="pass">クリア！熱容量の基本はいい感じです。</div>':'<div class="fail">もう一回やると、Q = CΔT の使い方が定着します。</div>';TrainerLog.showElapsedInFinalMessage();$("reviewBtn").style.display=wrongList.length?"inline-block":"none";TrainerLog.sendResult({score,total:quiz.length})}
$("startBtn").onclick=()=>start();$("answerBtn").onclick=check;$("nextBtn").onclick=next;$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start()});$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("reviewBtn").onclick=()=>{if(wrongList.length)start([...wrongList])};$("categoryBtn").onclick=()=>{location.href="index.html"};$("homeBtn").onclick=()=>{location.href="../index.html"};
</script></body></html>
