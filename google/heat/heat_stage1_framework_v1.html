<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>熱 Stage1 温度変換トレーナー</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--accent:#ea580c;--accent-soft:#fff7ed;--ok:#16a34a;--ng:#dc2626;--line:#e5e7eb;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:22px 14px 46px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.07)}
h1{margin:0 0 6px;font-size:1.55rem}.lead{color:var(--muted);font-size:.96rem;margin-bottom:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;color:var(--muted);font-size:.95rem;margin-top:12px}
.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:10px 0 20px}.bar>div{height:100%;width:0%;background:var(--accent);transition:width .25s ease}
.question{font-size:1.22rem;font-weight:800;margin:18px 0;padding:16px;background:var(--soft);border-radius:14px;border:1px solid var(--line)}.choices{display:grid;gap:12px;margin:16px 0}
.choice{width:100%;text-align:left;border:1px solid #cbd5e1;background:#fff;color:var(--text);border-radius:14px;padding:14px 16px;font-size:1.06rem;font-weight:700;cursor:pointer}.choice:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(234,88,12,.10)}
.choice.selected{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 3px rgba(234,88,12,.16)}.choice:disabled{cursor:default;opacity:1}.choice.correct{border-color:#86efac;background:#ecfdf5;color:#14532d}.choice.wrong{border-color:#fecaca;background:#fef2f2;color:#7f1d1d}
.feedback{display:none;margin-top:18px;padding:16px;border-radius:14px}.feedback.ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#14532d}.feedback.ng{display:block;background:#fef2f2;border:1px solid #fecaca;color:#7f1d1d}
.formula{margin-top:10px;padding:11px 12px;background:#fff;border:1px solid var(--line);border-radius:10px;font-family:"Times New Roman",serif;font-size:1.12rem;overflow-x:auto}.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.button-break{flex-basis:100%;height:0}
button{border:0;border-radius:12px;padding:12px 16px;font-size:1rem;font-weight:800;cursor:pointer;background:var(--accent);color:#fff}button.secondary{background:#e5e7eb;color:#111827}button:disabled{opacity:.5;cursor:not-allowed}
.result{text-align:center;padding:24px 8px}.scorebig{font-size:2.25rem;font-weight:900;margin:8px 0}.pass{color:var(--ok);font-weight:900}.fail{color:var(--ng);font-weight:900}.note{margin-top:16px;padding:12px 14px;border-left:5px solid #fdba74;background:#fff7ed;border-radius:10px;color:#475569;font-size:.95rem}.badge{display:inline-block;font-size:.85rem;padding:2px 8px;border-radius:99px;background:#ffedd5;color:#9a3412;margin-bottom:8px}
.figure{display:flex;justify-content:center;margin:8px 0}.thermometer{width:min(100%,330px);padding:16px 20px;border-radius:16px;background:linear-gradient(135deg,#eff6ff,#fff7ed);border:1px solid var(--line);text-align:center}.scale{display:flex;justify-content:space-between;align-items:center;gap:10px;font-weight:900;font-size:1.08rem}.arrow{color:var(--accent);font-size:1.45rem}.rule{margin-top:8px;color:#475569;font-family:"Times New Roman",serif;font-size:1.15rem}
input{width:100%;padding:14px 16px;font-size:1.1rem;border:1px solid #cbd5e1;border-radius:12px;margin-top:12px}input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(234,88,12,.15)}.status{font-size:.92rem;color:#6b7280;margin-top:10px}@media(max-width:520px){.card{padding:18px}.question{font-size:1.08rem}.choice{font-size:1rem}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>熱 Stage1 温度変換トレーナー</h1>
<div class="lead">セルシウス温度と絶対温度の変換を練習する4択クイズです。10問ランダム出題、70%以上でクリア。</div>
<div id="startScreen">
  <div class="note">このステージでは <b>セルシウス温度 t [℃]</b> と <b>絶対温度 T [K]</b> の変換を練習します。<br><b>T = t + 273</b>、<b>t = T − 273</b> を使います。温度差は 1 ℃ と 1 K で同じ大きさです。</div>
  <div class="figure"><div class="thermometer"><div class="scale"><span>0 ℃</span><span class="arrow">⇄</span><span>273 K</span></div><div class="rule">T [K] = t [℃] + 273</div></div></div>
  <div class="note">大学Googleアカウントで確認済みです。</div>
  <input id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">
  <div class="buttons"><button id="startBtn">スタート</button></div>
</div>
<div id="quizScreen" style="display:none"><div class="top"><div id="count"></div><div id="score"></div></div><div class="bar"><div id="bar"></div></div><div id="question" class="question"></div><div id="choices" class="choices"></div><div id="feedback" class="feedback"></div><div class="buttons"><button id="answerBtn" disabled>答える</button><button id="nextBtn" disabled>次の問題</button><span class="button-break"></span><button class="secondary" id="restartBtn">最初から</button></div></div>
<div id="finishScreen" class="result" style="display:none"><div>結果</div><div id="finalScore" class="scorebig"></div><div id="finalMessage"></div><div id="sendStatus" class="status"></div><div class="buttons" style="justify-content:center"><button id="againBtn">もう一度やる</button><button class="secondary" id="reviewBtn">間違えた問題だけ復習</button><button class="secondary" id="categoryBtn">カテゴリトップへ</button><button class="secondary" id="homeBtn">トップページへ</button></div></div>
</div></div>
<script src="../common/trainer_common_v2.js"></script>
<script>
const GAS_URL="https://script.google.com/a/macros/toyo.jp/s/AKfycbxKE8qHKfpyllw3LqmC1fKrDgdeUR2w2H7Q0l33YWFTY_krYKyqlWz3UueyOjQlr-D7GQ/exec?v=3";
const STAGE_NAME="熱/Stage1/温度変換";
// 共通記録スクリプトがないプレビュー環境でも、クイズ本体は動作させる。
window.TrainerLog=window.TrainerLog||{startSession(){},startQuestion(){},recordQuestion(){},finishSession(){},showElapsedInFinalMessage(){},sendResult(){}};

const toKelvinProblems=[
{type:"K",ans:"273 [K]",question:"セルシウス温度 0 [℃] は、絶対温度で何 [K] か。",calc:"T = t + 273 = 0 + 273 = 273 [K]"},
{type:"K",ans:"293 [K]",question:"セルシウス温度 20 [℃] は、絶対温度で何 [K] か。",calc:"T = t + 273 = 20 + 273 = 293 [K]"},
{type:"K",ans:"298 [K]",question:"セルシウス温度 25 [℃] は、絶対温度で何 [K] か。",calc:"T = t + 273 = 25 + 273 = 298 [K]"},
{type:"K",ans:"310 [K]",question:"セルシウス温度 37 [℃] は、絶対温度で何 [K] か。",calc:"T = t + 273 = 37 + 273 = 310 [K]"},
{type:"K",ans:"373 [K]",question:"セルシウス温度 100 [℃] は、絶対温度で何 [K] か。",calc:"T = t + 273 = 100 + 273 = 373 [K]"},
{type:"K",ans:"263 [K]",question:"セルシウス温度 −10 [℃] は、絶対温度で何 [K] か。",calc:"T = t + 273 = −10 + 273 = 263 [K]"},
{type:"K",ans:"233 [K]",question:"セルシウス温度 −40 [℃] は、絶対温度で何 [K] か。",calc:"T = t + 273 = −40 + 273 = 233 [K]"}
];
const toCelsiusProblems=[
{type:"C",ans:"0 [℃]",question:"絶対温度 273 [K] は、セルシウス温度で何 [℃] か。",calc:"t = T − 273 = 273 − 273 = 0 [℃]"},
{type:"C",ans:"20 [℃]",question:"絶対温度 293 [K] は、セルシウス温度で何 [℃] か。",calc:"t = T − 273 = 293 − 273 = 20 [℃]"},
{type:"C",ans:"25 [℃]",question:"絶対温度 298 [K] は、セルシウス温度で何 [℃] か。",calc:"t = T − 273 = 298 − 273 = 25 [℃]"},
{type:"C",ans:"37 [℃]",question:"絶対温度 310 [K] は、セルシウス温度で何 [℃] か。",calc:"t = T − 273 = 310 − 273 = 37 [℃]"},
{type:"C",ans:"100 [℃]",question:"絶対温度 373 [K] は、セルシウス温度で何 [℃] か。",calc:"t = T − 273 = 373 − 273 = 100 [℃]"},
{type:"C",ans:"−10 [℃]",question:"絶対温度 263 [K] は、セルシウス温度で何 [℃] か。",calc:"t = T − 273 = 263 − 273 = −10 [℃]"},
{type:"C",ans:"−40 [℃]",question:"絶対温度 233 [K] は、セルシウス温度で何 [℃] か。",calc:"t = T − 273 = 233 − 273 = −40 [℃]"}
];
const kelvinAns=["233 [K]","253 [K]","263 [K]","273 [K]","283 [K]","293 [K]","298 [K]","300 [K]","310 [K]","323 [K]","373 [K]"];
const celsiusAns=["−40 [℃]","−20 [℃]","−10 [℃]","0 [℃]","10 [℃]","20 [℃]","25 [℃]","27 [℃]","37 [℃]","50 [℃]","100 [℃]"];
let quiz=[],index=0,score=0,wrongList=[],answered=false,selectedAnswer="",selectedButton=null;
const total=10,$=id=>document.getElementById(id);
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makeChoices(q){const pool=q.type==="K"?kelvinAns:celsiusAns;return shuffle([q.ans,...shuffle(pool.filter(x=>x!==q.ans)).slice(0,3)])}
function buildQuiz(){return [...shuffle(toKelvinProblems).slice(0,5),...shuffle(toCelsiusProblems).slice(0,5)]}
function start(source=null){const studentId=$("studentId").value.trim();if(!studentId){alert("学籍番号を入力してください。");$("studentId").focus();return}quiz=shuffle(source||buildQuiz()).slice(0,total).map(q=>({...q,choices:makeChoices(q)}));index=0;score=0;wrongList=[];TrainerLog.startSession();$("startScreen").style.display="none";$("finishScreen").style.display="none";$("quizScreen").style.display="block";showQuestion()}
function showQuestion(){answered=false;selectedAnswer="";selectedButton=null;const q=quiz[index];$("count").textContent=`${index+1} / ${quiz.length}`;$("score").textContent=`正解 ${score}`;$("bar").style.width=`${index/quiz.length*100}%`;$("question").innerHTML=`<span class="badge">${q.type==="K"?"K に変換":"℃ に変換"}</span><br>${q.question}`;$("feedback").className="feedback";$("feedback").style.display="none";$("answerBtn").disabled=true;$("nextBtn").disabled=true;const box=$("choices");box.innerHTML="";q.choices.forEach((c,i)=>{const b=document.createElement("button");b.className="choice";b.dataset.answer=c;b.textContent=`${["①","②","③","④"][i]}　${c}`;b.onclick=()=>selectChoice(c,b);box.appendChild(b)});TrainerLog.startQuestion()}
function selectChoice(selected,btn){if(answered)return;selectedAnswer=selected;selectedButton=btn;document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"));btn.classList.add("selected");$("answerBtn").disabled=false}
function explanation(q,ok){return `<strong>${ok?"正解！":"不正解"}</strong><br>正解：<strong>${q.ans}</strong><div class="formula">${q.calc}</div><div class="note">ポイント：℃ から K へは 273 を足し、K から ℃ へは 273 を引きます。K には「度（°）」を付けません。</div>`}
function check(){if(answered||!selectedAnswer)return;answered=true;const q=quiz[index],ok=selectedAnswer===q.ans;if(!q.id)q.id=`HEAT1_${q.type}_${index+1}`;TrainerLog.recordQuestion(q,ok,{selected:selectedAnswer,answer:q.ans,prompt:q.question});if(ok)score++;else wrongList.push(q);document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.dataset.answer===q.ans)b.classList.add("correct")});if(!ok&&selectedButton)selectedButton.classList.add("wrong");$("feedback").className="feedback "+(ok?"ok":"ng");$("feedback").innerHTML=explanation(q,ok);$("feedback").style.display="block";$("score").textContent=`正解 ${score}`;$("answerBtn").disabled=true;$("nextBtn").disabled=false}
function next(){index++;index>=quiz.length?finish():showQuestion()}
function finish(){TrainerLog.finishSession();$("quizScreen").style.display="none";$("finishScreen").style.display="block";const rate=Math.round(score/quiz.length*100);$("finalScore").textContent=`${score} / ${quiz.length} 問正解（${rate}%）`;$("finalMessage").innerHTML=rate>=70?'<div class="pass">クリア！温度変換の基本はばっちりです。</div>':'<div class="fail">もう一回やると、「足す・引く」の向きが定着します。</div>';TrainerLog.showElapsedInFinalMessage();$("reviewBtn").style.display=wrongList.length?"inline-block":"none";TrainerLog.sendResult({score,total:quiz.length})}
$("startBtn").onclick=()=>start();$("answerBtn").onclick=check;$("nextBtn").onclick=next;$("studentId").addEventListener("keydown",e=>{if(e.key==="Enter")start()});$("restartBtn").onclick=()=>{$("quizScreen").style.display="none";$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("againBtn").onclick=()=>{$("finishScreen").style.display="none";$("startScreen").style.display="block"};$("reviewBtn").onclick=()=>{if(wrongList.length){const saved=[...wrongList];start(saved)}};$("categoryBtn").onclick=()=>{location.href="index.html"};$("homeBtn").onclick=()=>{location.href="../index.html"};
</script>
</body>
</html>
