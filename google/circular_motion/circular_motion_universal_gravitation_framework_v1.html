<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>円運動 大問対策 - 万有引力</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5c6672;
      --line: #d9dee6;
      --soft: #f5f7fa;
      --panel: #ffffff;
      --accent: #1d6f8f;
      --accent-dark: #15536a;
      --accent-soft: #dff3f7;
      --gold-soft: #fff1d0;
      --wrong: #b13b3b;
      --wrong-soft: #fde7e7;
      --right: #247a4b;
      --right-soft: #e4f6ec;
      --shadow: 0 14px 32px rgba(31, 41, 51, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef7f8 0, #f8fafb 320px, #f4f6f8 100%);
      line-height: 1.55;
    }

    button, input { font: inherit; }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }

    header {
      padding: 22px clamp(16px, 3vw, 40px) 16px;
      border-bottom: 1px solid rgba(31, 41, 51, 0.08);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
    }

    h1 { font-size: clamp(1.25rem, 2.8vw, 2rem); margin: 0; letter-spacing: 0; }

    .score {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      min-width: 78px;
      text-align: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 700;
    }

    main { width: min(1180px, 100%); margin: 0 auto; padding: clamp(16px, 3vw, 32px); }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 430px);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .start-card, .finish-card {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: clamp(20px, 4vw, 34px);
    }

    .lead { margin: 8px 0 18px; color: var(--muted); }

    .note, .hint-box {
      margin: 16px 0;
      padding: 13px 15px;
      border-left: 5px solid #cbd5e1;
      background: var(--soft);
      border-radius: 8px;
      color: #475569;
    }

    .hint-box {
      display: none;
      border-color: #d6a62f;
      background: var(--gold-soft);
      color: #59410e;
    }

    .hint-box.show { display: block; }
    .hint-box strong { color: #3d2a05; }

    .student-input {
      width: 100%;
      min-height: 48px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 1.05rem;
      margin-top: 8px;
    }

    .student-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 111, 143, 0.15);
    }

    .finish-card { text-align: center; }
    .score-big { font-size: clamp(2rem, 8vw, 3.2rem); margin: 10px 0; font-weight: 900; color: var(--accent-dark); }
    .pass { color: var(--right); font-weight: 900; }
    .fail { color: var(--wrong); font-weight: 900; }
    .send-status { min-height: 1.5em; color: var(--muted); font-size: 0.92rem; margin-top: 10px; }

    .problem { padding: clamp(18px, 3vw, 28px); }

    .topic-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      color: var(--accent-dark);
      background: var(--accent-soft);
      border: 1px solid #b9e1e9;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .question-title { margin: 0 0 10px; font-size: clamp(1.18rem, 2vw, 1.5rem); }
    .question-text {
      margin: 0 0 20px;
      color: var(--ink);
      font-size: clamp(1.08rem, 1.8vw, 1.24rem);
      font-weight: 750;
      line-height: 1.8;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px 17px;
    }

    .givens {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin: 18px 0 20px;
    }

    .given {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      min-height: 74px;
    }

    .given span { display: block; color: var(--muted); font-size: 0.82rem; margin-bottom: 2px; }
    .given strong { font-size: 1.08rem; }
    .givens:empty { display: none; }

    .steps { display: grid; gap: 12px; }

    .step {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .step-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      background: #fbfcfd;
      border-bottom: 1px solid var(--line);
    }

    .step-head h2 { margin: 0; font-size: 1rem; }
    .step-prompt {
      color: var(--ink);
      font-size: clamp(1.02rem, 1.7vw, 1.15rem);
      font-weight: 750;
      line-height: 1.7;
    }
    .state { font-size: 0.84rem; color: var(--muted); white-space: nowrap; }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .choice {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      padding: 12px 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .choice:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); }
    .choice:disabled { cursor: default; color: var(--muted); }

    .choice .mark {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      font-weight: 800;
      color: var(--muted);
      background: var(--soft);
    }

    .choice.correct { border-color: #88caa7; background: var(--right-soft); color: var(--ink); }
    .choice.correct .mark { background: var(--right); border-color: var(--right); color: #fff; }
    .choice.wrong { border-color: #eda1a1; background: var(--wrong-soft); color: var(--ink); }
    .choice.wrong .mark { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    .feedback {
      display: none;
      margin: 0 14px 14px;
      border-radius: 8px;
      padding: 12px 13px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
    }

    .feedback.show { display: block; }
    .feedback.right { border-color: #99d5b4; background: var(--right-soft); }
    .feedback.wrong { border-color: #f0b2b2; background: var(--wrong-soft); }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      min-height: 42px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn:disabled { opacity: 0.48; cursor: not-allowed; }

    .visual { position: sticky; top: 94px; overflow: hidden; }
    .visual-head { padding: 15px 16px 0; }
    .visual-head h2 { margin: 0; font-size: 1rem; }
    .diagram-wrap { padding: 10px 12px 0; }
    svg { width: 100%; height: auto; display: block; }

    .formula-box {
      margin: 0 16px 16px;
      border-top: 1px solid var(--line);
      padding-top: 13px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .formula-box strong { color: var(--ink); }
    .frac {
      display: inline-grid;
      grid-template-rows: auto auto;
      vertical-align: middle;
      text-align: center;
      line-height: 1.12;
      margin: 0 .12em;
      white-space: nowrap;
    }
    .frac-top { border-bottom: 1.5px solid currentColor; padding: 0 .2em .08em; }
    .frac-bottom { padding: .08em .2em 0; }
    .dim-label, .force-label { font-size: 13px; font-weight: 700; fill: #26323f; }
    .muted-label { font-size: 12px; fill: #64717f; }

    .orbiting {
      transform-origin: 200px 145px;
      animation: orbit 7s linear infinite;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      .visual { position: static; order: -1; }
    }

    @media (max-width: 640px) {
      header { position: static; }
      .header-inner, .topic-row { align-items: stretch; flex-direction: column; }
      .score { justify-content: flex-start; }
      .choices { grid-template-columns: 1fr; }
    }

    .step[hidden]{display:none}
    .answer-input-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:12px}
    .answer-input{width:min(240px,100%);padding:11px 12px;border:2px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
    .answer-input:focus{outline:none;border-color:var(--accent)}
    .unit-label{font-weight:800;color:var(--muted)}
    .main-answer{margin:18px 0;padding:16px;border:2px solid #b9d6e2;border-radius:14px;background:#f7fcfe}
    .main-answer h3{margin:0 0 6px;font-size:1.04rem}.main-answer .choices{margin-top:12px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-inner">
        <h1>円運動 大問対策 - 万有引力</h1>
        <div class="score" aria-live="polite">
          <span>大問</span><span class="pill" id="progressText">0 / 2</span>
          <span>正答</span><span class="pill" id="scoreText">0 / 0</span>
          <span>連続</span><span class="pill" id="streakText">0</span>
        </div>
      </div>
    </header>

    <main>
      <section class="screen active" id="startScreen">
        <div class="panel start-card">
          <p class="tag">万有引力と円運動</p>
          <h2 class="question-title">万有引力と円運動を大問形式で確認する問題</h2>
          <p class="lead">12問の問題バンクから2題をランダム出題します。距離・質量による万有引力の変化、人工衛星、ISS、月、地表付近の衛星、惑星の円運動を扱います。</p>
          <label for="studentId">学籍番号</label>
          <input class="student-input" id="studentId" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="学籍番号">
          <div class="controls">
            <button class="btn primary" id="startBtn" type="button">スタート</button>
          </div>
        </div>
      </section>

      <section class="screen" id="quizScreen">
        <div class="layout">
          <section class="panel problem" aria-labelledby="problemTitle">
            <div class="topic-row">
              <div>
                <p class="tag">万有引力と円運動</p>
                <h2 class="question-title" id="problemTitle">問題</h2>
              </div>
              <button class="btn" id="resetQuestionBtn" type="button">この大問を練習し直す</button>
            </div>

            <p class="question-text" id="questionText"></p>
            <div class="givens" id="givens" aria-label="与えられた値"></div>
            <div class="steps" id="steps"></div>
            <div class="main-answer" id="mainAnswerArea" hidden></div>
            <div class="hint-box" id="hintBox" aria-live="polite"></div>

            <div class="controls">
              <button class="btn primary" id="revealStepBtn" type="button" hidden>次の設問へ</button>
              <button class="btn" id="hintBtn" type="button">ヒントを表示</button>
              <button class="btn" id="showSolutionBtn" type="button">解説を表示</button>
              <button class="btn primary" id="nextBtn" type="button" disabled>結果を見る</button>
            </div>
          </section>

          <aside class="panel visual" aria-labelledby="visualTitle">
            <div class="visual-head">
              <h2 id="visualTitle">図</h2>
            </div>
            <div class="diagram-wrap">
              <svg viewBox="0 0 400 300" role="img" aria-labelledby="svgTitle svgDesc">
                <title id="svgTitle">地球と人工衛星の模式図</title>
                <desc id="svgDesc">地球のまわりを人工衛星が円軌道で動く様子。</desc>
                <defs>
                  <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d6f8f"></path>
                  </marker>
                  <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#b13b3b"></path>
                  </marker>
                </defs>

                <circle cx="200" cy="145" r="104" fill="#f8fbfc" stroke="#cfd8df" stroke-width="3"></circle>
                <circle cx="200" cy="145" r="28" fill="#f4b942" stroke="#b27b16" stroke-width="4"></circle>
                <text x="200" y="151" text-anchor="middle" font-size="16" font-weight="900" fill="#513500">M</text>
                <text x="176" y="110" class="muted-label">地球</text>

                <line x1="200" y1="145" x2="304" y2="145" stroke="#1d6f8f" stroke-width="4" marker-end="url(#arrowBlue)"></line>
                <text x="249" y="134" class="dim-label">r</text>

                <path d="M 246 50 A 104 104 0 0 1 304 145" fill="none" stroke="#1d6f8f" stroke-width="4" marker-end="url(#arrowBlue)"></path>
                <text x="252" y="55" class="dim-label">衛星の軌道</text>

                <g class="orbiting">
                  <circle cx="304" cy="145" r="17" fill="#1d6f8f" stroke="#15536a" stroke-width="3"></circle>
                  <text x="304" y="150" text-anchor="middle" font-size="12" font-weight="900" fill="#fff">衛星</text>
                  <line x1="294" y1="145" x2="232" y2="145" stroke="#b13b3b" stroke-width="5" marker-end="url(#arrowRed)"></line>
                  <text x="241" y="132" class="force-label">万有引力</text>
                </g>
              </svg>
            </div>
            <div class="formula-box">
              <div><strong>地球表面</strong>　万有引力を重力 mg として見る</div>
              <div><strong>人工衛星</strong>　万有引力が円運動に必要な力になる</div>
              <div><strong>ゴール</strong>　軌道速度 v = √<span class="frac"><span class="frac-top">GM</span><span class="frac-bottom">r</span></span> と第一宇宙速度を導く</div>
            </div>
          </aside>
        </div>
      </section>

      <section class="screen" id="finishScreen">
        <div class="panel finish-card">
          <p class="tag">結果</p>
          <h2 class="question-title">終了</h2>
          <div class="score-big" id="finalScoreText"></div>
          <div id="finalMessage"></div>
          <div class="send-status" id="sendStatus"></div>
          <div class="controls" style="justify-content:center">
            <button class="btn primary" id="againBtn" type="button">もう一度やる</button>
            <button class="btn" id="categoryBtn" type="button">円運動一覧へ</button>
            <button class="btn" id="homeBtn" type="button">トップへ</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../common/trainer_common_v2.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/a/macros/toyo.jp/s/AKfycbxKE8qHKfpyllw3LqmC1fKrDgdeUR2w2H7Q0l33YWFTY_krYKyqlWz3UueyOjQlr-D7GQ/exec?v=3";
    const STAGE_NAME = "円運動/大問/万有引力";
    const TOTAL_QUESTIONS = 2;
    window.TrainerLog = window.TrainerLog || {startSession(){},startQuestion(){},recordQuestion(){},finishSession(){},showElapsedInFinalMessage(){},sendResult(){}};

    const problemBank = [
      makePattern1("UG_P1_01", 2, 3, 600, 120),
      makePattern1("UG_P1_02", 3, 5, 900, 150),
      makePattern1("UG_P1_03", 4, 2, 720, 90),
      makePattern2("UG_P2_01", 100, 500),
      makePattern2("UG_P2_02", 200, 1000),
      makePattern2("UG_P2_03", 50, 800),
      {
        id: "UG_P3_01",
        title: "ISSの万有引力と速さ",
        statement: "国際宇宙ステーション（ISS）は地球の周りを円運動している。ISSの質量を m [kg]、地球の質量を M [kg]、ISSの軌道半径を r [m]、万有引力定数を G とする。",
        hint: "万有引力が円運動の向心力になります。まず万有引力を文字式で表し、それを円運動の向心力と等しいとおきます。",
        steps: [
          choiceStep("force", "ISSにはたらく万有引力を求めよ。", "GMm/r^2", ["GMm/r", "GM/r^2", "GMr^2/m"], "万有引力は2つの質量の積に比例し、距離の2乗に反比例します。"),
          choiceStep("speed", "ISSの速さを求めよ。", "√(GM/r)", ["√(GMr)", "GM/r", "√(r/GM)"], "GMm/r^2 = mv^2/r とおくと m が消え、v^2 = GM/r です。")
        ]
      },
      makePattern4("UG_P4_01", 4, "2倍"),
      makePattern4("UG_P4_02", 9, "3倍"),
      makePattern4("UG_P4_03", 16, "4倍"),
      {
        id: "UG_P5_01",
        title: "地表付近を回る人工衛星",
        statement: "地表付近を円軌道を描いて回る人工衛星の運動について考えるとき、万有引力は重力とみなすことができ、円軌道の半径は地球の半径に近似することができる。重力加速度の大きさを 9.8 [m/s2]、地球の半径を 6.4×10^6 [m] として、以下の問に答えよ。",
        hint: "地表付近では v^2/R = g と見なせます。したがって v = √(gR) です。周期は1周の長さ 2πR を速さ v で割ります。",
        steps: [
          choiceStep("speed", "この人工衛星の速さはいくらか。", "7.9×10^3 [m/s]", ["7.9×10^2 [m/s]", "9.8×10^3 [m/s]", "7.9×10^4 [m/s]"], "v = √(gR) = √(9.8×6.4×10^6) ≒ 7.9×10^3 [m/s] です。"),
          choiceStep("period", "この人工衛星の周期 T は何分か。", "約85分", ["約8.5分", "約51分", "約850分"], "T = 2πR/v ≒ 2π×6.4×10^6/(7.9×10^3) ≒ 5.1×10^3 [s]、つまり約85分です。")
        ]
      },
      {
        id: "UG_P6_01",
        title: "惑星の円運動",
        statement: "太陽のまわりを等速円運動している惑星の運動について、次の問いに答えよ。ただし、太陽の質量を M [kg]、惑星の質量を m [kg]、惑星の公転の速さを v [m/s]、軌道半径を r [m]、万有引力定数を G [Nm2/kg2] とする。",
        hint: "太陽からの万有引力が向心力です。周期は、1周の道のりを速さで割ります。",
        steps: [
          choiceStep("equation", "この惑星の等速円運動の運動方程式をかけ。", "GMm/r^2 = mv^2/r", ["GMm/r = mv^2/r", "GM/r^2 = mv^2/r", "GMm/r^2 = mvr"], "万有引力 GMm/r^2 が、円運動の向心力 mv^2/r になります。"),
          choiceStep("period", "この惑星の公転周期 T を、v と r を使って表せ。", "T = 2πr/v", ["T = v/2πr", "T = 2πv/r", "T = rv"], "1周の道のりは 2πr なので、周期は T = 2πr/v です。")
        ]
      }
    ];

    function makePattern1(id, distanceX, massX, force, satelliteMass) {
      const distanceAnswer = `1/${distanceX * distanceX}倍`;
      const acceleration = force / satelliteMass;
      return {
        id,
        title: "万有引力の変化と加速度",
        statement: `地球と物体の間にはたらく万有引力について考える。地球からの距離が ${distanceX} 倍になった場合、地球の質量が現在の ${massX} 倍になった場合、人工衛星にはたらく力から向心加速度を求める場合を考える。`,
        hint: "万有引力は距離の2乗に反比例し、地球の質量に比例します。加速度は a = F/m で求めます。",
        steps: [
          choiceStep("distance", `地球からの距離が ${distanceX} 倍になったとき、万有引力は何倍になるか。`, distanceAnswer, [`1/${distanceX}倍`, `${distanceX}倍`, `${distanceX * distanceX}倍`], `F は r^2 に反比例するので、距離が ${distanceX} 倍なら力は 1/${distanceX}^2 = ${distanceAnswer} です。`),
          choiceStep("mass", `地球の質量が現在の ${massX} 倍になったとする。同じ距離 r にある物体にはたらく万有引力は何倍になるか。`, `${massX}倍`, [`1/${massX}倍`, `${massX * massX}倍`, "変わらない"], `F は地球の質量 M に比例するので、地球の質量が ${massX} 倍なら力も ${massX} 倍です。`),
          choiceStep("acceleration", `ある人工衛星にはたらく万有引力が ${force} [N] であった。人工衛星の質量が ${satelliteMass} [kg] のとき、向心加速度を求めよ。`, `${fmt(acceleration)} [m/s2]`, [`${fmt(acceleration/2)} [m/s2]`, `${fmt(acceleration*2)} [m/s2]`, `${fmt(force*satelliteMass)} [m/s2]`], `F = ma より、a = F/m = ${force}/${satelliteMass} = ${fmt(acceleration)} [m/s2] です。`)
        ]
      };
    }

    function makePattern2(id, m1, m2) {
      return {
        id,
        title: "人工衛星の質量と運動",
        statement: `質量 ${m1} [kg] の人工衛星と、質量 ${m2} [kg] の人工衛星が同じ高さを同じ円軌道で運動している。`,
        hint: "GMm/r^2 = mv^2/r では、人工衛星の質量 m が両辺から消えます。同じ軌道半径なら、速さも周期も同じです。",
        steps: [
          choiceStep("speed", "速さはどちらが大きいか。", "どちらも同じ", [`${m1} kg の人工衛星`, `${m2} kg の人工衛星`, "質量だけでは判断できない"], "同じ軌道半径なら v = √(GM/r) となり、人工衛星の質量には依存しません。"),
          choiceStep("period", "周期はどちらが長いか。", "どちらも同じ", [`${m1} kg の人工衛星`, `${m2} kg の人工衛星`, "質量だけでは判断できない"], "周期 T = 2πr/v です。r も v も同じなので、周期も同じです。")
        ]
      };
    }

    function makePattern4(id, x, answer) {
      return {
        id,
        title: "地球の質量と月の速さ",
        statement: `月が地球の周りを円運動している。もし地球の質量が現在の ${x} 倍になったら、同じ軌道半径で運動する月の速さは何倍になるか。`,
        hint: "軌道半径が同じなら v = √(GM/r) より、速さ v は地球の質量 M の平方根に比例します。",
        steps: [
          choiceStep("speedRatio", `地球の質量が現在の ${x} 倍になったとき、同じ軌道半径で運動する月の速さは何倍になるか。`, answer, [`${x}倍`, `1/${x}倍`, "変わらない"], `v は √M に比例します。したがって速さは √${x} = ${answer} です。`)
        ]
      };
    }

    function choiceStep(id, prompt, answer, distractors, explain) {
      return { id, prompt, answer, choices: shuffle([answer, ...distractors]).slice(0, 4), explain };
    }

    const $ = selector => document.querySelector(selector);
    const stepsEl = $("#steps");
    const progressText = $("#progressText");
    const scoreText = $("#scoreText");
    const streakText = $("#streakText");
    const nextBtn = $("#nextBtn");
    const hintBtn = $("#hintBtn");
    const hintBox = $("#hintBox");

    let quiz = [];
    let problemIndex = 0;
    let currentProblem = null;
    let currentSteps = [];
    let stepState = [];
    let score = { correct: 0, total: 0, streak: 0 };
    let resultSent = false;

    function shuffle(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function fmt(value) {
      if (Number.isInteger(value)) return String(value);
      return String(Number(value.toFixed(2)));
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    }

    function frac(top, bottom) {
      return `<span class="frac"><span class="frac-top">${top}</span><span class="frac-bottom">${bottom}</span></span>`;
    }

    function fractionize(value) {
      const fractions = [
        ["GMm/r^2", "GMm", "r^2"],
        ["GMm/r", "GMm", "r"],
        ["GM/r^2", "GM", "r^2"],
        ["GMr^2/m", "GMr^2", "m"],
        ["mv^2/r", "mv^2", "r"],
        ["v^2/r", "v^2", "r"],
        ["GM/r", "GM", "r"],
        ["r/GM", "r", "GM"],
        ["2πr/v", "2πr", "v"],
        ["v/2πr", "v", "2πr"],
        ["2πv/r", "2πv", "r"],
        ["2πR/v", "2πR", "v"],
        ["2π×6.4×10^6/(7.9×10^3)", "2π×6.4×10^6", "7.9×10^3"],
        ["F/m", "F", "m"],
        ["600/120", "600", "120"],
        ["900/150", "900", "150"],
        ["720/90", "720", "90"],
        ["1/16", "1", "16"],
        ["1/9", "1", "9"],
        ["1/5", "1", "5"],
        ["1/4", "1", "4"],
        ["1/3", "1", "3"],
        ["1/2", "1", "2"]
      ];
      return fractions.reduce((html, [raw, top, bottom]) => html.split(raw).join(frac(top, bottom)), value);
    }

    function displayMath(value) {
      return fractionize(escapeHTML(value))
        .replace(/π/g, "&pi;")
        .replace(/²/g, "<sup>2</sup>")
        .replace(/³/g, "<sup>3</sup>")
        .replace(/\^(-?\d+(?:\.\d+)?)/g, "<sup>$1</sup>")
        .replace(/m\/s2/g, "m/s<sup>2</sup>")
        .replace(/Nm2\/kg2/g, "N m<sup>2</sup>/kg<sup>2</sup>");
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.toggle("active", screen.id === id);
      });
    }

    function renderGivens() {
      $("#givens").innerHTML = "";
    }

    function renderProblem() {
      currentProblem = quiz[problemIndex];
      currentSteps = currentProblem.steps;
      stepState = currentSteps.map(() => ({ answered: false, correct: false }));
      $("#problemTitle").textContent = "問題";
      $("#questionText").innerHTML = displayMath(currentProblem.statement);
      renderGivens();
      $("#mainAnswerArea").hidden = true;
      stepsEl.innerHTML = "";
      currentSteps.forEach((step, index) => {
        const section = document.createElement("section");
        section.className = "step";
        section.dataset.step = index;
        section.innerHTML = `
          <div class="step-head">
            <div><div class="step-prompt">${displayMath(step.prompt)}</div></div>
            <span class="state" data-state>未解答</span>
          </div>
          <div class="choices">
            ${shuffle(step.choices).map((choice, choiceIndex) => `
              <button class="choice" type="button" data-value="${encodeURIComponent(choice)}">
                <span class="mark">${String.fromCharCode(65 + choiceIndex)}</span>
                <span>${displayMath(choice)}</span>
              </button>
            `).join("")}
          </div>
          <div class="feedback" data-feedback></div>`;
        stepsEl.appendChild(section);
      });
      hintBox.classList.remove("show");
      hintBox.innerHTML = "";
      hintBtn.textContent = "ヒントを表示";
      nextBtn.disabled = true;
      nextBtn.textContent = problemIndex + 1 >= quiz.length ? "結果を見る" : "次の大問";
      TrainerLog.startQuestion();
      updateScore();
    }

    function finishStep(index, button, revealed = false) {
      if (stepState[index].answered) return;
      const step = currentSteps[index];
      const selected = revealed ? "解説表示" : decodeURIComponent(button.dataset.value);
      const isCorrect = !revealed && selected === step.answer;
      stepState[index] = { answered: true, correct: isCorrect };
      score.total += 1;
      if (isCorrect) { score.correct += 1; score.streak += 1; } else { score.streak = 0; }
      TrainerLog.recordQuestion({
        id: `${currentProblem.id}_${step.id}`,
        type: currentProblem.id,
        question: step.prompt,
        answer: step.answer
      }, isCorrect, { selected, answer: step.answer, prompt: step.prompt });

      const section = stepsEl.querySelector(`[data-step="${index}"]`);
      section.querySelectorAll("button").forEach(choiceButton => {
        choiceButton.disabled = true;
        const value = decodeURIComponent(choiceButton.dataset.value);
        if (value === step.answer) choiceButton.classList.add("correct");
        if (!isCorrect && !revealed && value === selected) choiceButton.classList.add("wrong");
      });
      const state = section.querySelector("[data-state]");
      state.textContent = isCorrect ? "正解" : revealed ? "解説を確認" : "不正解";
      state.style.color = isCorrect ? "var(--right)" : "var(--wrong)";
      const feedback = section.querySelector("[data-feedback]");
      feedback.innerHTML = `<strong>正解：${displayMath(step.answer)}</strong><br>${displayMath(step.explain)}`;
      feedback.className = `feedback show ${isCorrect ? "right" : "wrong"}`;
      if (stepState.every(item => item.answered)) nextBtn.disabled = false;
      updateScore();
    }

    function updateScore() {
      progressText.textContent = `${Math.min(problemIndex + 1, quiz.length)} / ${quiz.length}`;
      scoreText.textContent = `${score.correct} / ${score.total}`;
      streakText.textContent = String(score.streak);
    }

    function toggleHint() {
      if (!currentProblem) return;
      const show = !hintBox.classList.contains("show");
      hintBox.innerHTML = show ? `<strong>ヒント</strong><br>${displayMath(currentProblem.hint)}` : "";
      hintBox.classList.toggle("show", show);
      hintBtn.textContent = show ? "ヒントを隠す" : "ヒントを表示";
    }

    function showSolution() {
      currentSteps.forEach((step, index) => {
        if (!stepState[index].answered) {
          const section = stepsEl.querySelector(`[data-step="${index}"]`);
          const correctButton = Array.from(section.querySelectorAll(".choice")).find(button => decodeURIComponent(button.dataset.value) === step.answer);
          finishStep(index, correctButton, true);
        }
      });
      nextBtn.disabled = false;
    }

    function resetCurrentProblem() {
      const answeredCount = stepState.filter(item => item.answered).length;
      const correctCount = stepState.filter(item => item.correct).length;
      score.total = Math.max(0, score.total - answeredCount);
      score.correct = Math.max(0, score.correct - correctCount);
      score.streak = 0;
      renderProblem();
    }

    function startQuiz() {
      const studentId = $("#studentId").value.trim();
      if (!studentId) { alert("学籍番号を入力してください。"); $("#studentId").focus(); return; }
      quiz = shuffle(problemBank).slice(0, TOTAL_QUESTIONS);
      problemIndex = 0;
      score = { correct: 0, total: 0, streak: 0 };
      resultSent = false;
      TrainerLog.startSession();
      showScreen("quizScreen");
      renderProblem();
    }

    function finishQuiz() {
      TrainerLog.finishSession();
      const rate = score.total ? Math.round(score.correct / score.total * 100) : 0;
      $("#finalScoreText").textContent = `${score.correct} / ${score.total}（${rate}%）`;
      $("#finalMessage").innerHTML = rate >= 70
        ? '<div class="pass">クリア！万有引力と円運動の関係を整理できています。</div>'
        : '<div class="fail">解説で、比例関係と運動方程式の立て方をもう一度確認しましょう。</div>';
      TrainerLog.showElapsedInFinalMessage();
      showScreen("finishScreen");
      if (!resultSent) {
        resultSent = true;
        TrainerLog.sendResult({ score: score.correct, total: score.total });
      }
    }

    stepsEl.addEventListener("click", event => {
      const choice = event.target.closest(".choice");
      if (!choice) return;
      const section = choice.closest(".step");
      finishStep(Number(section.dataset.step), choice, false);
    });
    hintBtn.addEventListener("click", toggleHint);
    $("#showSolutionBtn").addEventListener("click", showSolution);
    $("#resetQuestionBtn").addEventListener("click", resetCurrentProblem);
    nextBtn.addEventListener("click", () => {
      if (problemIndex + 1 >= quiz.length) { finishQuiz(); return; }
      problemIndex += 1;
      renderProblem();
    });
    $("#startBtn").addEventListener("click", startQuiz);
    $("#againBtn").addEventListener("click", () => {
      showScreen("startScreen");
      progressText.textContent = `0 / ${TOTAL_QUESTIONS}`;
      scoreText.textContent = "0 / 0";
      streakText.textContent = "0";
      $("#sendStatus").textContent = "";
    });
    $("#categoryBtn").addEventListener("click", () => { location.href = "../comprehensive/index.html"; });
    $("#homeBtn").addEventListener("click", () => { location.href = "../index.html"; });
    $("#studentId").addEventListener("keydown", event => { if (event.key === "Enter") startQuiz(); });
    progressText.textContent = `0 / ${TOTAL_QUESTIONS}`;
  </script>
</body>
</html>
